body:
  text: 木鍾集卷七宋陳埴撰周禮周禮鄭注云凡府史皆官長所自辟除胥徒民所給徭役者不知幾時代邪又不知俸祿何取給耶府史即庶人之在官者有代耕之祿既自辟除即無限年任事則存留否則黜去然古人府史多世守此無明據意如此耳胥徒即民之給徭役者鄉大夫自辟均人豐年公旬用二日無年旬用一日古注改旬為均非也繇役則無祿宫伯云若邦有大事作宫衆則令之竊意此特宫中警備耳注以為或選當行周制爪士王不出尚不行况士庶子之宿衛王宫者哉然國子亦自有從戎事者彼蓋諸子所掌非宫伯所掌未知如何諸子職云若國有兵甲之事則帥國子而致諸子唯所用之正謂此也大事謂兵甲之事作謂調發起太子無境外之事止謂居守耳國子在學則𨽻於大司樂在宫則𨽻於宫伯在兵則𨽻於諸子成周鄉大夫皆世祿獨上中下士以大比之賢能處之官職有限仕進無窮如何安頓王朝公卿大夫元士雖不多員數六鄉之遂有多少官人吏除其長外率是下士中士為之多至二萬人古者鄉舉里選不患無缺只患無人耳所謂使民興賢出使長之使民興能入使治之正謂入鄉遂中仕為比閭之長是時決無待缺耳天子曰萬乘諸侯曰千乘天子曰六軍大國不過三軍此定制也然考司徒卒伍之制而約之司馬法不能無疑司馬法曰兵車一乘甲士三人步卒七十二人則是一乘者七十五人之所容也約而計之則三兩之數也四乘則三卒之數也百乘則三師之所合也五百乘則三軍之所合也積至於千乘則六軍聚焉是六軍之數適足以容千乘以天子之六軍言之則不足於萬乘以諸侯之千乘言之則不應有六軍卒伍法與丘甸法異卒伍家出一人自五人之伍積而至萬二千五百人為軍即比閭族黨州鄉之民也六鄉實有此家數即六軍實有此兵籍若夫丘甸之法合五百十二家六十四井之家共出甲士三人步卒七十二人是謂一乘乃七家出一人是六鄉之家悉可以為卒而不盡調以為兵兵籍雖具於六軍而調發止從丘乘法一是兵籍全數一是調發抽數不可合看大司徒既掌邦教典樂又掌教何耶司徒掌邦教所以教天下之萬民周禮有十二教之施是也典樂成均之法所以教王朝之子弟周禮所謂中和祇庸孝友興道諷誦言語是也其在司徒者則謂之鄉學在典樂者則謂之國學周官師氏掌內朝司士掌治朝朝士掌外朝三官分𨽻三卿分掌三朝其制明矣而文王世子記外朝之政則曰司士為之何不同也太僕掌內朝司士掌治朝朝士掌外朝師氏近臣掌伺察王之動靜而以媺事告誥人主此項官屬最切君德非掌朝儀也自太僕所掌燕朝為內朝即司士所掌治朝為外朝文王世子所言是也自朝士所掌治朝為外朝即司士所掌治朝又為內朝玉藻所言以日視朝于內朝是也王之卿六命公侯之卿三命子男之卿再命其命掌於典命則天子之命也及考王制則次國一卿命於其君小國二卿命於其君意者夏商之制然歟此當以王制兼考典命但言其命數不言合命幾人周制侯國之臣以達於天子為寵故惟大國之卿得皆命於天子以次各有隆殺如齊本侯爵惟髙國二卿得命于天子管仲雖秉權不過齊卿且不敢當天子命卿之禮曰有天子之二守國髙在位晉使鞏伯獻捷于周周人以禮讓之曰不使命卿鎮撫王家而鞏伯實來未有職司于王室則雖齊晉之卿皆不得命于天子信王制所言為周制大司徒曰制天下之地征又曰以令地貢地貢即九貢之所貢明矣若地征豈即太宰九賦之所征乎地征總言貢賦下云以作民職即九職是以令地貢即九貢是以斂財賦即九賦是九貢為邦國之貢自是分明但九職九賦先儒分作兩項賦稅竊疑不然按經但言以九職任萬民此又言以作民職即不言是賦稅若九賦即曰以斂財賄此又曰以斂財賦則所謂財賦者止九賦耳蓋九職乃其窠名財賦所從出者九賦乃將九職之所入畫項填管以待九式之用其賦之之法則如載師所言或十一或十二或二十而一或二十而五如此考論則脈絡貫串矣泉府凡民之貸者以國服為之息蓋民用不足上之人不與則無以濟其用與之不取息則無以禆有司出入之耗費但周禮所載入息之數先儒謂貸萬錢者期出息五百意者不過二十而取一耳鄭司農謂從官借本賈而以其所賈之國貸物為息竊謂周家使民各以其所服國事貢物為息農以粟工以器不取民以所無也茍如司農貸民本賈之説則是上下相率交征利之意王林解謂泉府所言國之財用凡以賖貸之息供之竊謂市㕓之征布本以供王膳服周家却掌之泉府不妨以此項財與民間通融其所謂國之財用蓋自取具於市㕓之征布耳豈仰給於息錢乎惟其昧先王之意是以王莽舉是制行於漢王荆公舉是制行於本朝反為天下禍未審周官之法意如何以國服為之息國服字他無證二鄭以意説之大鄭謂以物為息隨其國之所貨其論甚通恕而無多寡之凖後人無可依據小鄭謂以錢為息隨其國之服事而定其凖即載師國宅無征園㕓二十而一以下等級之數如此則多寡方有凖耳誠如小鄭所言則周之貸民有息者有二十而一者有什一者有二十而三者最重者不過十之二青苖取息二分是以周法至重者為凖又周法以期而計青苖則春秋兩度斂散却成四分取息又周法止是貸民不足其豫之也必有司辨之不敢輕豫恐其有非理之用青苖則家賦户斂招誘之不來則抑配繼之然則貸民之與聚斂其意霄壤矣韓魏公辨此最詳來問錯認大鄭意王氏曲説不在論井田以九起數匠人則言九夫為井而遂人乃云十夫有溝不知如何推算溝洫之法以十起數井田之法以九起數鄉遂用貢法十夫有溝遂人是也都鄙用助法八家同井匠人是也先儒之説如此與孟子合請野九一而助國中什一使自賦近世諸儒皆欲混而同之殊不可曉井田溝洫之法按遂人云百夫有洫十夫有溝溝即不見得包溝洫在內若是在內當云百夫十夫之間矣匠人溝洫却在內故皆以間言方十里者以開方法計之為九百夫方百里者以開方法計之為九萬夫凡看經當以正經大字謹謹附旁若恣意曲説何有了期遂人匠人兩處溝洫分明各是一法一以十起數一以九起數既有一夫地為梗積而上之這許多地何以附著無緣消化渾合得他諸儒才見鄭氏説便謂注疏迂儒不知其説本之孟子孟子請野九一而助國中什一使自賦晦翁總其説謂鄉遂用貢法十夫有溝都鄙是助法八家同井其言簡而盡矣但不知其必分二法者何故竊意鄉遂之地在近郊逺郊之間六軍之所從出必是平原廣野可畫為萬夫之田有溝有洫又有途路方員可以如圖蓋萬夫之地所占不多以井田一同法約之止有九分之一故經以徑法攤算逐一見其子數若都鄙之地謂之甸稍縣都乃公卿大夫之采地包山林陵麓在內難用溝洫法整齊分畫故逐處畫為井田雖有溝洫不能如圖故但言在其間其地綿亘一同之地為萬夫者九故經以方法總算但止言其母數以子數折之一同計九萬夫蓋溝洫之法成於萬夫井田之法成於一同相去不啻倍蓰不知後儒何故必欲合之茍謂周公制法不應三般兩樣此誠淺學紙上陳言古人制國四方八面多少法度豈一箇井田字了得他只如井田既有溝洫法又有比伍法又有丘甸法丘甸則以四起數比伍則以五起數縱橫羅絡參錯夾持如犬牙相制所以其法可以支久縱壞得一處更有他處在不似後世籠統壞時一齊便壞倒時一齊便倒恐古人意思如此更講明之成周雖有井田法又有比伍丘甸法今人槩曰井田何耶鄉遂之法溝洫以授田貢以制賦比伍以調兵考之遂人云夫間有遂遂上有徑至萬夫有川川上有路此溝洫之法也而以什一貢法制賦至調兵之法考之小司徒云五人為伍至五師為軍又云凡起徒役毋過家一人則是一家出一夫一鄉出一軍此比伍之法也都鄙之法井田以授田助以制賦丘乘以調兵考之小司徒云九夫為井至四縣為都此井田之法也而以九一助法制邦賦至調兵之法考之司馬法云甸方八里實六十四井出兵車一乘甲士三人步卒七十二人馬四匹牛十二頭此丘乘之法也溝洫長連畫去井田方方積去溝洫以十起數井田以九起數丘乘以田數起兵比伍以家數起兵大約丘乘法是七家出一人比伍法是一家出一人只緣都鄙兵有征戍事故用民少鄉遂兵止衛王畿不調發故用民多要之鄉遂雖重而實輕都鄙雖輕而實重近世諸儒乃欲合溝洫井田為一法殊不知請野九一而助國中什一使自賦孟子已分作兩去何可合得成周鄉學國學之異古者公卿貴賤之分明而不相亂士庶之途異而不相雜國學則専以教公卿大夫之子弟而國之小學則在王宫之左太學在郊鄉學則専以教萬民之子弟而鄉之小學則家有孰黨有庠大學則遂有序國學則掌於大司樂而大胥小胥皆其屬教法則有樂語樂德樂舞之凡鄉學則掌於鄉大夫而州長黨正族師皆其屬教法則有六德六行六藝之目國學之選用則大胥小胥先簡不率教者以告于大樂正樂正乃論其秀者以告于王而定其論論定然後官之則論於王朝者即為王朝之官所謂適士是也鄉學之選用則族師月讀法黨正季讀法州長嵗讀法而進退之鄉大夫簡不率教者以告于司徒而後司徒興其賢者能者以禮賔之而獻其書于王曰選士鄉大夫曰此謂使民興賢出使長之使民興能入使治之則興于鄉者往往即為鄉遂之吏如比長閭胥之中士下士是也自始學以至于入仕聖人之所以别異於鄉學國學者甚嚴矣雖然教法均欲其成才耳成才均欲其用耳國子之成才既使之進于王朝之顯仕矣而鄉民之秀傑者其可終抑之以為鄉之小吏乎蓋三代世臣之法先貴而後賤先親而後踈國之子弟吾固不可使之出而與鄉民伍而鄉民之不願仕于鄉者聖人又有選用仕進之法一與國子等內不失之輕國子外不失之棄鄉民成周學校之善豈不於斯可見周官六鄉之吏舉一鄉言之比長計二千五百人閭胥計五百人合六鄉言之比長下士共一萬五千人閭胥中士共三千人不知周官三百六十如何有許多中士下士成周之官有二有王朝之官有鄉遂之吏王朝之官其職有三百六十其官有三百八十四人據周禮公卿大夫加一倍法鄉遂之吏只比長下士共萬五千人閭胥中士共三千人而六遂之吏不與焉非必升於王朝論於司馬而後官之也何以言之王朝官出於國學六鄉之吏出於鄉學國學以教公卿大夫士之子弟其學官之長則為大司樂其屬則大胥小胥簡其不帥教則告于大樂正大樂正論其秀者以告于王而官之司馬曰進士鄉學以教萬民之子弟其學官之長則為鄉大夫其屬則州長黨正之類亦必簡其不率教以告于大司徒而後司徒賔興其賢者能者獻于王曰選士故自國學出者皆仕于王朝之官所謂適士元士也其祿視附庸之國若夫自鄉學出者官為六鄉之吏即周官所謂使民興賢出使長之使民興能入使治之是也所謂出長是因其德行可以為長則使自五家之比出而為二十五家之長是為閭胥以長其民入治者是因其才能可以治事則使還入五家之內是為比長以治其事閭胥比長其位皆係庶士其祿與庶人在官者同止足代耕其禮之優僅免鄉之徭役而猶未免司徒之征由此觀之則王朝之士為命士六鄉之中士下士乃不命之士典命有不命之士蓋其教養論選仕進之法本自不同故也雖然六鄉之賢能豈終不得仕進於王朝邪方其升於王朝之時若不願仕於六鄉則自司徒而徑升於國學曰俊士按王制然後論選仕進之法一與國子弟等是則六鄉之民進可官於王朝退可官於鄉遂未成者猶得養之於學無成者不失為受田之民成周之時鄉遂之民所以多髦士者其道蓋出諸此天官冡宰與王論道官也雖酒漿財用會計等事皆領於天官之屬莫是又使冡宰兼有司之事否冡宰專一節制人主若財計若酒漿之類雖各有司存但有司不可與人主較可否冡宰上行三公事凡有司所不可較者冡宰可談笑而道之乃是格君心之大者不待事已出而有司紛爭之聞止齋説士田在近郊近郊只五十里一官自有八十來士如何將五十里郊了得許多士祿又不知自士以上田永為己業罷任則或歸之官士不受田所謂士田者以此田之入供士之祿也下士視上農謂之代耕之祿即不受田可知王制除封國外其餘以祿士即士田也所謂近郊五十里者謂去王城五十里外四面皆近郊六鄉在其中不知幾田幾里周官設女巫氏女巫非宫中所冝置也漢文尚除其制孰謂周公為之乎女曰巫男曰覡古人既有禱禳之事與其旋求於外不若預設於內既屬之於王官又統之以冡宰即與後世妖巫異也古者用民三日周禮均人豐年則公旬用三日中年公旬用二日無年則公旬用一日與王制不同意者歲不過三日恐是力征非服戎之事君服戎之事則不止三日未知是否三日法之常視豐凶者行法之權只三日力役之征聖人猶愛惜民力如此兵事以一歲為更不在此限成周取民之制不過什一然考之當時豈但什一或二十而一或二十而五或無過什二何若是之不同耶説者謂周人重務本而抑末利故若是之不同使果重本而抑末則止可以言漆林之征其餘又不可以例論什一之法止行於井田溝洫鄉遂謂十夫有溝乃十而賦一都鄙用助法八家同井乃十而賦一其他如㕓里之賦宅田土田賈田之賦官田牛田賞田牧田之賦與夫甸稍縣都又見於載師所言差等不同者疑皆不在井田溝洫之數只考載師自見公侯百里伯七十里子男五十里王制之言為然而孟子言班爵祿亦然至周禮大司徒言公五百里侯四百里至子男皆悉倍於王制孟子之所論説者謂周禮併附庸而言使併附庸而言然王制論諸侯之附庸亦不與分地之數姑以公地觀之未有公地居其一而附庸乃居其四也周禮與孟子實不同孟子是商制王制亦是商制周禮乃成周制成周制作百度皆别封國增廣無可疑者今惡其異而必曲説以合之縱饒如何巧説終無可合之理周官刑罰慶賞相及相共頗類商鞅相收相連之法説者以為有關雎麟趾之意而後可以行周官之法度是固然然後世不能皆文武周公則此等刑法多是流入一切中來不知周公立法之初亦嘗慮及此否比伍法當與井地溝洫相持其授田時或八家而同井或十夫而同溝已自出入相友守望相助疾病相扶持則是相保相愛相友相共之意已自見於授田之時矣可以比伍而無法乎今既無井田溝洫只有保伍法孤單在此所以少恩也出使長之入使治之出五家之比而為二十五家之長或出二十五家之閭而為百家之長是之謂出長本五家之中居仍舊入作五家之官本二十五家之中居仍舊入作二十五家之官是之謂入治此是鄉學出身即使就鄉學中作吏此鄉舉里選之法也大宗伯之職春祠夏禴秋嘗冬蒸此四時之祭也而釋獻饋食四時祭中皆有之鄭氏别此為祫為禘不知其説何據宗廟之祭除四時祭外大祭只有祫與禘周禮既冠釋獻饋食于四時祭之上即為祫禘可知鄭氏亦以文勢推之本無可證周制鄉三老即三公則六卿之大夫即六官之卿分攝之耳然春秋世婦每宫卿二人六宫則十二卿也此豈六官之卿分攝邪每宫卿二人疑是卿領二宫周禮官制用倍法卿只是六人掌六典者此六卿也此是以一卿兼領諸司所謂官聮者是非攝也程傳謂每宫卿十二人即三夫人九嬪共十二人鹽人掌鹽之政令然三代無榷鹽法不知當時如何措置天官酒漿醯醢之類皆主王之膳羞聖人以道制欲凡男女飲食之奉使冡宰節制行於其中乃格心之大者非可以後之政令言周家朝聘制度大約諸侯親見於王有六禮朝覲宗遇會同是也諸侯使其臣見於王有二禮聘眺是也王朝臣下交諸侯有四禮間問歸賑賀慶致禬是也槩見於經者如此但小行人曰存眺省聘問臣之禮也不知諸侯使其臣如王所有此五禮即聘眺之禮明矣鄭行人注謂間問即存省之屬則存省問三禮未辨其何所據諸侯自身行禮者有六朝覲宗遇會同使其臣行禮者有五存眺省聘問五禮中或言聘恐其總耳故大宗伯復云時聘曰問殷眺曰視則問視者疑即存省問之總名也王之撫諸侯亦有存眺省之禮蓋上下不嫌同名耳大司徒不易之地家百畞一易之地家二百畝再易之地家三百畝至遂人則曰上地田百畝萊五十畝中地田百畝萊百畞下地田百畞萊二百畝大司徒何以言易遂人何以言萊易之與萊世儒多言地力薄者休一歲為萊至明年而易種是為中地一易其甚薄者休二歲為萊至後年而易種是為下地再易是固然矣但盡使休百畝二百畝之田而為草萊之地則萊者地力益薄而其後施功愈難今人耕地則無收一年古人所謂易與萊不如是其拙也按漢趙過為代田代即古法之所謂易也其法一畝分而為三甽廣尺深尺古言濬畎澮距川即種苗之水地也而播種於三甽中歲代處故曰代田代處謂畝濶六尺三尺為甽則三尺為隴甽與隴相間若今種薑一法然今年此為甽而彼為隴明年此為隴而彼為甽每歲更易其甽以播種則常得生地而地力完及苖既滋長則稍耨隴草因隤其土以附苖根比盛暑則隴盛而根深可耐風與旱故能以薄地而倍收此趙過代田之法也趙過自言即古田法古稱南畝皆向南而分甽東畝謂皆向東而分甽可見周官之所謂易與萊者不過更代而分甽隴一易則間一隴而為甽再易則間二隴而為甽種踈則結實倍古人治地能以惡為肥為有此法也然既言易復言萊者以其受田倍於上地嫌於得粟之多有不均之患故名其田曰萊者以明其得粟不過與上地等雖曰倍給其田而其休而為隴者皆無用之萊地耳大司徒之造都鄙即遂人之治野司徒舉其凡遂人詳其目耳周之軍賦起於丘乘其法止於五百十二家出甲士三人步卒七十二人牛十二頭馬四匹而已不知軍糧之費亦出於丘甸中如何刑法志云稅以足食賦以足兵食只取什一之稅但古人處處有委積之儲必不餽糧於千里之外周軍賦齊內政晉被廬魯丘甲田賦其制異同如何軍賦之法四井為邑四邑為丘四丘為甸甸五百十二家出甲士三人步卒七十二人牛十二頭馬四匹是為一乘此丘甸出軍賦法乃五百十二家共出許多賦大約七家合出一兵所謂民皆可為兵而不盡為兵也內政自五家之軌而至於十連之鄉大約周比閭之法自五人之伍而至於二千五百人之師大約寓兵於農之意但家出一兵與丘甸之法異此強國之丘也丘甲謂一丘之夫便使出甲士周以五百十二家出甲士三人魯乃以百二十八家出甲士與古大異矣田賦謂計田而出賦如一夫一井之田便使出軍賦不復如丘甸法又甚於丘甲矣陳止齋謂田賦亦家出一兵夏一夫受田五十畝每夫計五畞之入為貢商一夫受田七十畞同助公田取民之制相去不逺而授田之法三代不同竊意古時民稀其後日以漸多而授田之法反倍於古借曰土地日以開闢亦豈能遽倍於古之時耶生齒蕃庶則土地開闢只看皇矣之詩周之先公興於豳則向之荆棘莽榛今皆為人民都會天地生許多民物便有許多土地所以到周時事事增多於前如封國與王制不同亦斥大疆土之故大司樂固是教國子學官而鄉遂之學獨不散見於周官何耶自鄉大夫而下至比長此鄉學之官遂率此其教養升黜之法則月終而比者百家至三年大比則合萬二千五百家而升黜矣廩人倉人皆掌九榖出入皆不聞會計何也歲終則會百司庶府皆然既有司會之官在百司庶府不必盡言可也九職任萬民自三農而下八者皆無事於耕信然則成周盛時農之家一食粟之家九况虞衡藪牧百工商賈各又設為之職安在於驅而緣南畞哉食貨志云工商亦受田五口乃當農夫一人均是王民彼獨不受田又無代耕之粟一人必不然載師有士田賈田之類可見民不盡耕不為害不均之害大井田方里為井井十為通通十為成成方十里成十為終終十為同同方百里以十起數此井田結甲納稅法制祿之法皆以是計如天子田方千里公侯田方百里伯七十里子男五十里其法皆以方計算數具於王制要知此只計户口輸稅計户口食祿算法合如此積起非是地段方正一如紙上之圖同地萬井四井為邑四邑為丘四丘為甸以四起數此丘乘法合六十四井計五百十二家通出甲士三人步卒七十二人牛十二頭戎馬四匹兵車一乘是謂乘馬之法以供軍賦故百乘之家則合六千四百井而通出百乘之兵賦千乘之國則合六萬四千井而通出千乘之兵賦萬乘之國則合六十四萬井而通出萬乘之兵賦稅以足食賦以足兵起數既别當作兩項看木鍾集卷七
