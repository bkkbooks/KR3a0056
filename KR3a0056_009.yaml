body:
  text: 木鍾集卷九宋陳埴撰春秋春秋書元年春王正月或謂用周正然周雖正朔未嘗易時月商之元祀十有二月明月不可易秦之元年冬十月明時不可易今以為用周正則時月皆舛矣或謂用夏正則是夏之正月而何以為王之正月或以為夏時冠周月則周之正月乃夏之十一月安可謂之春是時又皆舛矣且建寅而又建子不幾有兩造化反覆殊不可曉不知果當出何説周事今不可考但以秦事觀之可見繫周事者也當只改其建正不當改其書法今秦既書冬十月為嵗首即周以冬士月書之可知秦自十月十二月之下仍書正月即周正月即周之書法可知所謂行夏之時者乃是將周厯書重與排過從他正月為始胡文定托商秦書法為證已是得之但云以夏時冠周月則不成法度矣但書災異事與今説不合語不可曉缺之無害左傳驪姬譛羣公子一段末云晉人謂之二五耦注云二耜相偶不知古今耕二耜相偶如何古人耕法不用牛而以兩人代一人代之則力不足必兩為耦則可故或謂之耦耕或謂之並耕耜即今之犁頭也廣五寸耦耕則用二耜兩其五寸故其耕之處深廣一尺晉人所以有二五耦之譏曲沃武公之并晉國也天子不能正之而復命之是天下壞亂久矣溫公獨以壞禮自三晉始何耶周室壞法亂紀自入春秋來已下儕於列國如交質子事左氏不責鄭以亡君臣之分只責其信不由中蓋當時看了此等事只作尋常事體看更復説甚名分事釐王封曲沃武公為晉侯非是國之號令猶能行於諸侯負篡弒之罪自知不容於諸侯故厚賂周室以求長安本邑耳當時若尚有王法安得無忌憚若此溫公欲發大義於一書之首故借名分以明之其中辭語有失契勘耳通鑑以三晉為一書之首故大其義以繩之未為合事實也左傳公入而賦大隧之中其樂也融融薑出而賦大隧之外其樂也泄泄莫是詩否此即是詩當作春秋時二章詩看然而不可不明訓詁古詩不過如此若訓詁不明安知隧為何物耶隧地下路也閏法左氏謂履端於始舉正於中歸餘於終可將正義考否書云期三百有六旬有六日疏云一嵗三百六十有五日四分日之一言六旬者舉成數而言耳按左傳正義曰天三百六十五度四分度之一已寫在六經總論中宋宣公舍與夷而立弟穆公厥後亦舍子馮而立與夷左氏釋傳謂君子曰宋宣公可謂知人矣立穆公其子饗之是取其傳賢不傳子至公羊乃云宋之禍宣公為之故君子大居正與左氏相反如何宣公舍子立弟固是擇賢况兄弟相繼自是殷法未為失正公羊以成敗論人歸咎宣公不知殤之不君正使當下便立他其禍尤速宋之禍不起於兄弟之爭自是殤之不君爾左氏謂宣公知人固是謂立弟而子享若以成敗論當宣公之時豈逆覩其立我子耶齊威以四十餘年之經營而齊之霸業一傳遂斬晉文以一年之亟就而晉之霸業終春秋而不替或謂齊得孝公以嗣位不若晉得襄公而靈成景悼昏昧滋甚何能長有諸侯耶晉自文公之後不成霸業是時乃楚莊稱伯敗晉于弼楚衰晉悼復伯自悼公以後晉楚同主夏盟宋之會至申之會則天下之大勢又在楚而不在晉矣春秋之作始於無王終於無伯止齋先生謂天下之無王鄭為之也天下之無伯齊為之也夫當時列國皆此等人而獨歸罪於二國何耶以其嘗敗王師故曰無王自鄭始以其嘗伐晉故曰無伯自齊始晉獻公欲廢太子申生而立奚齊荀息不能正君之非而能守君之命里克丕鄭欲從君之義而不從君之惑二者孰正效荀息不得猶刻鵠不成尚類鶩效里克不得則畫虎不成反類狗矣隱公攝位何故得列於十二君歐公有論隱桓俱非正嫡但隱長而桓少則隱之受國於先君正也乃欲遜于桓此即非禮之禮有類子噲之事宜其自貽伊戚三傳不辨長幼之分又從而成桓之志名之曰攝夫既君其國矣國人又已君之矣何攝之有子糾兄也小白弟也春秋以子加糾則諸侯繼世在喪之稱也集注謂小白兄而子糾弟未審何據公殺糾不稱子胡文定公主公榖義其所按之辭曰史稱周公誅管蔡以安周齊桓殺其弟以反國故集注祖之春秋吳越之爭始於何時更敗前後凡幾昭六年楚通越以困吳吳越之兵爭始於是定十四年吳會黃池之嵗吳之極盛也而越滅之春秋於是終焉以為天地之大變哀元年吳嘗滅楚矣而春秋不書豈以其卒能報吳耶哀之十年傳絳縣老人事史趙曰亥有二首六身未曉其説亥字古寫較橫些其字頗類算子位故史趙借此字以寓算數如今不用下畫於旁但橫看便如四箇算子位此是滑稽伎倆見晉之諸子皆曉算法皆能隱語絳縣老人豈是不識故作隱語以使人測耳却被師矌一口測了曰是七十三年師矌又不下算却只説是魯會承筐之嵗狄戎伐魯之年以示算法亦謂無人能測識者不知士文伯一見而決為之箋注云此二萬六千六百六旬也文伯非術數之家其敏又在師矌史趙之上所以見晉多博聞之士多精算之家一談論之頃而數美具焉僖九年宰孔言齊侯東略之不知西則否矣如何齊威既南征北伐矣東西則未能逺略也宰孔意其伯業將衰決然不能西略若東略則未可知耳故語晉不用憂西以晉在西故也楚子問鼎王孫滿辭楚兵乃去之然是謂楚兵之去則周之天命必未改耳使楚子果欲多上人豈文辭所能折來説卜世卜年為假説之詞只王孫滿陳義如此楚安得不折服楚莊有志齊桓晉文之事桓文未能改楚莊敢遽無分乎猶可以義折也先儒嘗以胡文定夏時冠周月之説最為不是且舉日南至與秋大水無麥苗一兩事辨明之復不明載其用夏時周時未審春秋所書災異事果用夏時耶周時耶夏時冠周月不是道理春秋全是夏時只除了隱元年冬十一月十二月不書從他春正月排去直到卷終然便是夏正若用周正則隱元年當云冬十一月今只除此兩月不書耳此説甚長聞之蔡西山云書災異皆應夏正如僖末年書隕霜不殺草梅李實見是夏十二月分明韓宣子適魯見易象春秋曰周禮盡在魯矣釋者謂仲尼上遵周公之遺制下以明將來之法則春秋固周禮所寓彼易卜筮書也未知與周禮何合周易雖卜筮常用然掌在太易屬之太史侯國想無此官亦無此書故其卜筮繇辭見於列國者各不與周易同如僖公十五年秦伯伐晉之筮又晉嫁伯姬之筮自是一項占書今火珠林類是獨周史以周易見陳侯莊二十三年與魯穆子之生昭五年南蒯之叛昭十二年穆薑之出襄九年凡周易魯所筮皆周易正文以此見周易唯周與魯有之列國占筮皆是俗法惟魯與周正法故韓宣遂謂周禮在魯與晉之乘楚之檮杌魯之春秋同木鍾集卷九
