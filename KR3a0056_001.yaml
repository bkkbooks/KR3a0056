body:
  text: 木鍾集卷宋陳埴撰論語殷有三仁焉集註謂不咈乎愛之理而有以全其心之徳豈三子皆同於愛宗社邪三子不私其身其心可鑑可以吐出見先王於地下蓋全是一片至誠惻隠之理他無所有故謂之仁三仁之稱比干與焉荀息之死可謂之仁否私欲浄盡天理渾全方可言仁謂荀息忠於所事則可謂死當於理而無私心則未也比干以諫死謂之忠可也而孔子謂之三仁是忠可為仁也至子張問令尹子文何如孔子只許之以忠以為未知焉得仁是忠與仁猶有逕庭也不是將忠便喚作仁此心統體無私渾是天理方可言仁子文於此處保明未過在知及之仁不能守之固不可仁既能守之而猶有不莊不以禮之戒集注謂有氣習之偏何邪蓋雖是有仁能持守然當臨莅之時舉動之際此心小懈即妄念便生須是逐時照管令罅縫不開才有罅縫便有氣習之偏先來有此故到此不能不萌動也此是聖賢檢身上工夫周宻處雖是本體已造醇美猶恐節目上有疵又須逐節照管要令盡善盡美徳盛者必不狎侮言小疵消盡也今雖大人先生猶有戲語皆是未過此一闗冉求自謂可使足民觀其用於季氏苐能為之聚歛附益使賦粟倍他日此幾於厲民之事冉求有為政之才聖人屢許之且以政事名想必有可觀者但義理不勝利慾之心過失處多耳南容公冶長二子優劣南容言行可法處多公冶長事不多見苐聖人稱揚其婿之必非已下人不必論他優劣只當法其善行興於詩立於禮成於樂學者不可缺一夫子責伯魚學詩學禮而不及樂何邪家庭之訓只說到詩禮上且就切近處說乃聖人逺其子之道非是前三語可論為學之次也伯魚聖人之子陳亢意其有異聞及止聞詩禮之訓乃知聖人逺其子愚意伯魚之資禀稍劣故聖人止以是告也使其有曾顔之資亦當以曾顔者告之矣若一以逺其子則是有心於公也聖人然乎哉父子主恩義方之訓又說到這處若伯魚天資頴悟即飲食起居無非教也天何言哉四時行焉百物生焉聖人何隠乎爾曾顔可至伯魚亦可至自是日用不知耳子路不悅孔子為公山氏之召而孔子以為夫召我者而豈徒哉如有用我者吾其為東周乎如何從季氏之家臣便展得為東周事業聖人行道自有為之兆處弗擾之徒聖人未必果從他但憫時行道之意於此乎見耳陽貨欲見孔子孔子不見至於公山弗擾以費畔召子欲往夫陽貨與此人皆一時叛臣孔子不見陽貨而欲見此人何也聖人道大徳宏無可無不可雖是惡人茍其一時意向之善交際之誠聖人無不與者陽貨則見之之意不實交際之禮不誠故孔子不欲見之孟子曰茍善其禮際斯君子受之矣子見南子子路不悅夫子矢之曰天厭之天厭之聖人道大徳全於交際上自有斟酌子路之不悅固是不知夫子然夫子亦可自舒徐釋其疑何必指天自誓子路勇於自信信聖人不及如此等處屢形於辭色屢見於問答想是聖人說他不下故矢心以誓之欲其退而思之耳公山佛肸之召夫子皆欲往而卒不往固知其人之不可變事之終不可為也毋乃與初意戾乎始之欲徃君子以自强不息終之不徃君子以致命遂志集註解未可與權舉洪氏之易九卦終於巽以行權何也舉易一語見權者聖人之終事易三陳九卦凡二十七節道理最微末梢一語方以權終之見得不可驟語也可與立立底意思立謂守得住可決定保明他作好人也夫子言誰毁誰譽一章毁者稱人之惡而損其真譽者揚人之善而過其實先詳兩字名義方可聖人自言我無損真過實之毁譽者若間有所譽必是已嘗試其事也非過其實以揚之若毁人之惡而損其真則決無是事集註自可玩人自不察耳則以學文晦翁以文為重文質彬彬晦翁以質為重文對質說則為文采之文因學而言則為射御書數之文今人所學只以詩書六藝為文古時却無許多書只是去刑名度數上加意所以古人長於數而短於理聖門遂講明理學後人得許多書於理義甚明於實學無有古人如申屠嘉周勃之徒皆是資質好緣不曾講求義理所以只是一个重厚若是文采須是有質方可施如繪事後素之意以徳報怨是聖人氣象處欲以直報怨者何邪以徳報怨是為嫌故饒他一著不是循理正大意思却是私心以直報怨初無怨惡心只是道理如何當舉則舉當廢則廢却是公心又曰以直報之豈不正大豈不忠厚當利則利當貴則貴當用則用當舍則舍惟出以正豈不是忠厚處聖人言語一一自有斟酌泰伯諸侯也有一國也夫子以為三以天下讓周之得天下來歴自泰伯之讓始故其讓國處人得見其迹其讓天下處人莫知其心所以聖人表出來泰伯之讓在太王時亊迹甚微人莫能知聖人推見至隠以其本心與文王同故俱稱為至徳使不偕逃亦自足以造周故又言以天下讓泰伯之讓國與夷齊同否集註曰其心則夷齊之心而事又有難處者太王有翦商之志又以王季生聖子意欲立之而事迹未見泰伯竊窺此意故逃之蓋其處父子兄弟之變而欲全天性之恩處商周興亡之際而欲全君臣之義其事皆類夷齊而泯其迹所以為至徳孔子曰伯夷叔齊求仁而得仁伯夷以父命為尊叔齊以天倫為重是固天理恁底然二子只勾當得自身上道理無虧欠處若律以天下之大義叔齊辭伯夷又辭更無仲子誰擔當得這國事去彼仲子既於天倫父命兩不相干受之毋乃非邪既是勾當得自身上道理無虧欠處更復何求所謂吾何求哉吾得正而斃焉斯已矣聖賢殺身成仁只要覩个是耳若更反顧身後去即成計較之私矣二子既逃國歸仲子於天理人倫已安若仲子更執夷齊之義夷齊亦管不得它彼視國直敝屣耳夫子賢伯夷首陽之節孟子譏其隘夫子仁管仲糾合之功孟子以曾西之所不為孔子雖尊伯夷然只列於逸民之目而自謂我則異於是孟子隘之語起於此雖稱管仲然小器不知禮之譏黒白較然孟子羞稱之語始於此孟子願學孔子故不與諸子處乃真與聖人同符末學所未喻也子貢問管仲非仁詳程子所論知子路不當死於輒之難後世有淺丈夫者始以利合後來值彼患難遂相從以死自以為義者要之與此無異子路之未得為正管仲之未遽為罪者聖人所以開人悔過之門未知然否以所事而死之正也以所事非正而恕其不死權也管仲當時幸然不死却無臨難規避意後來事威公亦無茍合意故聖人權其事宜而謂其可以無死後世為人臣子所事不正既不能蚤辨却到臨變時以管仲藉口此則仲之罪人也孔門三尺童子羞稱五伯以其先詐力而後仁義孔門之稱管仲乃曰如其仁又曰微管仲吾其被髮左袵何孔門不取而聖人深喜其功管仲有仁者之功自不可掩没然其規模淺近器度狹小亦不逃君子之譏孔門功過不揜元氣之流行也孟子功利不道泰山之巖巖也夫子於季康子諸子問門人之仁皆所不許獨首肯管仲豈在他人則進之在門牆則麾之邪仁有粗細說細處孔門諸子多有未能說粗處伯者之臣却能之蓋管仲乃仁者之功功雖可稱道過自不可揜必如三仁廼可耳桓公殺公子糾召忽死之管仲不死以所事而死之召忽之義正以所事非正而可以無死則忽為傷勇故管仲聖門置生死不論仁者純乎天理管仲假仁者也孔子遽許以仁集注以為利澤及人而許以仁之功原其心既未純乎天理則功豈足以為仁乎或以為如其仁者仁管仲之仁者仁管仲之仁前輩此說甚巧但詳此章聖人極口稱道故晦翁不喜此說作誰如其仁解之蓋潛詳文勢當然然大意只及人之功耳其心之廣狹公私則未論至說小器處却見心之廣狹公私瑕瑜不揜子曰志士仁人無求生以害仁有殺身以成仁及其稱殷之三仁比干與焉謂其足以成殺身之仁也若夫荀息守先君之命卒死於難不審可謂殺身之仁否據荀息之事只是以言許先君不敢負它一死謂之信則可謂之仁則未蓋上面大欠商量獻公奚齊之父子於天理人倫上有何道荀息與它一擔擔了只是為賊擔擔故其死也雖不得罪於獻公而得罪於國人所謂但知食焉不避其難之為義而不知食出公之粟為非義若子路是也合夷齊三仁陳文子令尹子文子路事㸔便見仁不仁子貢問博施濟衆與兼愛何以異愚謂博施濟衆皆自我推之所謂老吾老以及人之老兼愛則泛然愛之無父無君之謂子貢㨂極髙大底來說聖人只就低小處說今不㸔聖人意却就子貢脚下起意纔隨子貢意便陷落墨氏所謂老吾老以及人之老此却是低小處發脚即非子貢意夫子言吾未見蹈仁而死者也後又言志士仁人有殺身以成仁者蹈仁有益無害人何憚而不為此勉人為善之語若到殺身成仁處是時不管利害但求一个是而已學者患不蹈仁耳蹈仁則心無計較之私若義所當死而死雖比干不害為正命愛主仁言孔子許子産以惠人集注以為是其心一以愛為主未審可謂之仁否仁者天下之公理若姑息小惠乃是私心不可言仁子産能食而不能教知惠而不知政故聖人但以惠人目之仁則不知也孔子說仁多不同聖人說仁多就行仁處及用心處說孟子以惻隠言仁之端則是仁底正頭面程子說四肢風痺則為不仁亦是蓋其頑然不知痛痒是無知覺仁者此心渾融明達斷不若此惻隠之心是正頭面人之為人滿腔子是惻隠之心然此心不曾流行者障翳未除耳孔門工夫皆是務除障翳故學者隨病求藥聖人對證用藥所以多不同剛毅木訥如何是近仁集注云剛毅不屈於物欲木訥不至於外馳故近仁切疑人之一身若忠信愛敬等皆是大節目若就仁上比並更當何說剛毅木訥有近仁之資忠信愛敬乃為仁之目剛毅木訥四者出於天資而未嘗學問其資全故可語仁未嘗學問故止於近仁巧言令色鮮矣仁是致飾於外以悅人本心之徳斵喪而失其所以為仁也記曰辭欲巧詩稱仲山甫曰令儀令色則巧言令色不見為不可何邪辭色未嘗不欲温和柔順但務巧令以媚人者必非誠實之士既下了此等種子在心將來狐媚蠱毒皆此種子為之故聖門深戒君子而不仁者有矣夫未有小人而仁者也謝氏以為毫髮之間心不在焉則未免為不仁意者君子有一念不仁則便可退而為小人小人有一念之仁則亦可上而為君子以為未有小人而仁豈其隙光半㸃者皆不足取乎君子容有不仁處此特君子之過耳蓋千百之一二若小人本心既喪天理已自無有何得更有仁在己自頑痺如鐵石亦無醒覺之理甚言小人之不仁也此君子小人指心術邪正言君子存心雖正猶有私意間發之時小人本心既無縱有隙光暫見決不勝其虺蛇之毒此章深惜小人之喪失本心也君子而不仁者有矣夫然君子去仁惡乎成名安有不仁者此章為小人設言小人決無有仁心者不可以辭害意子曰人之過也各於其黨觀過斯知仁矣集注云君子過於愛小人過於忍不知合君子小人之過觀之則可以知仁還是君子小人各自於其過處觀之過於厚處即其仁可知過於薄處即其不仁可知觀其人之過可以知其仁不仁矣中含不仁字好仁者無以尚之惡不仁者其為仁矣好仁必惡不仁惡不仁必好仁二者並行而不相悖聖人必於好惡上分輕重何也性各有偏重顔子正是好仁之人豈不能惡不仁只緣好仁意思勝如惡不仁孟子正是惡不仁之人豈不能好仁只緣惡不仁意思勝如好仁故各於偏重處成就茍志於仁無惡也方志於仁未是行得仁安保其每有盡善夫子以為無惡不識志於仁便可無惡否此是君子小人分路猶向東行人一心向東去無復有回轉向西之理西行人亦然志字當㸔心之所之之謂博學而篤志切問而近思何以言仁在其中程子云了此便是徹上徹下之意未知這意思如何博而能篤切而又近如此學問儘鞭辟向裏心不外馳故言仁在其中蓋心存而仁便存徹上徹下謂下學中天理便在此無兩个塗轍學雖博而志則篤問既切而思又近是其日用之間近理鞭辟不向外馳心既存在則仁亦在是矣指存心便喚作仁固不可但離了心外更何處求仁夫子曰有能一日用其力於仁矣乎我未見力不足者則仁若易行也但人不能用其力耳至表記舉夫子言仁曰仁之難成久矣人人失其所好則是人未嘗不用其力也但人之為道逺為器重故人皆不得其至而止耳夫子言仁何難易之相戾如此聖賢言語易處自易難處自難各有分面全在當人領會若欲論仁不須如此考異同異同之學只是尋行數墨到這裏一齊放下當玩滿腔子是惻隠之心方是下工夫人張子曰忠恕便是仁忠恕學者之事誠仁聖人之事忠猶誠恕猶仁學者能自忠恕行之真積力久亦可到此地位樊遲問仁者三胡氏謂居處恭最先先難次之愛人最後不知謂夫子告之有次第還是人做將去當循其次第第一節是為仁下工夫處第二節是趲它屈頭做工夫但向前不必計効驗第三節是推其用克己復禮為仁如何仁者心之全徳惻隠之心是仁之正頭面緣私欲障礙填滿胷次則所謂惻𨼆者始頑癖風痺不復流行發見必須先去己私復還天理則本來面目方始流行發見克己工夫非有它也即非禮勿視勿聴勿言勿動之謂既知此為非禮則視聴言動便當一一復還於禮除四勿之外别無克己工夫工夫既到則私慾浄盡中無障蔽滿腔子渾是惻隠之心而日用之間無非真心之流行發見克己工夫若不於禮上用功必流於釋氏寂滅之學蓋徒知克去己私而不復於禮謂之空寂則可若求其惻隠之仁則如死灰槁木矣故聖人以此告之蓋才知非禮便勿為才克此即復彼才復彼則為此先儒以克己復禮為乾道主敬行恕為坤道豁開雲霧便見青天此顔子之仁淘去泥沙旋引清泉非顔子之克己復禮也克己復禮為仁却疑克己未便是仁如非禮勿視聴言動此是克己工夫既說勿字未便喚作仁意者非禮勿視聴言動所以克己克己方能復禮復禮方始到仁否克去非禮即是復禮無許多支節禮才復仁便流行非謂此處便是仁更著思玩克己是克其非禮之私慾即是下文四句復禮是既去其非禮便還復於禮故除四句之外别無復禮工夫來問分作兩段支節纒攪不是顔子陽剛明決工夫顔子工夫斬截徑決掃除私慾都無勞攘猶如屋裏有盜便開門逐去不令存住其它學者只是固其扄鐍防守冦盜耳所以先儒以克己復禮為乾道以持敬行恕為坤道者此也克己處莫如服藥且掃除許多病痛意思復禮莫如病去後又著逐漸服藥調補意思故上是克己工夫下是存養工夫才有上一截便有下一截相離不得然詳味夫子答顔子克己復禮之目專就禮上說莫是又把復禮便作克己之目否此問支節纒攪不可施於克己但又有一說聖賢所謂克己工夫全在禮上若克己而不復於禮是空門之學也空門一切掃去直是斬截但不復於禮所以雖能掃除私慾然所謂天理之節文則蕩然無有儒釋至相近處却有霄壤分也克己復禮是清其源克伐怨欲不行是制其流仁與不仁可見然非禮勿視聴言動則是有非禮病在謂之勿則與不行者何異克己是掃除私意天理流行於外不行是遏絶私意病根潛藏在心仲弓閉門拒賊賊去門開顔子快刀斬竹一斫一段集注云克己復禮乾道也主敬行恕坤道也莫是顔子純於反已仲弓猶規規然主一以行之故云顔子工夫索性豁開雲霧便見青天故屬乾仲弓工夫著力淘盡泥沙方見清泉故屬坤此處最難認須細心玩聖賢氣象方會得非禮勿視聴是就事物防閑所以由外以養其内非禮勿言動是就自身檢㸃所以由内以驗其外然否四者皆接於外制於外所以養其中無非檢㸃自身如何以視聴為外以言動為内所謂鮮能知味一日克己復禮如何便歸仁果能勇猛如此則是渙然冰釋霍然霧除此理既行故天下之歸仁於我歸如歸鄆讙之田之歸回心三月不違仁集注横渠云云過此幾非在我者楊氏謂欲罷不能意思既分得賓主定後加循循不己之功從此自要住不得正是欲罷不能猶推車然車未行前必須猛下氣力方推得他轉車既行後即輪勢自轉雖欲止不可此時不由人力故云過此幾非在我下工夫人要見此消息便自省力去回也其心三月不違仁只是無纎毫私意有少私意便是不仁入仁之門固是多端有少私意未為害何為便喚作不仁惻隠之心所以不流行者只是私意閉塞滌除掃蕩令閉塞處皆空然後仁始流行若不能下滌蕩工夫許其少少容留在内即根苗不除些少處必會滋長此是今人大病根横渠解回也其心三月不違仁其餘則日月至焉見賓主内外之分顔子一似自屋自住私意蕩盡統體是天理此仁為主於内諸子一似住别人屋主不常在時來時去此仁若屋中之賓然蓋天理時或萌露私意為主故也程門每以此意說與門人語錄可見孔子答仲弓問仁一章程先生云孔子言仁只說出門如見大賓使民如承大祭㸔其氣象便須心廣體胖動容周旋中禮唯謹獨便是守之之法謹獨固是做持敬行恕工夫然心廣體胖動容周旋中禮地位仲弓學力當得未去大賓在庭大祭在堂是時境界如何想是好一片空闊世界只緣未下謹獨持敬工夫欲見此境界不能論語一書夫子言仁未嘗兼義言之孟子談說齊梁間動輒取仁義並言何也仁統四端孔門故止言仁至孟子時人曉性分上道理不得須至細别言之故對分之則曰仁義四分之則曰四端對分者配隂陽四分者象四時統而言之則一元之氣其實一理耳君子義以為質一章只以義為本而程先生添一敬字是何所據而然耶以敬為主則義乃方外是敬為體而義為用若以義為質則禮行此義者也遜出此義者也信成此義者也是義為體而三者為用矣居處恭執事敬與人忠程子以為是徹上徹下語如何徹上徹下謂凡聖皆是此理聖人一語小則樊遲可用大則堯舜不過程子所謂語有淺近而無包容不盡是也其說備見於仁智二章下學中天理便在此無兩个塗轍此心學也未純熟時但曰下學已純熟後即是上達無兩个塗轍行己之恭與事上之敬亦可移易否敬者恭之主於中恭者敬之持於外亦有互見時節徳之不修一章分明是逐項逐條理會然聞義不能徙不善不能改兩句似相協若是上是遷善下是改過則須是改不善以徙義不知可做一串㸔否徙義不必因過而徙但聞人善言即當遷徙已見而移就之若徒知善言之美自安已見不能即徙而從之則何取於聞義此與舍己從人之意同改過自是一項也子罕知者不惑仁者不憂勇者不懼憲問言仁者不憂知者不惑勇者不懼何先後之不同先知而後仁勇者就入徳而言先仁而後知勇者以就成徳而言據徳依仁據依兩字可移易否據如手所執之杖依如身所衣之衣杖則容有時離手衣則不容須㬰離身是一節宻一節也朝聞道夕死可矣此聞非謂耳聞謂心悟也即程門所謂一日融會貫通處為學若不見此境界雖皓首窮經亦枉過一生若已到此境界雖死無憾亦不虚了一生也非是聞道之人必要夕死但茍得聞道雖便死亦可無憾深言學者貴早聞道耳君子博學於文約之以禮與孟子博學而詳說之將以反說約也意相似否博學必約之以禮是重在約禮博學正將以反說約是重在博學蓋博固不可不反於約然非博亦不能遽反於約二者合而後備乃互相發也顔子當博文約禮之時既竭吾才直是大段著力及夫所立卓爾之後雖欲從之末由也已至此又無所用其力不知合如何下工夫到此際力無所施乃氷消雪釋渣滓融化之境雖聖人不能授顔子顔子亦不能受之於聖人今欲學顔子未須問他此處且把博文約禮作依據日積月累人十已千備見髙堅前後境界將來不知覺自有豁然融會時仰之彌髙鑽之彌堅瞻之在前忽焉在後其㫖如何髙堅是顔子初學時未有所見如此瞻之在前是見道在前在後又見道過後了瞻前忽後此顔子恍惚見道未真故不定自孔子循循然有次序教之先博以文後約以禮非博文則不能約禮徒約禮而不博文則禮之所約者何事約禮是非禮勿視聴言動如今人師友相議論退須自省在身可也循循又有不已之意參前倚衡何物參倚坐立所見何物可見參前倚衡不是有个外來物事便見忠信篤敬坐立所見要常常目在之耳此是學者存誠工夫令自家實有這个道理鎮在眼前不相離如有所立卓爾夫子徳盛仁熟自然到此地位上立顔子却見道在前欲要去此地位上立便自不得此雖欲從之末由也已使顔子假之數年工夫亦可到此顔子未達一間耳夫子樂在其中與顔子不改其樂如何樂只一般須㸔所樂何事二程被濂溪㸃當從此醒悟今說文字不難須尋得他地位方為善學耳孟子三自反與顔子犯而不校氣象如何顔子一身渾是義理不知有人孟子見義理之無窮惟知反已顔子之量無涯孟子之言有迹但欲學顔子先學孟子子曰吾道一以貫之曾子曰忠恕而已矣一是一心一貫對一个萬殊字乃是以一理應萬事如錢貫以一條貫許多錢易曰聖人何思何慮天下殊塗而同歸百慮而一致又曰太極生兩儀至於生四象生八卦生吉凶生大業皆是以一理貫萬殊如人讀一卷書有千條萬緒讀了時却把一卷道理融化在此心備衆理而該萬用㸔人問他恁處只是就心應他聖門子弟多是去理會千頭萬緒被他横塞胷中只是多而不知融化了㸔曾子問一篇於事事物物人所不㸃勘者皆㸃勘過夫子知曾子做多端工夫了著得一貫道理㸃化他惟曾子理會得過處故一唯之外餘無辭至於出告門人則曰忠恕者何也蓋他人曉未得不可躐等使曾子便把一貫說門人曉未得故就學者身上討兩个字形容一貫固不外中心為忠如心為恕此心是中便是一推是以及人為恕便是貫學者則謂之忠恕聖人則謂之誠仁忠猶誠恕猶仁程子曰恕行乎忠者也子思言違道不逺却是忠恕正頭面曾子把忠恕說一貫所以不同一貫之學夫子亦語子貢子貢擔當未過故有疑辭不如曾子見得透徹一貫有兩个此是以一理貫萬事若夫下學上達精粗本末與此不同一貫者以一心而貫萬事之謂也忠恕者盡吾心而推及人之謂也聖人一心渾然天理事物各當其可猶一元之運萬化自隨初無著力處至於學者須是認得人已一般意思却安排交入塗轍須是下工夫方可要知忠恕是一貫意思一貫是包忠恕而言忠恕似个生底一貫一貫似个圓熟底忠恕耳曾子在孔門大小事都去理會將過只是欠个串套工夫夫子到此㸃當交醒曾子豁然開悟至教門人却只指忠恕而言程子又以維天之命於穆不己而言忠乾道變化各正性命而言恕然則天地是个無心底忠恕聖人是个無為底忠恕學者是个有心底忠恕其實歸于一而已矣一貫忠恕雖有大小之不同大要都是心上做出聖人之心渣滓浄盡統體光明具衆理而該萬用故雖事物之來千條萬目聖人只是那一个心印將去全不費力如繩索之貫錢然易所謂何思何慮殊塗而同歸百慮而一致者正聖人一貫之說也彼學者之心被私慾障蔽未便得他玲瓏須是逐一蕩滌以類而推方能自已及物如子貢所謂施諸已而不願亦勿施諸人却是忠恕正頭面使學者工夫純熟則一旦霧除雲散自是一貫境界是知一貫乃聖人事也忠恕特學者事但聖人見快學者見遲一貫是熟底忠恕忠恕是生底一貫本非有二道也曾子恐門人曉一貫未過故借忠恕以明一貫是將一貫放下說了若程子於穆不已各正性命之言則借天地以明忠恕是將掲起來說了彼此互相發明在人領會之耳程子所言是無心底忠恕進一步說了曾子所言是用力底一貫退一步說夫子之道忠恕而已矣如曾子所言則忠恕便是道忠恕違道不逺如中庸所言則不可便以忠恕為道忠恕是學者事論語是借學者以明聖人乃是升一等說中庸直言學者事是本等語論語是一貫地分中庸方是忠恕正地頭論語一貫與中庸合内外之道程門體用一原顯微無間之說同否道理只是一个道理有就吾心性上說者有就事物上說者自是兩樣頭面今人都作一般㸔了如何謂之識道理夫論語之一貫即中庸所謂合内外之道者也聖人所以能推一心以貫萬事者正緣他胷中渣滓浄盡統體光明具衆理而該萬用故雖事物之來千條萬目聖人只此一心應將去全不費力滿腔子都是道理更無盡限才無盡限更不分内外分中邊才分内外便是有盡限了才有盡限則便不能以一心而貫萬事如何謂之合内外易曰天下何思何慮殊塗而同歸百慮而一致一貫之說也至於程門之說又就物理上論即論語所謂下學上達形色天性灑掃應對精義入神之謂也及其歸則一而已曾子曰夫子之道忠恕而已矣程子曰以己及物仁也推已及物恕也以與推何分别又曰忠者天道恕者人道忠者無妄恕者所以行乎忠者也忠者體恕者用大本達道也此與違道不逺異者動以天耳仁者渾是天理流行故不待推恕者未免私意間隔故必待推忠恕是對立道理故以體用言其體無妄故言天其用推行故言人夫子告曾子子貢以一貫之道晦翁謂彼以行言此以知言既是一貫如何分得以忠恕而明一貫驗得是行以學識而明一貫驗得是知一貫固不分彼此但向人語處入頭各有塗轍耳夫子之道忠恕晦翁曰盡己之謂忠推己之謂恕伊川曰忠者天道恕者人道二者之說有異同否盡已則忠實無妄為恕之體故言天道推已則公恕流行為忠之用故言人道天人之分體用之謂也子曰性相近也習相逺也此固有上中下三品之不同惟上智與下愚不移夫不移者豈不可得而移邪如果不可移則性亦有不善者性近習逺是中品等人可上可下其性可以習而移若夫超然之上智冥然之下愚是他生來賦性殊絶其品一定非習所可移也故前輩謂善固是性然惡亦不可不謂之性皆是氣禀之性也古者民有三疾今也或是之亡也晦翁謂氣禀之偏者謂之疾而取范氏説末世滋偽豈賢者不如古民性之蔽亦與古異竊謂時固有古今而氣禀之性亦有古今之異歟氣數有淳漓故生物有厚薄只正春時生得物如何迨春末生物便别後世生聖賢既與古不同即生暗蔽愚人亦欲如古不得毋意毋必毋固毋我意見與意念不可無不是不好只私意便不是意才私便生計較如做一件事固是公界然不免有千名好譽雖公亦私所謂有意以為之即私也我者如今人自稱强自道才髙過人但知我不知有理義一向任意做事此即是私意也上意字只做意見意念之意必者必期之謂固者固滯之謂必在事前如事未來先自計較有準擬之心此事未來而心已忙固在事後如事已過者只執滯事已去而心不化四者合說晦翁所謂始於意成於我者此也子絶四程子以為母非禁止之辭晦翁以絶者無之盡也不識聖人四者盡無之後更有何物只有孤單底義理不可一息無子絶四首之以無意大學必貴於誠意何也母意之意謂妄念起而為私意則不可有誠意之意謂不起妄念而必實其意此則不可無子曰攻乎異端斯害也已集注云佛氏之言比楊墨尤為近理所以害尤甚觀孟子之論楊氏為我墨氏兼愛無父無君其是非易見也至於佛氏至精說話與吾儒相去不逺如韓退之闢佛原道所言者皆佛之粗也至於精處如易所謂無思無慮也中庸所謂中庸不可能也夫婦之愚可以與知與行及其至也雖聖人不能知不能行也佛氏曰但願空諸所有謹勿實諸所無心虚無我本無中庸何能之有本無知無能何知能之有孔子吾有知乎哉無知也則謂孔子真無所知顔子屢空則謂顔子不與物接殊不知顔子空中却含萬象吾之本體却是虛明事至則應了無滯礙雖無而未嘗不有也至於佛氏之空虛真是無了雖是盡性處私欲消盡與吾儒不相逺只争个有無故世間髙明之士見理微妙處如程門中髙弟謝顯道楊龜山尹彦明多入於佛教流於虚無寂寞之境故其害為尤甚若夫世間無知之夫惑於佛者只為利害禍福之應而已故程先生曰向之入人者乘其愚昧今之入人者乘其髙明也舊注說攻治異端反為吾道之害與孟子闢楊墨正相反集注謂専治而欲精之為害甚矣未知孰是凡今後學捨聖學而入小道者其意皆以為捷徑得利不知反以害己今日之攻時文是也何謂下學上達下學上達如言曲禮三百威儀三千無一事而非仁也理會得底則一部論語聖人雖就人事上說却無非言性與天道處理會不得底雖皓首窮經鑽破故紙仍舊不聞道此處只闗係自家心裏存在與不存在耳心才存在則見其然必知其所以然若不存是謂習之而不察今人只說事理一貫然亦須分别次序始得如程子言形而上為道形而下為器須著如此就下學人事自然上達天理若不下下學工夫直欲上達則如釋氏覺之之說是也吾儒有一分學問則磨得一分障礙去心裏便見得一分道理有二分學問工夫則磨得二分障蔽去心裏便見得二分道理從此惺惺恁地不令走作則心裏統體光明渣滓浄盡便是上達境界喟然而嘆一章何物如此難求自非聖人生知之聖凡學者之求道皆當下死工夫所謂死工夫者只是理會一个心必掃去心中私慾方見得道理通透蓋吾心已具此道理惟是私慾障蔽了故不見道學之所以難者只是心體難得光明顔子自博文約禮上逐節下工夫到這裏滓渣逐旋消盡是以喟然而嘆深述其先難之故後得之由到得見理皆透徹後猶未能立於卓爾之地此處却猛下工夫不得須待自然融化此一步最難愚意謂道之難求處最是私慾難克道之著落只是一片心能使私慾蕩盡無餘遺則心體昭融而道在我矣顔子之學無他學為聖人而已聖人之道不在聖人只在心裏著落顔子初學時渣滓填胷障塞了這个道理方欲去鑽仰他又愈見他髙堅全要入頭不得瞻前忽後處却是心地略略光明依稀見得些子猶未有真見在自聖人教他博文約禮顔子方纔有入頭處博文是事事物物較量將過約禮又逐一收拾上身上顔子得這門路一向低頭做去心地日開一日自要討住不得到得真積力久却全無一㸃渣滓盡是道理流行方見得此理常在面前立地此時方是十分見得親切但要如聖人在這地位上立又自立未住蓋緣聖人心地融洽貫通打成一片所以常在道理上立顔子能守而未能化三月之後不免有少間斷猶是心麄了所以去聖人只争些子今人若要到這境界不過自博文約禮中來不踐迹何以為善人迹謂古人之舊事善人天資自好事事暗合古人不是規規蹈古人之轍迹底人先生又云是他生質自好不是隨人脚後行温故而知新可以為師矣蘧伯玉行年六十而知五十九之非此非吾身過惡之非也學得見識益髙義理益著而温習故舊知後來自有新功徳日新日日新又日新是也然後心明理融其應不窮可以為人師師者資師之謂此兩句大包義理不可作輕說了才輕說了如何温故知新便為人師論其極則為人師便是人樣所謂動而世為天下法非夫子不足以當之漢儒專門名家各以一經授人亦謂之師與這个師亦異矣於温故中知識又長一格乃不竭矣此與記問之學正相反記問雖多是死底知新是生底夫子言茍有用我者期月而已可也三年有成布置紀綱一年可辦風行俗易須待三年此是聖人事又曰善人為邦百年亦可以勝殘去殺又言如有王者必世而後仁此是興王事不知三年七年百年必世之近逺其規模亦可略見否舜一年成市三年成都若到得民躋仁夀比屋可封亦須必世而後可漢髙帝業已定七五年間民便可用至刑措不用直到文景積累六七十年方可聖人與天地同流故化成之効速而大善人若山海藏納故涵煦之功遲而小齊變可至魯魯變何以至道王道猶人之元氣齊魯之初均有此元氣只緣中間元氣各受些病齊求速安不於元氣調養便以烏喙投之一時却得康强不知元氣已被此壊了魯未曾用藥猶得中毉元氣却未壊聖人與調理出便自渾然本來个人齊元氣已耗於烏喙醫欲治之定須先去了烏喙一段毒始下得調理方法到此時方與變魯相似齊魯俱是聖賢之後本都是王道但魯則中間廢壊用著修葺魯雖不能修葺然不曾改易周公法制仍舊是這骨子故聖人變魯一番修葺便可復王道之舊齊自威公以來一反為功利之習把太公遺法一齊變了雖一時振作却傷動好骨子設若變齊須除去許多功利了方還得骨子重新修葺一番始可復王道之舊譬如兩个器用却是好上牢骨只損壊合著修整這骨素依舊尚在齊却不合用中牢物料修整雖一時光輝却把元骨子壊也故變魯只用一許多氣力變齊須用兩許多氣力麻冕禮也注云三十升一升是八十縷一眼簆用兩縷千二百眼簆極細布如禮三月之服十五升去其半世俗以為七升半不知乃是一眼簆用一縷如今單串黄草布大徳不踰閑一章集注云此章之言不能無弊弊處何如弊在出入可也聖賢心宻若大若小皆不令有小罅漏子夏功疎只照管得大處小處不免走作故有此語便是開一線縫不是盛水不漏工夫今人連大處走了又子夏之罪人宰我言語科所言必有過人者如戰栗之對短喪之問井有人之問殊可姍笑戰栗誠失言此是宰我能言之病取辦於答問之頃口給以禦人若短喪井有仁之問乃是不飾辭以自欺欲討論到真實處宰我以言語名想是長於奉使專對之事子貢亦有此長史記可見其不足者學問之言也故聖人謂以言取人失之宰我程子謂子路只緣不達為國以禮道理若達便是曾㸃氣象借使子路達得此禮何以見得與此氣象同天髙地下萬物散殊而禮制行矣曾㸃胷次正如此子路參得此透時即油然天理呈露無許多麄骨氣矣子路問事鬼神一章集注云死生人鬼一而二二而一死生人鬼雖幽明之事了不相闗然天地間不過聚散隂陽屈伸聚則生散則死伸為人屈為鬼有聚必有散有伸必有屈理一而分則殊分殊而理則一非微𦕈不可信之事也君子於其所不知蓋闕如也是責不能闕疑而率爾妄對也疑則思問夫子之責子路何意疑則有問可也子路不曉正名之㫖不能虚心請問便率爾强辨反以聖人為迂是尚得為問乎夫子為政以正名為先必將具其事之本末告于天王請于方伯迎公子郢而立之夫衛輒蒯聵皆無父之人春秋之法人人固得而誅之孔子果執衛政如何廢得衛君告于天王請于方伯或被不從立子郢郢又辭在聖人又將如何宜子路以為迂既是以正名為先使衛君果用夫子夫子第一義且與敷陳義理整頓名分方做得他官爵幸而見從固無可說如其不從方似集注施行次第或不可則止蓋是時未曾委質事他乃是先正名分不是先事之而後謀之進退之間綽有餘裕竊意聞與達相似而不同子張以聞為達雖認頭差錯然亦難分别聞達常人只做一般㸔被聖人别出來便分君子小人聞是名聞于外而中未必有達是實有諸中而聲發于外子張色取仁而行違又毅然處之而不疑故能名聞于外而中實無有達則反是下三句正反上二句聞是求其名達是充其實玉石相反崇徳辨惑子張樊遲之問夫子告之有異者抑因其病而藥之歟才開卷頭便當識此今日為學亦當如此且各家自毉本身病如前章問達皆是對證用藥子張務外而性率樊遲計近效而理未明聖人各隨其病而箴之臧武仲以防求為後於魯范氏謂之好智不好學夫智施於要君非正不可法明矣夫子論成人復取其智何故成人一章是合諸子之長為一人此是已鍜製底丸散雖毒不為害若只用一物無諸藥相濟必毒人矣孔子於舊館人之喪遇一哀而出涕遂脱驂以賻之顔子之死其哭之慟乃不肯與之車何耶脱驂舊館以其在旅無以將哀也靳車顔子以其有父可以主喪也夫子五十以學易可以無大過夫學易於知命之年所謂禍福吉凶之理進退存亡之故皆可以黙識而周知尚何過之可言豈未學易之前亦嘗有過來學易無大過則猶未免於有過也到聖人地位越見義理無窮儘有不到頭處所以聞過則喜昌言則拜歴代聖人存心如此幾曾道無過謂聖人無過此淺學之談聖人一生學問未嘗自說無過至此境界才言無大過猶似有小過在雖是謙辭然道理真實無盡期當㸔此等為聖人氣象夫子温良恭儉讓此子貢形容夫子之徳如此不知五者足以盡夫子否此最善形容處如畫出一夫子若張而大之却與聖人不相似也子與人歌而善必使反之而後和之晦翁云蓋一事之微而衆善之集有不可勝既者如何必使復歌者既欲彰其善之實又欲暢其歌之情而後和之者示我樂善之無倦詠歎而淫泆之也只一歌詩耳而意思綢繆容與若此豈非衆善之集乎孔子從先進是夫子無取於文也然周監二代郁郁乎文夫子又從之何耶從先進是夫子欲復文武周公之舊即從周也文必似周公之舊方可從周末文弊已不足為文矣從周者三代損益之勢當然從先進者周末文弊救之當然並行不悖怪力亂神夫子不語而春秋一書常事不紀所紀皆非常何耶春秋經世之大法所以懼亂臣賊子當以實書論語講學之格言所以正天典民彛所以不語博施濟衆與修已以安百姓乃堯舜儘做得底夫子以為猶病如何堯舜在上保得天下無窮民否天地之大人猶有所憾見得道理無盡期聖賢亦未有盡處安得不反躬自責籩豆之事曾子以為末俎豆之事夫子則嘗聞之矣不以為末何也軍旅對俎豆則軍旅為末道徳對籩豆則籩豆為末鄉黨一書盡言孔子中間又言君子朱先生謂君子即孔子何不便說孔子即孔子做底便是衆人合做底故間稱君子聖人以身為教故記者以教法書之孔子言王道只言禮樂如夏時商輅周冕是也孟子言王道只言政事如衣帛食肉經界井地是也意者孔子言王道之本孟子言王道之務孔子為學者言止言經世之大綱孟子謂時君言當論濟時之急務子罕言命中庸首言命何也性與天道聖人罕言乃不躐等之教學問之家所理會者何事却禁人口不言邪孔子言射曰其争也君子孟子言射曰不怨勝己者反求諸已此是全無争惟其不怨勝己者其争也乃君子之争而非小人之争既謂君子之争則雖争猶不争矣君子之争者禮義小人之争者血氣孔子曰父為子隠石碏使人涖殺石厚大義滅親如何證父家之私事事主恩故見父而不見他人除亂國之大事事在義故見君而不見其子道理不一當在父子則父子重在君臣則君臣重所謂為人子止於孝為人臣止於忠地位各不同也孔子曰邦有道貧且賤焉恥也答原憲則曰邦有道穀恥也上章之恥恥於無徳可進下章之恥恥於無道可行仕宦止於食穀他無一事可為是亦足恥也經中是含此義孔子自衛反魯於詩樂之正惟及雅頌而不及國風何邪自衛反魯止是正樂非謂刪詩雅大率朝廷之樂章頌大率宗廟之樂章風詩可奏於樂者惟二南及豳風詩云以雅以南禮云取豳風列國多不正之聲廟朝所不奏故正樂只言雅頌過庭之訓夫子必曰學詩學禮閒居之時語子貢亦曰詩之所至禮亦至焉六經皆經也惟詩與禮聖人每兼言者必有相資處詩書易儀禮周官是古書是時未有六經之名書紀帝王事易是卜筮書周官是職官法守條例之書於學者未為切要詩能興起人心儀禮可固人肌膚之會筋骸之束於初學為最近故聖人以此為學者門户今世則以論語孟子為門户子在川上一章孔子只是說天地間道理流行無有窮盡如水之更往迭來晝夜常恁地初無一朝停息即此是道體大意亦可見集注云自漢以來儒者皆不識此義如何自漢以來號為儒者只說文以載道只將經書子史喚作道其弊正是鑽破故紙不曾聞道所以道體流行天地間雖匼匝都是自家元不曾領會得然此事說之亦易參得者幾人必如周程邵子胷次灑落如光風霽月則見天理流行也夫子素隠行怪吾弗為之矣又曰舉逸民天下之民歸心焉夫既惡之而復取之何不侔素隠行怪乃賢智之過者不是不好底人但不合聖人之中庸故不為之耳前言戲之耳善戲謔兮此亦聖賢有底事横渠謂戲言出於思也莫斬斷太過否善學栁下惠者當如魯獨居之男子𢎞毅任重道逺可移易否𢎞言其量之容猶大車之足以載重毅言其力之勁猶健馬之足以致逺可以移易非聖人之文矣子謂顔淵曰用之則行舍之則蔵按集注引尹氏一段言用舍無與於我行蔵安於所遇命不足道也既是以所遇而言則命在其中矣此蓋隨遇而安不待以命自處乃聖人樂天事以命自處賢者以下事命在其中此語得之但不說耳吾斯之未能信指何物而言程先生曰漆雕開已見大意斯乃指心而言心者萬用之源漆雕開於心體上猶覺羣疑滯胷未到昭晳融會處所以未敢出任必欲吾心無毫髮之疑透底光明瑩潔而後可是其所見已自髙於世俗諸儒但其工夫未到頭故止於見大意耳夫子說者說其學知大原不安小成衣敝緼袍一章子路不以貧富動其心而可進於道如此在陳絶糧如何耐不得至於愠見子路於世間名利闗大界限分明處已見得破但其工夫麄疎未入聖賢閫室所以聖門常欲抑其所已能進其所未能子畏於匡顔淵後子曰吾以汝為死曰子在回何敢死不識夫子設或遇難顔子亦當死底道理朋友同遇患難有相死之義謂各盡其扶持救衛之道無委棄之理若死不死則有幸不幸存焉非必輕死求鬬謂之相死也孝者百行之原曾閔之在孔子均以孝稱徳行之科何曾子不與想曾子是時徳行未成兼四科之說起於後世不知當時只指從游陳蔡者言之或是當時曾子不在行也士見危致命見得思義祭思敬喪思哀外此於性分之所當盡職分之所當為者豈無他事而子張以為其可已矣語莫欠圓否士者一男子之事古人說士處多如此不要將君子小人雜㸔了只此等事豈易非竒男子不能子張語病在末梢句三年無改游氏謂亦在所當改而可以未改者耳敢問事變隨宜雖孝子繼父豈能無當改處但方哀戚之中雖所當改亦未暇改蓋哀戚之心有以勝之耳邦有道危言危行似非中庸之道何聖人捨中庸而從危峻髙峻者廉角之稱非詭險不平正之謂士必有廉角乃是持身中正庸常之理況能視時舒卷豈非中庸之道邪今以毁方瓦合同流合汙為中庸此聖人所以惡鄉原也危言危行固非中庸之道但用之有道之世儘不妨用之無道之世不可不斟酌故聖人只許危其行不許危其言見不是常用道理不患莫已知求為可知也愚意才有求字用意已自不實了於在外不可求於在我則不可不求所謂君子之求之也其諸異乎人之求之歟君子貞而不諒又曰友諒何如貞有正固之道諒乃執信之義諒對貞言則視正固為不足止為小信若專言之不害為執信之美徳從事於六藝之文所以致知格物也大學以致知格物為先論語游於藝乃在志道據徳依仁後何邪格物謂窮極乎物之理游藝則玩適乎藝之事窮極其理講學之先務玩適其事徳盛之餘功游藝在據徳依仁之後最著玩味與博學於文教六藝之境界全别有初學成徳之分蓋此是徳盛仁熟之後等閒玩戲之中無非滋心養徳之地如孔子釣弋是也從心所欲不踰矩者正其境界歟文詩書六藝之文必學文者蓋致知格物由於此也自致知格物而充之於力行則自正心誠意而下方有許多道理古人之所以自正心誠意至於治國平天下不過孝弟謹信汎愛親仁許多事夫子則以為行有餘力而後學文毋乃從後一截工夫做將起弟子乃小學之人小學之事專教之以六藝但聖人尤欲其務本故必先教之以孝悌謹信親仁取善其本既立乃可學文是小學之事格物是大學之事學文止謂習其事格物方明其理故學文為小學之終事格物乃大學之初功晉文譎而不正齊桓正而不譎二公皆假仁者何夫子便以正許桓公以二人相較彼猶善於此其得罪於三王則一耳興詩立禮成樂雖大學之次然古人小學巳學此矣是知古人終身之學不離乎三者之中要知躬行之久自有所得興起善端則於詩有得故朱子以為非初一節止理詩也此三者論終身所得之序非謂始初為學次第來說大槩得之但說終身之學不離此三者仍是錯了若曰所學有何限量但既學之後其始興起處是於詩上有得其中存立處是於禮上有得其終成就處是於樂上有得中庸之為徳其至矣乎程子云不偏之謂中不易之謂庸中者天下之正道庸者天下之定理蓋謂不偏方是正道不易方是定理上兩句正解字義下兩句復說道理如此謂不偏便是正道不易便是定理來說方字失意子曰富而可求也雖執鞭之士吾亦為之集注以為設言富若可求則身為賤役以求所不辭也然有命焉非求之可得也則聖人特限於命之所不可耳義以責君子命以安中人此章為中人以下假設耳顯道曰顔子學得親切如孟子不知顔子所學甚處與孟子相似學顔子有依據孟子才髙難學蓋顔子之學親切勝如孟子也來問錯認動容貌斯逺暴慢矣一章斯字之義如何君子持敬成熟開眼便見此理更不待旋次安排謂如一動容貌當下即無一㸃暴慢一動顔色則便近信一出辭氣即便逺鄙悖蓋持敬効驗如此若待言動之後旋次㸃檢安得相應之速如此學者持敬工夫當其未成熟時須著呼喚方來及工夫熟後須見此等境界然後謂之成熟蓋斯之為言猶綏斯來動斯和應驗疾速之謂也古之學者為己今之學者為人實心為善是為己夾帶名利是為人夫子謂上智下愚不移若下愚困而能學加人百倍工夫可以轉移否程子謂非不可移人自不移耳若據論語而言則是生來性品已絶決無可移之理程子謂灑掃應對便是形而上者故君子只在慎獨灑掃應對雖是至麄淺底事但心存在則事不茍此便是上達天理處謹獨是存主此心存此心便是存天理夫子以驕泰分君子小人大學所謂驕泰失之矣如何分别本是一事聖人隨事設教自分别出來則有霄壤之分如此比周和同聞達等皆是至今大學只作一字用遇當别時須還如論語分别其為人也孝弟而好犯上者鮮矣晦翁謂鮮是少若說鮮矣則未以為絶無孝悌之人猶有犯上之意邪孝悌之人資質粹美雖未嘗學問自是無世俗一等麄暴氣象縱是有之終是罕見到得麄惡太過可保其決無言孝悌之人占得好處多不好處少道千乘之國一章似皆就政事上說集注謂此特論其所存未及為政治國有刑政禮樂紀綱文章萬目皆當開張此條且論他存心處乃為政之本其他未暇及信近於義恭近於禮晦翁以近為合中近者附傍之謂約信之初須是附傍於義而不為一切之信則將來言斯可踐為恭之初須是附傍於禮而不為太過之恭則將來不恥辱此一章三事不可做一串㸔始於為信時能近於義則將來言斯可踐始於為恭時能近於禮則將來可逺恥辱始初如因依進身時得一可親之好人將來此人也可做宗主不止一依他也三事皆欲慮終而謹始不可一時茍且性中只有个仁義禮智曷嘗有孝悌來今人生則知愛其親長則知敬其兄皆是心中流出畧無一毫勉强意思然烏知其非性中所有邪此不待說但先儒慮學者以仁後孝悌入先有孝悌而後有仁故特轉此語以别之蓋孝悌乃是仁流出不是仁從孝悌中入性只是四端其他衆善皆四端之支分派别也仁是性孝悌是用用便是情情便是發出來底論性則以仁為孝悌之本論行仁則孝悌為仁之本如親親仁民愛物皆是行仁底事但須先從孝悌做起人有此心以其有此徳也此心不在便是不仁禮之用和為貴程先生皆以和作樂說朱先生獨作禮說何所折衷說經且㸔大字者小字者只說大字理出今大字只言和即非樂可知小字却言樂者蓋禮之和處便是樂所謂行而樂之樂也故以樂事襯貼和字非於禮之外别取一物來解和也認程門說話熟者不差程子曰知巧言令色之非仁則知仁巧言令色固是非仁所謂則知仁者莫便是剛毅木訥近仁之說惻隠之心是不安排不裝㸃之真心欲觀仁者當於此處驗之巧好其言令美其色安排裝㸃以求媚於人是誠何心盡己之謂忠以實之謂信信便是實而朱子乃云忠是實心如何忠是心之實信是言之實程子曰樂由說而後得非樂不足以語君子據本文君子乃係於人不知而不愠之下而此云爾者豈是到不愠處方是真樂否說然後有樂樂然後有君子此言三節之序禮之用和為貴集注謂和者從容不迫之意蓋和乃出於禮之自然却非是禮外面事也如人知父合坐子合立君尊臣卑皆出於天性之自然無一毫勉强意便是禮之和而禮雖有節文之多聖人制作更無强人處皆是合用如此人才知此意便安而行之安處便是和則先王之道於此為美小大皆由之矣又何有所不行謂知和而和不以禮節之亦不可行晦翁謂知和而和却是一向去求安須是離了禮愚意謂既知和本於禮人皆安而行矣何至於求安而離禮而又以禮節之乎集注謂嚴而泰和而節此理之自然禮之全體也其語已精切更乞詳示禮之用處以從容不迫為貴如季氏祭逮闇而祭日不足繼之以燭雖有肅敬之心皆倦怠矣此是不和不善用禮者但見其如喫木札然全無滋味子路質明行事晏朝而退孔子許其知禮此是用得從容和易安閒自在古體如此即有生活意思所以為貴且美然若但求和易而失其節文之本體則又却不得有子此語要人活絡行禮又恐其偷減節文故又為之設戒大意和在禮中生則為美和出禮外生則為失夫子温良恭儉讓良何以易直言之古語有温博易良又有易直子諒語集註恐取諸此君子不重則不威一章專以主忠信三字貫一章得否且逐句㸔了然後㸔他錯綜意人道以忠信為主孔子屢言之所以集註欲先立此為主人翁也賢賢易色一章集註謂賢人之賢而易其好色之心伊川謂見賢改色有敬賢之誠愚恐改色之說只改易於一時所謂見君子而后厭然揜其不善而著其善相類易其好色之心者去䜛而逺色賤貨而貴徳所以勸賢也此意却精切來意自是但以改色如大學之語則非此是為惡之小人見君子則有飾詐赧容程子之改色乃是改容動貌肅然起敬意見好賢之有誠心與大學小人正相反不可以是為比子曰道千乘之國一章集註云五者反覆相因各有次第如何能敬方能信能信方能節用能節用方能愛人能愛人方能以時使民此相因之序敬又須信信又須節用節用又須愛人愛人又須使民以時此反覆相因也有子曰信近於義三句晦翁謂此一節須作兩截㸔上是交際之初便用思量著到底下面一截言可復三句乃是近後無弊之效處又曰後來㸔得信與義恭與禮因與親各是一事既曰近字如何各各是一事舊說因信恭而不失其所親近之義禮則可宗是合作一事晦翁方析而為三如今集注所說故云各是一事不見全文恐當如此㸔為政以徳謂以身率之集註云無為而天下歸之如何以北辰取喻豈非無為而天下歸惟是將自家一身與天下做樣子故人只㸔這樣子便自歸去做不假告詔不假叮囑也非其鬼而祭之集註謂非其所當祭之鬼不知當祭之鬼只是先祖否固是今世淫祀若浮屠老子之類皆係非鬼之數若先聖先師則所當祭而祭之者孟武伯問孝子曰父母惟其疾之憂集註云人子能使父母不以其陷於不義為憂武伯貽親憂處多故聖人以此病之惟是以其疾貽憂此却人子無可奈何與其他招憂不同巧笑倩兮美目盼兮素以為絢兮既是以素分何以謂之絢子夏正如此發問既是以素分何以謂之絢孔子因舉古語繪事後素以解之謂繪畫之事後於素質蓋必先有倩盼之素質而後可以施鈆華之絢若以吾友之言當云素繪即不云繪事後素矣或問禘之說禘者王之大祭周以后稷為始祖又推帝嚳為所自出之祖而以后稷配之天子七廟三昭三穆與太祖之廟而七各有廟主惟所自出之祖則時節相去甚逺無廟所謂祭者虚空望祭非仁孝誠敬之至不能也才知得禘祭道理足以感此神則於治國平天下之道何難之有夏禮吾能言之一段孔子以為文獻不足徴若以殷因於夏禮論之雖不必待文獻以為徴亦可也所因只是三綱五常固不待取證若其制度文為隨時損益者何限既無文獻可徴雖聖人不能意料臆說也子貢欲去告朔之餼羊竊疑子貢未嘗肉食於魯餼羊當去不當去子貢如何干預此但師友講論非必實司此事曾子問一篇自天子達庶人無不講明豈必身履邪我未見好仁者惡不仁者愚意好惡不兩立才好仁便惡不仁是一箇體段雖賢人君子自有禀隂陽之意偏重者好仁者禀陽氣重顔子是也惡不仁者稟隂氣重孟子是也顔子正是好仁之人豈不能惡不仁只緣好仁意思勝如惡不仁孟子正是惡不仁之人豈不好仁只緣惡不仁意思勝如好仁雖學問情性有互相發見之時但終不勝偏重者是各有偏重成就顔子一味祥風慶雲孟子只是泰山巖巖我未見好仁一章此有三節有三未見本文可玩如欲見聖人而不能故思見賢人欲見賢不能故思見善人之類集註云程子曰維天之命於穆不已忠也乾道變化各正性命恕也天本不可以忠恕言但上面是天之誠下面是天之仁晦翁欲人之易曉乃借忠恕譬喻使人知天之誠即學者之所謂忠天之仁即學者之所謂恕濂溪只是个幾字横渠只是个豫字伊川只是个敬字皆平日涵養之熟得他受用故觸處不忘一貫與中庸合内外之道程門體用一源顯微無間之說同乎一貫有兩个頭面如論語中說却與中庸合内外之道是一个頭面蓋論語一貫只是心地統體光明含具天地間道理㸔事業如何様來只是一心印將去中庸合内外之道亦說性是虛明之體緣他虛明了便具許多道理故未應非先已應非後要分内外不得此乃說性與天道處自是論語一貫境界若體用一源顯微無間是說下學即上達形而下者即形而上者精粗本末只是一理與前一貫不同但這兩様到識心見性時依然是一串事一貫是以一貫萬就道理總頭上說一理是以道貫器是就逐物上說事事物物各具太極上即心即性便是太極即事即物各具一太極兩家依然共一家也明道云以己及物仁也推己及物恕也伊川云仁所以能恕恕所以能愛是則恕是仁之發見質之明道所言則以己及物尚有事於推乎恕之得名只是推己之義然所以能推己者為是人心有其仁也若元無是仁何處推得來明道云忠恕兩字除一个不得而夫子曰行之以忠是除却恕又曰其恕乎是除却忠忠恕果可以盡一一界可止於忠恕乎此一段最宜詳味是論語第一義不可只如此㸔行之以忠行處便是恕其恕乎所以恕者便是忠所以除一个不得也集註云以己及物仁也推己及物恕也仁是不待勉强恕待推方可故於無勿字上分别然以字與推字最難認得親切若己所不欲勿施於人與能近取譬處固是恕分明至於我不欲人加諸我與已欲立而立人集註謂是仁之體段如此愚以為才說欲字便有勉强意仁者己私銷盡中無障礙故說己即人便在不得以類而推所謂以己及物也恕者方欲滌除己私尚有障礙因已而後及人必待以類而推所謂推己及物也仁恕用心皆是與物公共意思但仁者見得快恕者見得遲耳凡言欲者皆已所欲之欲正是以已所欲者施於人也所不欲則不施若如來問所言當云已立而欲立人已達而欲達人經文却不如此更請詳之一貫忠恕子曰參乎至忠恕而已矣曾子之學主於誠身其於聖人之日用觀省而服習之蓋已熟矣惟其未能即此以見天道之全則不免其有二也然用力之久亦將自得矣故夫子以一貫之理告之蓋當其可也曾子於是黙契其㫖然後知向之所從事者莫非道之全體雖變化萬殊而所以貫之者未嘗不一也此其自得之深宜不可以容聲矣故門人有問而以忠恕告之者蓋以夫子之道不離日用之間自其盡已而言則謂之忠自其及物而言則謂之恕本末上下皆所以為一貫惟下學上達焉則知其未嘗有二也夫子所以告曾子曾子所以告門人豈有異㫖哉一貫如今錢貫蓋以一千之錢散亂無統必是一索串之而後貫一而無遺曾子之學已有此一千了但未有以貫之耳故夫子曉之令其貫於一而見其全體妙用耳程子所言是無心底忠恕進一步說了曾子所言是用力底一貫退一步說了强恕而行求仁莫近焉或疑强恕不言忠出或問晦翁曰有心為恕則忠固在其中矣夫恕者推己及人之謂所謂有心於為之者亦為其推及人之事耳未見所謂盡己之意不知何謂在其中所謂無忠做恕不出忠恕二字不容去一者何說以通之既曰推己之謂恕若自已心元自不實不盡元無忠赤惻怛骨子更將何物推己以及人以此見說恕字必有忠在源頭了所謂無忠做恕不出此語儘有意味人皆不忠之恕惟務茍且姑息於一時不復有已可推亦不復近仁矣子貢曰性與天道不可得聞既下言字了必曾說來非是不言為罕言故學者不得聞横渠云聖門以耳悟為聞之說其說近禪集註不取子文三仕一章晦翁謂子文喜怒不形物我無間就他無喜愠上說其實子文似承當此句全體不去只㸔此兩句似仁模樣故疑令尹當不去須兼㸔下面知有國而不知有身一語方表是忠物我無間謂以舊告新爵祿國家爵祿不可認為己有而妄生喜愠政事國家政事不可認為己能而自分新舊皆忠也行已之恭事上之敬敬者恭之主於中恭者敬之持於外互見意程子曰施諸己而不願亦勿施於人恕也我不欲人之加諸我吾亦欲無加諸人仁也謂仁恕之分在於自然禁止之别以愚觀之勿施於人固强勉行之而欲無一字亦强勉禁止之謂據此一章只有勿無二字分别乃是記者當辨於辭氣之間孔門言語一似法律讀者當如法家一字不可取次過了若不分别此字聖人不與是何故只緣俗語先入故於心裏放不下子使漆雕開仕一章程子謂漆雕開已見大意如何開於心體上猶覺羣疑滯胷未到昭晰融釋處所以未敢出仕見其所見處已自髙於世俗諸儒但其下工夫不到頭故止於見大意耳曾㸃亦然季文子三思而後行子曰再斯可矣集註云君子務窮理而貴果斷不徒多思之為尚大凡應事一思底已是再思則親切三思則計較起私意反生將前个真底失了孟子曰可以取可以無取取傷廉云云晦翁解亦有此意可以取是初來思底可以無取是再思底已見得這个道理故不必又思下文取傷廉皆斷辭也若夫為學之道則不厭思只為應事言之子路尚勇聖人裁成警戒之多矣由也升堂學已造乎正大髙明之域矣其後又死於衛孔悝之難子貢貨殖聖人嘗少斥之矣聞性與天道學已臻於髙明之境矣其後終不能去其富貴之心夫好學如二子作成於聖人而氣質卒不能變何也其是處可為吾師不是處可為吾鑒但當以古人能而我不能自愧不當以我不能而援古人之不能以自恕子路子貢有多少好處冉子請粟與原憲辭粟却疑此當以類相從而為一章若其同時則孔子使子華必是致禮於親故不然人臣無外交古者大夫束脩之問不出境孔子為司冦恐無私使鄰國之理此未必同時記者以類相從子華之使乃師友之禮親故之好必非私交鄰國犂牛之子騂且角祭天地之牛角繭栗宗廟之牛角握社稷之牛角尺以其色既赤又且角中程度也回也其心三月不違仁其餘則日月至焉而已矣仁者心之全體惻𨼆是正頭面為四端之首心茍不仁則頑然風痺豈知羞惡是非恭敬哉然是用工處只是掃除私慾放教惻隠底出來顔子工夫純熟私慾浄盡故三月不違離耳然三月之後略有私意萌動則便是去離了只是顔子不逺復才有間斷處依舊又接續了若聖人則自生至死都無一毫私慾滿腔子都是仁無少間斷顔子所以未達一間者正以此耳諸子工夫不熟或一日至此境界又復離去了或一月至此其功尤疎與顔子不同蓋顔子常在仁裏坐如主人翁雖時或出外又便歸來諸子如賓客相似或一日㸃到此坐或一月㸃到此坐便又出去所以張子曰内外賓主之辨蓋起於夫子至之一辭内外賓主之辨顔子為主餘子為賓主則常常在内時乎暫出而復入賓則常是在外時乎一入而遽出以見顔子之心有常餘子之心無常顔子之不遷怒與喜怒哀樂皆中節如何當其怒時見理而不見怒故怒所可怒而不遷於他此克己陽剛工夫峻潔之甚其要固歸於中節但以中節言顔子無起發人意處濂溪每令二程㸔孔顔所樂何事二程從此得道後絶不明言與學者孔顔之樂非是以道為樂才說以道為樂則以是道為猶在外以我心而樂之便不是孔顔氣象蓋孔顔胷次如光風霽月全無一㸃塵滓滿腔子都是道理故其心廣體肨無入而不自得者所樂即是道也若但以孔顔之樂不可形容而不知其所樂何事則有耽空嗜寂之病聖賢著實工夫豈是欲人懸空坐悟所以濂溪必令二程尋其所樂何事但孔子自生至死常在天理上行故其樂無處不在顔子克已工夫純熟故與孔子一般彼諸子特以道為樂耳顔子之學與曾㸃風乎舞雩詠而歸氣象如何六軍在前萬務在後聖人胷次氣象常如此顔子同曾㸃却不能常如此為其志大而行不掩所以做不到頭知者樂水一章竊謂仁者知者皆指成徳地位也既是成徳事必不拘一端意者各自其性中偏重成就故所樂不同若顔子孟子者邪緣性稟有偏重處故其徳之成就各於偏重處得力所以有二種人仁若顔子知若孟子犂牛之子騂且角司馬遷謂仲弓父賤行惡則是聖人對人子面前目其父為犂牛也而可乎此非面謂仲弓乃居常與門人言之爾只不合多了曰字但前後亦有此例如子謂顔淵曰惜乎之類豈是面前語顔子邪父賤行惡而子賢何害於事必揀不好底豈非無大見識邪孔子以政事稱冉求比用於季氏僅能聚歛而已不知夫子於何取之只以政事稱便於學問上有欠闕所以孔門常攻其短人之生也直實直無妄者人之生理也虚罔欺誕者非無可生之謂特幸免於死耳非生理之正也集註云仁以理言通乎上下有學者之仁有聖人之仁有桓文之仁有堯舜之仁此字上下通稱惟聖不可通稱博施濟衆是仁者極大功用只稱仁字少了他須稱作聖方可耳博施濟衆夫子不以為仁而為聖者之事退之言博愛之謂仁亦未為失而程子乃以退之之言為非謂仁者固博愛謂愛是仁不可不知孰是惻隠之心仁之端也仁者惻隠之根本惻隠乃仁之枝葉謂惻隠為仁之端則可便謂之仁則不可蓋仁主性言惻隠主情言情者性之發見耳非可便以情為性也知此則知愛乃仁之用愛即惻隠之心不可便以愛為仁仁與愛猶性與情猶體與用孔子答子貢博施濟衆之問曰何事於仁必也聖乎晦翁曰仁以理言通乎上下聖以地言則造其極之名也仁大有等數堯仁如天固是仁禹稷拯民飢渇亦是仁湯武弔民伐罪亦是仁齊威攘戎安夏亦是仁下至齊宣不殺一牛亦是仁仁可通上下言耳乃若博施濟衆事必如聖人極致地位做得天下無比底人然後可言博施濟衆然猶似做不到頭聖如堯舜尚以為病此闢子貢之辭飯疏飲水之樂簞瓢陋巷之樂所樂者何事此濂溪㸃化二程子訣二程從此悟道終不以語學者晦翁事事剖露說向後學獨此不敢著語凡說所樂在道以道為樂此固學道者之言不學道人固不識此滋味但已得道人則此味與我兩忘樂處即是道固不待以彼之道樂我之心也孔顔之心如光風霽月渣滓渾化從生至死都是道理順理而行觸處是樂行乎富貴則樂在富貴行乎貧賤則樂在貧賤夷狄患難觸處而然蓋行處即是道道處即是樂初非以道為可樂而樂之也故濂溪必欲學者尋孔顔所樂何事豈以其樂不可名使學者耽空嗜寂而後為樂耶濂溪以此㸃化二程二程因此醒悟後却一向不肯說破與學者至今晦翁亦不敢說破豈秘其事謂不可言傳耶蓋學者才說此事動口便要說道謂道不是固不可但才說所樂在道以道為樂則又非孔顔氣象惟知孔顔樂處便是道道處便是樂則徳盛仁熟之事也要知顔子之與諸子但有生熟之分耳工夫生則樂與道為二不妨以此而樂彼及工夫純熟之後則樂與道為一自不可分彼此矣前賢不肯說破此事正要㸔人語下氣味生熟耳顔子不遷怒見義理而不見血氣故怒所當怒而不為血氣所使三月不違仁内外賓主之辨莫是顔子於仁常在内為主人翁而諸子於仁常如賓客或出或入來意得之今還欲為主耶為賓耶先儒提出此語正欲學者捫心猛省若是為客乍入復出則為無家之人將來必大可哀南豐云有知之之明而不繼好之未可也故加以誠心好之有好之之心而不能樂之亦未可也故加之至意以樂之用工夫却在誠心至意上否此用論語意致知上發源皆先儒所不道南豐屢屢言之度越諸公逺矣但其說樂處語不瑩耳樂者極至之意是他知好工夫到後自見此境界耳若用一物以樂之即非所以為樂志於道一章古者八歲即教以六藝之事明為學之所當先也今於此章末言之而朱子復以為學者於此當求其先後之序輕重之倫似以藝為可後抑志道據徳依仁是大學之事而游藝乃大學之極功邪此却有首尾本末與前章别教之六藝小學之初事游於藝文成徳之餘功小學之初習其文成徳之游適於意生熟滋味迥别志道據徳依仁不知志據依如何用工夫道徳仁又如何不同志於道是一心向聖人路上行欲學做聖人事據徳即志道工夫既成凡向之所志者今則實得於已如有物可執據然依於仁則據徳工夫既熟天理與心為一不可脱離於片時如衣之在人身不可脱舍也只是一个做聖人之心但初來生而後轉熟初來猶是兩片後來方是一物耳聖人從容中道似若無過孔子自謂學易而後無大過若未學易之先亦嘗有過來謂聖人無過此淺學之談聖人一生學問未嘗自說無過至此境界方言無大過猶似有小過在雖是謙辭然道理真實無盡期說者當㸔此等為聖人氣象子以四教文行忠信分作四者何難不識字人亦能之但作工夫人要見四者著落知道平日所學所行總是主忠信自是拍開不離也子曰徳之不脩至不善不能改中庸言自誠必先學問而後力行大學言明徳必先於格物致知而後誠意正心是則博學誠入徳之門今此章首脩徳而遷善改過等事又反在脩徳之後似若無統何邪脩徳講學遷善改過四者明如日星不用無端繳繞只合逐條逐件自勘當已身從頭做去也得從尾做去也得中間起頭亦得興於詩立於禮成於樂其先後次序孔子不特教人如此他日亦以此教其子集註云按内則十有三年學樂誦詩二十學禮論語則先詩禮而後樂内則先樂而後禮此章非為學之序乃論其終身所得之先後也學之序當如内則至其將來得力處其先善心興起是於詩上得力其次操守植立是於禮上得力至末梢徳性純熟是於樂上得力可以託六尺之孤一章託孤寄命如漢之霍光可以當此至於隂妻邪謀納女為后大節處却被人奪了大節不奪如漢之汲黯可以當此然其好游俠任氣節面折不能容人過合已者善待之不合者弗見人亦以此不附焉恥公孫張湯位居其上却又做不得託孤寄命事惟諸葛亮可以當此兩件霍光𢎞而不毅汲黯毅而不𢎞危邦不入亂邦不居有道則見無道則隠使衰亂之世皆如此則興天下之治者誰邪人有不為也然後可以有為民可使由之不可使知之謂政教號令但能使民由行於中不能使民洞曉其理非不欲使之曉也勢有所不能故曰百姓日用而不知夫子稱泰伯曰民無得而稱焉稱夷齊曰求仁而得仁孟子所謂好名之人能讓千乘之國泰伯夷齊亦豈好名乎泰伯謂之至徳夷齊謂之仁皆是發於中心惻怛之誠無一㸃世俗計較利害之私吾友以好名疑之得非以俗心觀聖賢乎學者有千種病好名是第一種只此分君子小人不可不檢㸃𢎞毅二字願詳為講解𢎞則心量洪大猶車之可以任重毅則志氣剛果猶車之可以致逺𢎞而不毅則不能致逺毅而不𢎞則不能任重必任重致逺方可為車必𢎞毅兩全方可為士未可與權漢儒以反經合權故有權變權衡之論皆非也權只是經也既不反經何不言權權者經之對經猶秤衡權猶秤錘秤衡一定秤錘無定所以隨時取中者也為後人多錯用權字一切以反常為權權而不失於正是權之本義故伊川矯正之而指權為經雖言語少過要之權而不失其正雖權也猶經也晦翁已微辨之不忮不求何用不臧晦翁何以知為孔子引詩以美子路愚謂此與衣敝緼袍自是兩章此兩句特是子路雅好誦之故夫子以為是道何足以臧非孔子引之也若子路雅誦此詩即與三復白圭無異而孔子抑之可謂不成人之美矣又不知此章何故在衣敝緼袍之下記事者乃無法度如此請歸與尊翁講之老夫誦師之言亦未能無失且齗齗自守耳蓋子路好勇必無忮求自足於此而道之故孔子因其無日新之功而進焉意必固我四者一節似重一節自始於意而至終於我則私意做愈深集註乃云至於我而又生意發明始終循環之義未曉且就四字各㸔認得頭面定後方㸔他相因處衣敝緼袍一章子路不以貧富動其心而可以進道如此至於在陳絶糧如何便愠見子路與朋友共不忮不求於名利得失事已豁除了子路終身誦之而子曰是道也何足以臧便見聖人會煅煉人如石匠下鐵錐相似子曰富與貴是人所欲也上一段只欲審富貴安貧賤是取舍之分明下一段造次顛沛必於是是存養之功宻子路不以富貴動其心雖是明得取舍至於絶糧是逆境事非樂天者不能處此子路處不得是存養之功尚未宻也顛沛處却又違仁横渠云仲尼絶四自始學至成終竭兩端之教如何據横渠此言謂此是教學者之法雖始學之人便當以此教之他日作聖之功亦在此聖人之教無有不該貫首尾者所謂徹上徹下語也後生可畏集註謂焉知其將來不如我之今日乎不知夫子把自家做甚底地位令學者及時自勉以致此乎人皆有作聖之資聖人直是如此㸔待也孔子從先進無取於文也然周監二代之文夫子又欲從周先進即周家先輩行禮人如周召之類周末文勝寖失周公制禮之意已非周公之文矣從先進者正是反本復始從周公之文也顔淵死門人欲厚葬之集註云喪具稱家之有無而厚葬之不循理也孟子以後喪踰前喪樂正子前士後大夫之論是矣而曰貧富不同竊以葬禮自天子達于庶人必有等差當視義之當否可也今母乃有遺論耶喪禮固有分亦須兼稱貧富固有分雖得為而貧不能舉禮者故古人但云稱家之有無分不得為者不在此限惟孟子兩言最盡不得不可以為悅無財不可以為悅晦翁謂幽明終始無二理程子謂晝夜死生之道意者此理非有二塗所謂一而二以幽明終始言之二而一蓋死復生生復死人復為鬼鬼復為人如晝夜之循環氣聚則始而生氣散則終而死聚而生者為人散而死者為鬼有聚則必有散聚散本一理也原始而知其所以生則反終而知其所以死所謂一而二者聚散本一氣分而為聚散耳所謂二而一者雖分而為聚散其實一氣耳惟其一而二故有生必有死惟其二而一故知生則知死鬼神之事以為無邪則四時之祭祀皆可無也以為有邪則事死如事生事亡如事存温凊甘㫖之奉不可一日無也此淺學浪問鬼神乃二氣之屈伸二氣有無時否鬼者隂之靈神者陽之靈在人之身即為魂魄人死則魂升魄散雖散於無有然生氣之分於子孫者即其氣猶在也故其子孫賢者之死而致生之則其鬼神不賢者之死而致死之則其鬼不神子路曾晳冉有公西華言志夫子獨與㸃程先生曰孔子與㸃蓋與聖人之意同便是堯舜氣象又曰曾㸃狂者未必能為聖人凡狂者志髙而行不副謂其志髙故見大意而聖人與之謂其行不副止於見大意終不入聖人之室集註程子與㸃是堯舜氣象子路只不達為國以禮道闕之矣克己復禮己私克去則天理自明又何待禮邪莫是克己之後儘著得工夫今釋子作家有能克己掃除得空盡只是不復於禮聖門克己工夫事事著實不是將天理自明都麄瞞了克己復禮集註謂私慾浄盡天理流行如此積累工夫如何一日克己復禮天下便能歸仁此語是趲趣顔子當下便勇猛用功不可只問人面商量為之在我而已我能一日勇猛直截掃去己私復還天理即仁便歸我言天下以仁而歸我非天下歸我之仁顔子是陽明燥性人故說得此語餘子領不去顔子未至於聖人處猶是心麄心麄謂未能純體光明猶有黒暗在裏有一分黒暗便損一分光明有二分黒暗便損二分光明顔子心境已七八分光明但猶有一二分暗處故言猶是心麄言不順則事不成刑罰不中未曉貫通意如何言不順如以子為君以父為臣稱呼不順既不順故事實俱礙謂之君者不成君之事謂之臣者不成臣之事君不成君臣不成臣則事事失序物物不和更復說甚禮樂既無禮樂則七顛八倒有甚是底宜刑罰不中而民無所措手足如有用我者期月而已可也三年有成善人教民七年亦可以即戎如何布置紀綱一年可辦風行俗易須待三年善人功用較遲些然亦不害為善政也鄉黨稱弟宗族稱孝乃在行已有恥之次何耶士者男子壯烈之稱論語凡說士處多主節槩而言如孝弟稱於鄉黨此特一鄉善人於士義未𢎞也樊遲遊聖人門而問稼圃志則陋矣然古之聖賢若大舜伊尹皆躬稼畎畝習農圃事何聖人深斥樊遲遇此時則習此事遊聖人之門所學者何事邦有道危言危行甯武子仕衛文公有道則無事可見成公無道則能盡竭心力不避險難以保其身甯武子乃圓機之士非有危言危行此事叔向近之夫子請討陳恒竊意天子討而不伐諸侯伐而不討夫子莫是使哀公請於天子而討之耶聖人作事名正言順不應以燕伐燕胡氏云春秋之法弑君之賊人人得而討之仲尼之請討陳恒此舉先發後聞可也然孔子當時致仕居魯不審果可以先發後聞耶上必告之天子下必告之方伯内必合君臣之謀聖人舉動必不輕銳髙宗諒隂三年不言夫子以為古之人皆然彼士庶人無人以攝事雖欲不言得乎喪禮云百官備百物具不言而事行者扶而起註謂天子諸侯言而後事行者杖而起謂士大夫身自執事而後行者面垢而已謂庶民夫子告子貢以一貫與曾子同朱子謂告曾子以行言告子貢以知言既是一貫本不可分知行只緣子貢以知識入道至晩猶無奈許多知識剝落不下故聖人從他明處㸃化他猶自領會不去以忠恕而明一貫驗得是行以知識而明一貫驗得是知一貫固不可分但向人語處入頭各有塗轍志士仁人殺身成仁夫殺身之事誠難矣未曾實有所得實有所見誰忍捐生就死有志之士所存主處不汚下故決不肯茍賤以偷生程子曰古人殺身成仁亦只成就一个是而已既謂之成仁則必如是而後天理人倫無虧欠處生順死安無悔憾當此境界但見義理而不見己身更管甚名譽邪殷輅周冕奢儉不同集註以冕物少而加衆體之上故雖華而不為靡雖費而不為奢竊謂聖人制作之意不拘於此止謂冕朝物也故不可從儉輅步車也故不害於儉禮有以文為貴者冕也有以質為貴者車也耕也餒在其中學也祿在其中兩句似相反耕本謀食却有時而餒學非謀食却可以得祿所以分大人小人之事人能𢎞道非道𢎞人集註云性不知檢其心非道𢎞人也性指道心指人知及之一章集註乃謂氣習之偏既謂到仁地位純乎天理無一毫私意間隔此等病源從何而入氣習之說何謂雖聖人不敢如此說亦須隨事省察檢㸃惟恐有不莊不敬處此只是逐時提撕毋令有罅漏非是於此時方欲學莊敬也陳亢謂聖人逺其子未免以私意窺聖人古者易子而教之父子之間不責善乃天理如此非私意也上智下愚不移與韓子三品言性合否三品之說畧相似論語性近習逺正說中品先聖論性只說相近兩字自孟子以下說性累累不同荀揚韓子之論性不待生於孟子之後各占一說以相反東坡說得刻薄孟子時已自有諸家之說見告子要之同異之論自來有許多般數然亦各有理故程子有不備不明等語程氏釋自暴自棄謂之下愚不知因甚了自暴自棄是必其性之昏也是其有善有不善也豈專其才之罪哉程氏以才為氣禀之性言之則本善以氣質之性言之則有善有不善太師摰適齊一章魯周公之後也所用之樂周之樂也典樂之官又皆周之舊也在周盛時禮制樂作寓之形器存之有司凡六律六吕之節六徳六師之要太師掌之所以合天地隂陽之和也凡王之大食皆奏鐘皷侑食既以樂徹食又以樂大司樂膳夫諸臣掌之所以養君心而成君徳也子夏門人問交於子張章闕子夏心量窄狹子張志氣髙麄子夏常失之不及子張常失之過仕而優則學學而優則仕學是講此道理仕是行此道理學有餘暇則可入仕仕有餘暇又當講學主學而言則仕為餘用主仕而言則學有餘功互相發也子曰父在觀其志父没觀其行三年無改於父之道可謂孝矣先儒有說父在觀其父之志父没觀其父之行此說亦通如何集註都不用此說以此見若如此說連下个三年無改於父之道可謂孝矣說不通蓋才說孝便主子說了所以上面志與行都就子邊說非獨如此蓋父在時豈無志之可觀父既没豈無行之可見此說亦通子曰道千乘之國敬事而信節用而愛人使民以時晦庵說五者反覆相因如何是反覆相因處蓋從敬事而信起說作下去是如此而後能如此如人能敬則做事專一自能信既能信則必欲所行孚於民自然能節用既能節用自然不傷財而至於愛人既能愛人自然能使民以時這是如此而後能如此是自上而下相因如此如自下面說作上來則是如此而又不可不如此如以敬去做事便不敢茍簡胡亂去做須要十分好方止既得好便不至於茍簡變更這便是能信然做此一事時久或昏或為權勢所移或為利害所動前日出一令既如此今日又變了如彼這便是不信便有妨於敬所以著别下工夫於信去補這敬然只知信或出一政堅如金石行一令信如四時更不可移易此固是好然而自家這奢侈之心或有時而生不能節用要如此廣用則是所令又反其所好却有害於信故又須著去節用方得然只恁底節用不知有个中底道理則或至於豚肩不掩豆澣衣濯冠以朝心下已有所吝嗇則凡民有饑荒不能去發倉振廪恤貧濟乏至於築城鑿池思患預防不可已底事亦吝嗇了不損財以為之是知節用而不知所以愛人則節用又成落空了此節用所以不可不愛人然既愛民又須使民以時如春來當畊夏來當耘秋來當歛便當隨時使去做至冬來閒隙之時方用他得不然則所謂力本者不獲自盡雖有愛民之心而民不被其澤矣此自下相因而上如此如有周公之才之美一章驕者吝之枝葉吝者驕之根本不可執一說此兩句晦翁是主驕說故以吝為本根驕為枝葉若主吝說則驕亦吝之本根吝亦驕之枝葉如此㸔方著得下兩句未有驕而不吝吝而不驕但吝是氣斂藏在内驕則發見在外有誇滿盈溢之意立辭只可以吝為本根驕為枝葉到下兩句方見得相為用且如今時人起大屋做好器用著好衣服以此去矜誇人則必藏蓄待多不肯胡亂與人若與人則藏蓄不多無可以驕矜人者原其本只吝嗇愛惜其物直是以物為重耳所以如此如謝顯道見伊川先生數年不相見問做甚麽工夫答曰某只去得个矜字人才要矜誇人必要宫室侈麗衣服奢靡服用竒好所以謝顯道買得一管筆便使了掉了不愛䕶愛惜皆所以降服心性凡物不要藏蓄使了便了如原憲說怨欲不行地位直是制這些子孔子以為難不以為仁要人須是連這本根除將去方始得狂而不直一章狂者只是說大話立大論底人這狂人凡心下有事都說出在外亦無遮蔽但直行將去也好今有狂人者都恁底說大話立大論至於到利處但知有己反以義責人却不直侗者凡事只是恁底謹愿不敢妄動也好而今侗者却不愿要妄動悾悾者無能為底人都一向恁底朴厚也好而今無能為人也都會用許多詭詐狂侗悾悾這是得之於氣如此至於不直不愿不信都却習得如此有是病而無是徳也是天下之棄人子曰三年學不至於穀不易得也人孰無欲求利祿之心常人固不足說若子張為聖門之髙第猶學干祿可見為學之久而不至於穀誠不易得也如今有人居山林之中菜飯菜羮極是清苦這般人亦自難得如顔子抱經世之才可以任天下之重可以屬卿相之位却教他在陋巷中只有一簞食之奉顔子於此不以富貴動其心直是難固宜夫子既稱之以賢哉回也又稱之以賢哉回也子曰師摯之始闗雎之亂洋洋乎盈耳哉此夫子嘆美樂之盛美如此是摯去後惟懐其樂至美而不得見子曰篤信好學守死善道或問晦翁註云篤信而不好學則所信或非其正不知人不知學則所信何事先生曰時今有一等人資質好一有所聞見便深信之便不講學使道理分明則至於其蔽也蕩賊狡愚皆是不好學之故以至孝或陷父慈或敗子皆是不好學之故守死而不足以善其道如今時人之事君到臨君之難時直是欲向前為君而死以
