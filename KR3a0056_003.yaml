  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0056_WYG_003-1a, image: WYG0703/WYG0703-0632a.png}
body:
  text: 木鍾集卷三宋陳埴撰六經總論六經者易書詩禮春秋樂也自秦火之餘獨五經存而樂遂喪戴氏集孔子之遺言而謂之禮記居六經之一焉若以為禮經者儀禮也自戴禮既行儀禮遂廢則古無周禮之書也今戴禮周禮為二經而樂遂無傳何也古樂書今亡矣止是儀禮今亦不全止存十七篇大小戴禮乃漢儒集古今之文為之非古禮之正周官乃法守之書今人誤稱為禮文中子曰詩書盛而秦世滅非尼父之罪也虚無長而晉室壊非老莊之罪也齋戒修而梁國亡非釋迦之罪也詩書盛而秦世滅恐不可以下文例論謂秦焚滅六國耳王氏崇奬異教至與吾道同科學術之疵正不足論但其區區之意猶曰非師之本教然也學之者誤耳如釋老之誤固不足道只六國處士横議與今世虚文浮靡皆有禍聖經之理乃孔氏之罪人非師之本教然也孔子刪詩定書黍離閔周之詩乃儕於國風之列而七月陳王業之艱難乃不得與雅頌並稱至序文侯之命費誓秦誓諸書復繫於百篇之末而與典謨訓誥誓命之文屬辭比事夫子之意安在雅頌是朝廷制禮作樂之章或臣工規諫之詩周室既東雅頌不作只有民俗歌謡孟子所謂詩亡乃雅頌亡先儒所謂降為國風也豳列於變風文中子所謂君臣相誚其能正乎其說甚詳風之終繫之曹檜書之終繫以秦魯以見亂極思治之意河圖洛書此非但道理當然以圖書攷之自可見如河圖以生數統成數洛書以竒數統耦數若不相似也然一必配六二必配七三必配八四必配九五必居中而配十二圖未嘗不相似河圖之竒耦異位若不相似也然同方者有内外之分一居内六居外之類是河圖猶洛書也異位者有比肩之義一居左二居右之類是洛書猶河圖也又如河圖則備數之全洛書則缺數之十此疑甚相戾也然河圖之全數乃皆自五而來一得五而為六二得五而為七三得五而為八四得五而為九至其所謂十者乃五得五而為十其實未嘗有十也八卦全不用十洛書雖曰缺十而皆有含十之義一對九而含十二對八而含十三對七而含十四對六而含十十常夾居五之兩端與河圖頗相類是亦未嘗無十也又五居中而不用必皆虛其中則二圖隂陽之數均於二十此又未嘗不同也至於表裏之說則洛書具太極兩儀四象八卦之理河圖具九疇子母之數前輩論之詳矣若劉牧直謂伏羲兼取圖書又從而易置之是蓋知其表裏之說而不善用也八卦九章聖人經世之法耳論者曰河出圖洛出書以為天不愛其道然否伏羲因河圖而畫八卦大禹因洛書而叙九疇天不愛其道正謂此也天乃錫禹洪範九疇或謂即是洛書不知經何取證天以洛書之數闡道之秘聖人以洪範叙道之用道非數不闡數非疇不叙疇非聖人不能明其用也易大𫝊曰洛出書聖人則之今觀神龜負文而出列於背有數自戴九履一左三右七二四為肩六八為足而五則居其中各有定位而縱横錯綜其數皆十五非有次第之序也自禹欲因之以明大法遂因而第之以成九類而洛書之序始有條而不紊故以洛書之一居初而則之曰此五行也以洛書之二居次而則之曰此五事也以其三又居次而曰此八政也以其四又居次而曰此五紀也以其五又居次曰此皇極也下四疇皆然要之自一至九洛書之本數加初次於上者乃禹之所以次第之疇凡言數者未有言初次其上既次其數又復加初次者非贅也蓋别初次為禹之次第而九者之數則洛書之本文也洛書之文具此章之文而讀者不明其讀洛書當以初一次二為讀槩以為禹叙九疇而不悟其中含洛書至以洛書為不經無據之誕說是不精洪範之學者孔安國註九疇為洛書註初次為禹所次第法則註一五行以下為箕子所演最為得之夫洛書者大禹治水之時神龜負文而列於背禹則之而為疇也洛書本無文字但有竒耦之數自一至九其數如此禹叙而次第之以其一居初而為五行以其二居次而為五事三又次之而為八政四又次之而為五紀五又次之而為皇極六又次之而為三徳七又次之而為稽疑八又次之而為庶徴九居次之末而為福極自一至九洛書之本數初次者禹次第之文五行以下即禹法則之事也蓋因洛書自然之數而垂訓於天下後世也若其効法次第之義大抵因洛書之位與數而為之洛書一位在子其數則水之生數氣之始也故為五行五行則陽變隂合交運而化生萬物則為人事之始矣二位在坤其數則火之生數氣之著也故為五事五事則五氣運行人之禀形賦色妙合而凝修身踐形之道立矣三位在卯其數則木之生數氣至此而益著也故為八政八政則修身不止於視聴言貌思之事而立經陳紀創法立度舉而措之天下矣四位在巽其數則金之生數氣至此而著益久也故為五紀五紀則治不止於食貨政教之事而察數觀象治厯明時仰以觀於天文矣五居中央為八數之中縱横以成十五之變蓋土之沖氣所以管攝四時故為皇極耳則人君居至尊之位立至理之準使四方之面内環觀者皆於是而取則所以總攝萬類也六位在乾其數則水之成數氣合而成形也故為三徳三徳則不徒立至極之準而臨機制變隨事制宜且盡其變於人矣七位在西火之成數氣合而形已著矣故為稽疑稽疑則不徒順時措之宜而嫌疑猶豫且決之人謀鬼謀而盡其變於幽明矣八位在艮木之成數氣合而形益著矣故為庶政庶政則往來相盪屈伸相感而得失休咎之應定矣九位在午其數則金之成數氣合而著已久矣故為福極福極則休咎得失不徒見於一身而通行於天下矣其事廣大悉備故居中焉大禹九疇之序順而言之則五行為始故五行不言用不言用者乃衆用之所自出錯而言之則皇極為統故皇極不言數不言數者乃衆數之所由該以五行為始則自一至九愈推愈廣大衍相乘之法也以皇極為統則生數主常成數主變太極動静之分也九疇本於洛書者如此後學不悟此章具洛書之文例以空談而說之則陋矣河圖洛書相為經緯八卦九章相為表裏經緯之說非是以上下為經左右為緯大抵經言其正緯言其變而二圖互為正變主河圖而言則河圖為正洛書為變主洛書而言則洛書為正而河圖又為變要知天地間不過一隂一陽以兩其五行而太極常居其中二圖雖縱横變動要只是參互呈見此理所以謂之相為經緯也表裏之說亦然蓋河圖不但可以畫卦亦可以明疇洛書不特可以明疇而亦可以畫卦但當時聖人各因一事以垂後世伏羲但據河圖而畫卦禹但據洛書而明疇要之伏羲之畫卦其表為八卦而其裏固可以為疇禹之叙疇其表為九疇而其裏固可以為卦此所以謂之相為表裏也閏法左傳正義曰周天三百六十五度四分度之一日一日行一度月一日行十三度十九分度之七計二十七日有餘月已行天一周至二十九日過半即月法二十九日四百四十九分也又逐及日而與之會是為一月十二月而成歲一歲氣周有三百六十五日四分日之一今十二月維三百五十四日是少十一日四分之一未得氣周細而言之一歲正少十一日少弱所以然者一月有餘分二十九日法九百四十分四百七十分為半日今有四百九十九日是餘二十九分合十二月餘分三百四十八是一歲既得三百五十四日又餘三百四十八分一日九百四十分其二百三十五分為四分日之一今於餘分三百四十八内取二百三十五以當四分日之一仍有一百一十三其餘整日惟有十一日又以餘分一百一十三減之是一年正餘十日八百二十七分不成十一日故謂十一日少弱一年餘十日八百二十七分積十九年餘二百六日六百七十三分少弱足以當之古今厯法推閏月之術皆以閏餘減章歲餘以歲中乘之章閏而一所得為積月命起天正算外閏所在其有進退以中氣定之無中氣則閏月也古厯十九年為一章章有七閏入章三年閏九月六年閏六月九年閏三月十一年閏十一月十四年閏八月十七年閏四月十九年閏十二月此據元首初章若於後漸積餘分大率三十二月則置閏不必同初章日月運轉於天如人之行步故推厯謂之步厯歩厯之始謂之上元必以日月全數為始於前更無餘分以此日為端首即十一月甲子夜半朔旦冬至也故言履端用始也分一周之日為十二月則每月當三十日餘以日月會為一月則每月惟二十九日餘每月參差氣漸不正但觀中氣所在以為此月之正取中氣以為正月閏前之月中氣在晦閏後之月中氣在朔無中氣則謂之閏月故言舉正於中也月朔之與月節每月剩一日有餘以所有餘日歸之於終積成一月則置閏故言歸餘於終也木鍾集卷三
