body:
  text: 木鍾集卷十宋陳埴撰近思雜問附近思録載一陽復於下乃天地生物之心先儒以靜為天地之心不知動之端乃天地之心又説陽始生甚微安靜而後能長既以動為陽之始復又指安靜言之何耶一陽復於地下即是動之端但萌芽方動當靜以候之不可擾也故卦彖言出入無疾而象言閉關息民蓋動者天地生物之心而靜者聖人裁成之道德不勝氣性命於氣德勝其氣性命於德義理不勝氣稟則性與命皆隨氣稟中去所以多不善若義理勝氣稟則性與命皆向義理中來所以為善德謂義理之性氣謂血氣之性學問之道無他不過欲以義理勝血氣夏建寅為人統商建丑為地統周建子為天統檢律歷志看太簇是正月位於寅為人統黃鍾是十一月位於子為天統以林鍾為地統合位於丑在十二月今以月令考之則林鍾位於未在六月何也林鍾固是六月六月即十二月之衝陽管用正月黃鍾太簇隂管用其衝大吕必如是方得全律黃鍾九寸太簇八寸林鍾六寸餘皆奇分大率陽全隂半陽以一為一陰以二為一故乾三畫坤六畫此真至之理不可不講赤子之心與未發之中同否赤子之心只是真實無偽然喜怒哀樂己是倚向一邊去了如生下時便有嗜欲不如其意便要號啼雖是真實己是有所倚著若未發之中却渾然寂然喜怒哀樂都未形見只有一片空明境界未有倚靠此時只可謂之中要之赤子之心不用機巧未發之中乃存養所致二者實有異義變化如何分别變如鳩化為鷹雀化為蛤正欲脫離舊殼化則已脫離舊殼了見鷹而不見鳩見蛤而不見雀痕迹俱泯矣晦翁嘗疑日月右轉不是以為天行至健一日一夜一周却剩一度日一日一夜恰好月則不及十三度有奇與歷家所推大段相反不知何所見而云耳天行日剩一度出鄭康成日月俱左旋聞橫渠有此語但歷家用簡捷超徑法巧算須用作右旋却取他背後欠天零數起算故日只作行一度月作行十三度有奇庶簡捷超徑易布算也人説性便分善惡而心之善惡不曾説性是心之骨子性既如此則心不假言明道曰在人為性主於身為心心發於思慮謂之情如此則性乃心情之本而橫渠則以為心統性情如何心居性情之間向裏即是性向外即是情心居二者之間而統之所以聖賢工夫只在心裏著到一舉而兼得之橫渠此語大有功於後學血氣之性與氣稟之性同否生之謂性食色性也是血氣之性荀子性惡揚子性善惡混韓子三品與論語性近習逺上智下愚之説皆是氣稟之性血氣之性是於氣稟中獨指知覺運動悅色嗜味言之尤為卑下伊川説穿牛鼻絡馬首是率性之道夫牛有牛之性馬有馬之性彼固自率其性耳若穿牛絡馬乃是聖人裁成之道竊慮此當是修道之教不是自家穿絡他乃是物性各有不同牛必須穿鼻絡首則非其性矣馬必須絡首穿鼻則非其性矣是他物性各自有由行之路如此即不干聖人事設使牛而可絡首馬而可穿鼻則是不由物性乃由聖人矣張子曰窮理盡性則性天德命天理此義如何有氣質之性命有義理之性命由德上發者為義理由氣上發者為氣質雖有稟賦不同茍能學問以充之謂窮理盡性則向之得於氣質者今也性皆天德命皆天理所謂善反之則天地之性存焉程子説性與孟子不同性者人心所具之天理以其稟賦之不齊故先儒分别出來謂有義理之性有氣質之性仁義禮智者義理之性也知覺運動者氣質之性也有義理之性而無氣質之性則義理必無附著有氣質之性而無義理之性則無異於枯死之物故有義理以行乎血氣之中有血氣以受義理之體合虛與氣而性全孟子之時諸子之言性往往皆於氣質上有見而遂指氣質作性但能知其形而下者耳故孟子答之只就他義理上説以攻他未曉處氣質之性諸子方得於此孟子所以不復言之義理之性諸子未通於此孟子所以反覆詳説之程子之説正恐後學死執孟子義理之説而遺失血氣之性故并二者而言之曰論性不論氣不備論氣不論性不明程子之論舉其全孟子之論所以矯諸子之偏人能即程子之言而達孟子之意則其不同之意不辨而自明矣韓退之以三品言性果與夫子上智下愚不移之説合否三品之説略似論語性近習逺明道謂學者為氣所勝習所奪只可責志往往即孟子持其志無暴其氣之謂自家這裏心自有所守如何為氣所勝習所奪學者為氣稟所拘習俗所制不能擺落纏繞只為做人無立志不自強為善不願作向上人遂落在旋渦中無由拔出學者須是立志為先此志乃孟子尚志之志目視耳聽此氣質之性也然視之所以明聽之所以聰抑氣質之性耶抑義理之性耶目視耳聽物也視明聽聰物之則也來問可施於物則不可施於言性若言性當云好聲好色氣質之性正聲正色義理之性義理只在氣質之中但外義理而獨徇氣質則非也經權二字如何分别經猶稱衡銖兩斤鈞一成畫定權即稱錘隨物低昻以求合於銖兩斤鈞五皇極之道程子以極為時中晦翁謂之至同否極者至盡無以加之辭本不訓中字中是無偏倚無過不及之稱各有所當前儒稱尺猶疏晦翁加密矣伊川曰中字最難識須是默識心通又曰中不可執識得則事事物物皆有自然之中此乃時中之中初無定體隨時處中即所謂權也中不中只在毫釐之間非理明義精不能到此程子以權即經而以反經合道之説為非晦翁引孟子説為經權亦當有辨權乃權衡之權即隨物以取平者古人借此權字以稱量事理即所謂義之宜即所謂時中也既曰義與中又何嘗自反經來但以變通從時求合於經不可直謂之經耳造化天地造化萬物萬物露生於天地之間者皆造化之迹也是孰為之耶鬼神也造化之迹猶言造化之可見者非粗迹之迹于今一禽一獸一花一木鍾英孕秀有雕斫繪畫所不能就者倐忽見於人間是孰為之耶即造化之迹鬼神也何謂鬼神者二氣之良能鬼者隂之靈神者陽之靈晦翁謂月加子午則潮長未識其説此説不可曉今海居者但云月上潮長月落潮退誠驗其言是乃月加卯酉方位非子午也朔日之潮可驗朔日月與日會日才出卯方即潮長才入酉方即潮又長是月與日相隨出沒月本無光借日以為光此先儒之通論然月過中於天而日行於地之下則月何以為光借曰四面空虛故日從空中照出日光既四面合照則月當常圓何為復有虧缺為地浮在天中間上下四方皆空虛只有茫茫無畔邊岸底水水即氣所以謂之太虛故日雖入地其光迸出與太隂之氣相感但月去日有逺近故光有盈缺近日則光小逺日則光大日食之變精於數者皆於數十年之前知之以為人事之所感召則天象亦當與時盈虧日月交會日為月掩則日食日月相望月與日亢則月食自是行度分道到此交加去處應當如是厯家推算專以此定疏密本不足為變異但天文才遇此際亦為隂陽厄會於人事上必有災戾故聖人畏之側身修行庶幾可弭災戾也集注云管仲之德不勝其才子産之才不勝其德功大而器小是德不勝才惠而不知為政是才不勝德明道以記誦博識為玩物喪志如何徒記誦該博而理學不明不造融會貫通處是逐其小者忘其大者反以無用之物纍其空明之心是為玩物喪志明道謂學不言而自得者乃自得也有安排布置者皆非自得也安排布置須是見於施設以安排布置為非自得如何安排布置非是見於設施謂此心此理未到純熟兩忘地位必有營度計慮之勞逆施偷作之病才到自得處則心便是口理便是心心與理忘口與心忘處處安行自在默識心通不用安排布置也橫渠云文要密察心要洪放何者為文文謂節文之文如周旋中規折旋中矩之類雖甚嚴密不少舒放然心裏却甚泰然在禮外事用剛日內事用柔日祭先聖用上丁社稷用上戊此唐開元制也至今用之不知用戊用丁何義外事謂祭天地社稷山川及兵戎之事內事謂祭宗廟及冠婚學校之事社稷用戊固剛日古用甲日洛邑方用戊釋奠用上丁乃柔日主於文也夏小正及月令已用之唐因之耳武學用戊主武也毛詩吉日維戊既伯既禱是也上丁釋奠是開元禮伊川曰在物為理處物為義又曰在義為理何如理對義言則理為體而義為用理對道言則道為體而理為用古今風氣人物之異程子謂氣有淳漓自然之理有盛則必有衰既是衰了還有淳時否有大盛衰有小盛衰大盛衰則三代不似唐虞秦漢不似三代晉宋不似秦漢隋唐不似晉宋小盛衰則商初勝如夏末周初勝如商末漢初勝如周末晉初勝似漢末唐初勝如六朝之類橫渠云多聞不足以盡天下之故其旨如何此言記問之學雖博而有限中窒故也義理之學至約而無窮中明故也晦翁説仁為愛之理心之德如何愛是情理是性心統情性者也單説愛字與心字猶是就情上看必曰愛之理心之德方和性在裏面是愛之所以為愛而心之所以為心者也是之謂仁前輩謂心為榖種能生處即是他所以為榖種處故桃杏之核皆曰仁孔門不曾正説仁之體段只説求仁為仁之方孟子方説怵愓惻隱處以狀仁之體段又説仁人心也須認得仁為人心方見仁著落所以不仁之人全無人心醫者以手足偏痺為不仁最是名狀得好既無人心問他恁麼羞惡恭敬是非仁包四端即此可見心如榖種所以生處是性生許多枝葉處便是情心亦是有形影底物事情亦是有形影底物事獨性無形影明道云天地間只有一箇感與應而已莫是動靜無端隂陽無始底話一往一來一屈一伸一闔一闢一晝一夜一寒一暑無處不是此兩扇物事有感必有應所應復為感所感復為應備此三句方是無端無始意蓋感應二字貫通隂陽動靜謂陽動為感固可謂隂靜為感亦可謂陽動為應固可謂陰靜為應亦可蓋今日之晝固起今日之夜而今日之夜又起明日之晝天地間不過如此耳朱子解太極圖云乾男坤女以氣化者言萬物化生以形化者言竊疑乾男坤女非止言人凡陽之屬皆男也陰之屬皆女也氣化之初萬物已在其中矣萬物化生非止言飛潛動植凡人亦萬物之一形形化之後人在其中矣氣化謂未有種類之初以陰陽之氣合而生形化謂既有種類之後以牝牡之形合而生皆兼人物言之為人為己如何為己是真實無偽為人只是要譽近名聖人此言是就他源頭上分别出來今學士大夫謂為己不求人知而求天知才説有求天知意便不是為己為己者只是屈頭擔重擔不計窮達得喪也仁者偏言之只一事兼言之則包四端四端皆心之德頭面迥異仁既是愛之理則義禮智亦當謂之理四者皆當用工夫然孔門大率多去仁上著力何耶所謂愛之理是偏言之將四端分作四去看截然界限不可相侵心之德是兼言之將四端只作仁字看仁為善之長猶家之嫡長子包貫得諸子故獨以理言以心德言須見移在諸位上用不動方是詣理晦翁以三代而下皆人欲而非天理且如漢文帝資稟純粹如何斷以人欲晦翁此言止謂秦漢而下不曾有徹底理會學問人其中好者只是天資粹美暗合聖賢元不從學問中來文帝是若似此人主更從學問中徹底理會便是湯文以上人王伯如何分别司馬溫公無王伯之辨要之源頭只是王伯兩字以其為天下王故謂之王以其為方伯故謂之伯以王天下言之謂之王猶伯之為伯也未見其美玉碔玞之辨後來制字有不備故伯字有霸字王字只是王字點法為之然伯字亦無詐力之義故言三王以其王天下也言五霸以其伯諸侯也自其有三王之至公有五霸之智力而後有王霸是非誠偽之分故今之言王霸之分者當以孟子德行仁力假仁為正無將迎如何人心如鏡物來則應物去依舊自在不曾迎物之來亦不當送物之去只是定而應應而定道理空積忽微如何言起空立數以求忽微之數也如四分度之一起空立四分於內取其一積却是積疊如説五寸三分二之類誠無為幾善惡誠為太極幾之動為陰陽陽為善隂如何便是惡陽大陰小陽貴隂賤陽明隂暗陽清隂濁有善惡之類焉周子此言是以人心説太極當其誠實無妄此實理即為太極才動便善惡生焉幾者動之微蓋欲於其萌動而蚤辨之使之有善而無惡也夏尚忠商尚質周尚文此固各一代之所尚然使其不易代則夏將終於忠商將終於質周將終於文不知時節既變聖人如何區處自是三勢如此不是三代聖人開國之初揭箇樣範要人如此橫渠曰未知立心患思多之致疑立心持敬之謂先立箇主人翁了方做得窮理格物工夫或問明道曰出辭氣莫是於言語上用工夫否曰須是養乎中自然語順若如須欲於外面著力加修辭之功是如何出辭氣出字著工夫不得工夫在未出之前此是靜時有工夫故才動道理便在此動時自有著工夫者如修辭安定辭之類由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名如何凡古書言天處皆指理而言非但謂蒼蒼者凡古書言道處皆主物而言非但謂空空者故橫渠以太虛氣化釋之凡説性處雖主氣必帶理此皆古人制字之深意當作如是看性中具仁義禮智道德如何行是四者即為道得是四者即為德乾為大坤為至大者尊辭至者親辭所謂尊天而親地也忿欲二字為人害最大損之象曰君子以懲忿窒欲然喜怒哀懼愛惡欲君子以為人情夫情出於性性出於天則是天之付於人者亦有不善耶喜怒發而中節則為和發不中節則為害此事全在當人責天不得山下有澤損君子以懲忿窒欲只奉行此語伊川謂致知在所養養知莫過於寡欲二字往往寡欲則知無不盡程子以持敬為入德之門蓋欲格物致知須是心常存在才可所以有寡欲之説恐引出心向外去也集注成德以仁為先進學以知為先意者學以智為先莫是知至至之之説否成德以仁為先其義未解進學是施功時則智先於仁由明至誠也成德是收功時則仁大於智誠則能明矣明道曰中者天下之大本唯敬而無失最盡則中不過是箇敬字才敬便是中否當喜怒哀樂未發之時便著甚工夫才著得力便是發了所以先賢當此境界不是無工夫又不可猛下工夫只是敬以直內即戒謹恐懼意敬不喚做中敬而無失方是中無失即不偏倚之謂或問九章謂有諸己不必求諸人以為求諸人而無諸己則不可也無諸己不必非諸人以為非諸人而有諸己則不可也為經文有以己求人以己非人之嫌却自己才有善便去求人之善己才無惡便去非人之惡不是君子反躬意思故先賢下此一轉語方見全是為己大意謂欲責人先須責己不是才責己了便責人此君子小人為己為人之分毫釐間耳程子曰明善為本固執之乃立擴充之則大易視之則小在人能宏之而已聖賢工夫只此兩端在論語則為博文約禮在大學則為致知誠意在中庸則為擇善固執在易則為知崇禮卑能擴充此二事即作聖之資若輕視之所以為下愚也循物之性與率性之道如何愚謂實有此道便是信不知然否循物無違之謂信信主人言言貴有物如物有五分便言五分物有十分便言十分是謂循物無違如以道言實有便曰有無便曰無循物無違也與率性之道不同堯夫解他山之石可以攻玉玉者溫潤之物若將兩塊來相磨必磨不成須是箇粗物方磨得出譬如君子與小人處為小人侵凌則修省畏避動心忍性便是進道之階由堯夫之言則是與不正人居亦可以正乎學道人處處是進道之機逆境處進人益峻是他自做小人吾輩却因他做君子老子云不善人者善人之資亦此意先賢此等處訓人真切但當三復受用天開於子地闢於丑人生於寅如何此謂太朴始散之初三才所生之序如此子是玄冥之方氣自玄冥中始開丑則其形見露矣故地於此而闢寅則見露尤著故合氣與形而人於是乎生今百物所生之序亦如此皆從子上生起明道云人之為學忌先立標凖何謂標凖標凖猶言限格學問既路頭正了只劄定腳根滔滔做去不可預立限格云我只欲如此便休今世學者先立箇做時文取科第標準橫在胸臆煞害事遺書云天地生物各無不足之理常思天下君臣父子有多少不盡分處既曰無不足如何又有不盡分處天理本無不足人自虧欠他底無妄之謂誠不欺其次矣無妄不欺相去還如何無妄是實理自然如此可以説天與聖人不欺是欲實其心只可説學者陽者隂之根隂者陽之根不知周子以陽具於隂靜內隂具於陽動內還是説隂中有陽陽中有隂還是説隂了陽陽了隂乃若水為隂而生於陽之變火為陽而生於陰之合又何也陽生隂陰生陽猶今日之晝固生今日之夜而今日之夜又生來日之晝晝之根在夜夜之根在晝所謂互為其根也根者生之義二氣無判然兩截之理本只一氣分而為二名耳陽變生水即天一生水也陰合生火即地二生火也氣行於天質具於地則是有氣便有是質氣如是質便如是以氣而語其行之序則木火土金水以質而言其生之序則水火木金土氣之序如此質之序如此願聞其旨五行始生謂太極流行之後自氣而成質自柔而成剛水最柔故居一火差剛故居次至木至金至土則浸堅剛故洪範與易言所生之序皆如此氣則成四時之序即五行之序也今更不須問所生之序此太極剖判之初也動靜無端隂陽無始端與始如何分别端頭也物之圓環者無端中則有端矣始者終之對二氣循環不已故無端運行不歇故無始不斷故無端無終故無始近思録明道言中有主則實實則外患不能入伊川云心有主則虛虛則邪不能入無主則實實則物來奪之所主不同何也有主則實謂有主人在內先實其屋外客不能入故謂之實有主則虛謂外客不能入只有主人自在故又謂之虛是知惟實故虛蓋心既誠敬則自然虛明近思云學不能推究事理只是心粗至於顔子未到聖人處猶是心粗如何心粗是暗處多明處少故只見得明白道理若精微處則分析不去只為有寸而無分也聖人心如百分稱謂體統光明渣滓渾化故分毫處皆照顔子未到渣滓渾化地位猶未免有暗處故謂之心粗樂書云自仲尼不能與齊優遂容於魯雖退正樂以誘世作五章以刺時猶莫之化未審五章可得而聞否五章未聞恐如過河聞趙鞅殺鳴犢而作詩以哀之韓文公後補之為琴操未知然否明道先生在澶州日修橋少長梁曾博求之民間後因出入見林木之佳必起計度之心因戒學者心不可有一事毋乃死灰其心耶只為滯著在胸次雖事過之後猶復萌動正所謂心有好樂則不得其正若事往即化則得其正矣橫渠云精義入神事豫吾內求利吾外也利用安身素利吾外致養吾內也窮神知化乃養盛自致非思勉之能強故崇德而外君子或未之知也如何研窮義理之精微至於入神即是義理浹洽純熟心胸間悅豫潤澤是事豫吾內也豫吾內者乃所以利吾外也此語解以致用也一句利用安身謂資物之用以養其身使氣體之間安舒順適是素利吾外也利吾外者乃所以養吾內也此語解以崇德也一句橫渠釋易四語謂皆是內外交相養平生得此受用其下云皆釋易下文伊川説心本善發於思慮則有善有不善思慮從心生心若善思慮因何有不善思慮以交物而蔽故有不善龜山説聖人縱心聖人無心不知心如何縱如何無得此異教語先儒墮落其中而不知要知古無縱心語無心則有之止謂無計較之私心耳伊川撰明道行狀曰盡性至命必本於孝弟窮神知化由通於禮樂性命孝弟伊川已作一統底事看了不識神化禮樂當如何看兩句皆由粗至精由學者至聖人謂本是一串道理但須還踏實蹙底做起本孝弟而盡性至命此行之極至通禮樂而窮神知化此知之極至佛氏盡性至命矣而不本於孝弟則行之過也莊氏窮神知化矣而不通於禮樂則知之過矣橫渠學堂右書訂頑左書砭愚伊川曰是起爭端不知如何是起爭端一銘中言義理匼匝正好講量却不於血肉上理會乃於皮膚之外起意豈非頑不知訂愚不知砭耶橫渠憫俗學頑愚故以此立齋吾友以此問余以此相詰非起爭端耶仁者右也道者左也仁者人也道者義也仁與道猶身之左右體一息相去離不得但仁主利愛故以右言取其便順也右體順仁者人也古語不必説道者事物當然之路義者事物當然之理故以道為義此皆漢儒無理之言不妨作如此觀鬼神造化之迹神氣雷霆風雨霜露皆迹也鬼神尸之非明則動無所之非動則明無所用有足而無眼則欲動而何之有眼而無足則雖明而何用此義取之噬嗑致知力行夾截並進之説明道以記誦博識為玩物喪志謝顯道聞之不服是耶非耶明道是明睿內照故書無不記却不是記問上做工夫此語正欲點化顯道惜其為記問所障領會不去嘗聞伊川先生曰動以人欲之私然則如之何則可應舉求合程度此乃道理當爾乃若不合程度而萌僥幸之心不守尺寸而起冒為之念此則妄矣應舉何害義理但克去此等妄念方是真實舉子周濂溪云養心不止於寡欲蓋寡焉以至於無此謂私欲耳克去私欲當自寡而至於無若飲食男女之欲發而中節者是義理之當然雖大聖不能無濂溪即非寂滅之謂也程子曰冬至一陽生却寒正如欲曉而反暗也隂陽之際亦不可截然不相接厮侵過便是道理天地之間如是者極多艮之為義終萬物始萬物此理最妙大率隂陽消長之理一氣不頓消不頓長欲消之氣却侵帶些在初長之中初長之氣却侵帶些在欲消之中大凡寒暑晦明之交接頭處須兩下侵帶些所以艮居八卦之終宜只是止萬物然分於東北之間一頭接坎之殺氣固是終萬物一頭接震之生氣又為始萬物蓋震豈能頓生惟於殺氣未盡之時已是侵帶些子氣了故至震方發生也伊川言四德之元猶五常之仁偏言則一事專言則包四者夫元之統亨利正是一元之氣統此三者不知仁統義禮知信如何仁為四端首乃衆善之長人有是仁則謂之人無是仁則不足以言人故曰仁者人也言人所以為人者以有此理耳義禮智皆從此分出義者宜此者也禮者覆此者也智者知此者也所以包四端伊川曰以功用謂之鬼神以妙用謂之神氣歸為鬼屬陰氣伸為神屬陽此以隂陽之功用言若偏言神處即以隂陽不測之妙言程子曰有感必有應凡有動皆為感感則必有應所應復為感所感復有應這箇道理還作麼生太極動而生陽此感也動極而靜靜而生隂此應也靜極復動此所應復為感也動極復靜此所感復有應也大率陽為感則隂為應隂為感則陽為應一陽一隂互為感應此言循環無端之理周子曰愛曰仁程子曰愛自是情仁自是性豈可專以愛為仁程子學周子者也何故議論迥别善言性者必有驗於情故孟子以惻隱為仁之端周子以愛言仁皆是借情以明性若便以愛為仁則是指情作性語死不圓矣韓子博愛之仁是明道曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神其命於人則謂之性率性則謂之道修道則謂之教前三句主易言如一隂一陽之謂道後三句主中庸言各有分付頓放處程子曰學詩不求序猶入室不由户則序實詩之綱領也今或以為子夏或以為漢儒程子又曰詩小序要之皆得大意晦翁乃不取小序何耶晦翁出於諸老先生之後有集大成之義故程子有未盡處至晦翁而始成仁者必有知覺知覺何可以盡仁哉仁者特有之耳竊以為才言知覺已入智中來程門雖有以覺言仁然不專主此説其他話頭甚多上蔡專主此説故流入禪學去所以晦翁絶口不言只説愛之理心之德此一轉語亦含知覺在中可更思求朱子言人形生於隂神發於陽五常之生感物而動陽善隂惡又以類分竊疑繼之者善成之者性則隂曷為便謂之惡耶通書言柔善為慈順巽惡為懦為邪佞則陰柔之中亦自有善惡也今遽以陰為惡所以可疑隂陽以氣而言則為匹敵無非正氣以類而言則有貴賤用分淑慝故陽為君子隂為小人陽主善而陰主惡者皆以類也自有並行不悖之理難執一方一面死定説也明道云以己及物仁也推己及物恕也伊川先生又曰仁所以能恕所以能愛是則恕乃仁之發見然質之明道所云則以己及物尚有事於推乎恕之得名只是推己之義然所以能推己者為人心有是仁也若元無是心何處推得來西銘之書似無親親之殺程子曰西銘理一而分殊墨氏二本而無分明道謂學者能識仁體實有諸己只要義理栽培如講求經義皆栽培之意若仁之在人心一耳不學之人獨無仁乎識得仁體謂滿腔子是惻隱之心既體認得分明無私意夾雜又須讀書涵泳義理以灌溉滋養之不爾便枯燥入空門去退藏於密程子曰密是用之源朱子云不可窺較之謂密程子説得輕些密字如何看此是幾事不密之密未與物接之時無聲無臭無視無聽此密也伊川每見人論前輩則曰汝輩且取他長愚謂長處可法短處亦可鑒兼論何害後輩於前輩便有少長之分此皆前輩風流所以助成仁也橫渠曰由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名何謂也四者本是一理但所由之名異耳從太虛上看則謂之天天為太極是也從氣上看則謂之道一隂一陽之道是也從虛與氣合上看則謂之性天命之性是也從性與知覺合上看知覺是血氣動物則謂之心其實一理耳七情裏愛與欲如何愛者惡之反欲者愛之流有無本不足以謂道周子必曰無極而太極何也此語為未識太極者設恐人著相尋求此物也今以説道説太極皆似懸空中有一物髙挂在事物形器之外閃鑠底似此見解須用腦上著一穴也程子曰靜後見萬物皆有春意如何又問此還是指聖賢而言否觀物內會靜者能之固是聖賢如此吾人胸次豈可不見此境界靜却不分聖賢晦翁謂凡物其間自有天理人欲之辨而不可以毫釐差若未能分别天理人欲頭面如何大意恐是如程子所言峻宇雕牆本於宫室酒池肉林本於飲食先王制其本者天理也後人之流於末者人欲也凡物之天理人欲皆可倣此推之五峯曰天理人欲同行異情此語儘當玩味如飲食男女之欲堯舜與桀紂同但中理中節即為天理無理無節即為人欲伊川言窮理非必盡窮天下之理又謂非止窮得一理便到又云格物者非必謂欲盡格天下之物但於一物上窮得盡其他可以類推只格一物便是致知雖曾顔不敢如此道晦翁曰日格一物積久自有豁然貫通處此道儘著玩索日格一物豈是只格一物積久貫通到此境界即明睿洞照不待物物盡窮矣橫渠曰乾之九五飛龍在天利見大人乃大人造位天德成性躋聖者爾若夫受命首出則所性不存焉橫渠此語不要做得時位大人看要做孔夫子看所謂君有君用臣有臣用聖人有聖人用學者有學者用此善學易者如此若只指乾為堯舜湯武用則不識易矣橫渠曰陟降庭止上下無常非為邪也進德修業欲及時也在帝左右所謂欲及時歟陟降庭止何以謂上下無常在帝左右何以謂進德及時一陟一降初無定所此言上下無常而常若有所見於庭真見有物臨之者豈非存誠無邪之驗耶在帝左右天理無時去離吾身豈非進修欲及時耶伊川曰人心常要活則周流無窮而不滯於一隅提撕醒覺之意伊川曰盡性至命必本於孝弟窮神知化由通於禮樂不知孝弟何以能盡性至命不知禮樂何以能窮神知化盡性至命窮神知化皆聖人事欲學聖人皆從實地上做起升髙必自下陟逺必自邇此程門切實之學積纍之久將自有融液貫通處非謂一蹴便能天地之常以其心普萬物而無心聖人之常以其情順萬事而無情心以宰物言情以應物言此先儒用字最精處移換不得鬼神造化之迹又曰二氣之良能鬼神只隂陽屈伸之氣所以為寒為暑為晝為夜為榮為枯有迹可見此處便是鬼神蓋隂陽是氣鬼神是氣之良能流轉活動處故曰良能十二律相生是以隂陽分上下定損益五音相生亦有上下生之者為母生者為子即是隂陽道至於聖人極矣然禹湯文武周公之措置未嘗或同或時不同故措置不容不異乃若諸子論性豈係於時聖賢之所同處非依本畫葫蘆之謂斟酌損益各當於義理耳才各當於義理則湯武之征誅與堯舜之揖遜天地相反不害為同也蓋堯舜揖遜義理當揖遜湯武征誅義理當征誅但得義理長在所以異而同也若諸子論性不同又不可以此論是其學問有醇疵故義理有同異若都到純粹地位則義理所同亦無不同也邢和叔問伊川一日三點檢如何夫能點檢固是好此學人言語不知如見肺肝一日三點檢間時何處去此語與三省言語霄壤異文中子曰化至九變而王道明不知所謂九變者何如此以簫韶九成推之樂所以象治功之成也舜樂既九變則舜之化亦九變矣文中子問答可見如武之樂六成則武之化亦六變遊氣紛擾合而成質者生人物之萬殊其隂陽兩端循環而不已者立天地之大義上兩句説五行下兩句説隂陽五行交錯故生萬有之不同二氣循環故兩儀終古不息程子曰天地之正氣恭作肅肅便雍也此必是解肅時雨若一身之氣與天地相應文中子曰諸葛亮而無死禮樂其有興乎近思録程子亦以此許之敢問孔明自比管樂使果能興復漢室恐未必便能興禮樂如三代孔明是天資帶得又從學問中攛出來據他用事行師調度若當升平之時做出必須光明不止漢唐人物與仁同過然後其仁可知過者人之所辟也如何便知其仁與仁同過如唐太宗之處兄弟與周公之處兄弟均是過也但周公之過光明正大而無私心終不離乎仁太宗則隂賊傾危純是私欲上行仁心已不在矣太極圖如何言水而木木而火火而土土而金金又水水得氣之初陽氣一動便蒸潤便生水既蒸潤便萌達便生木既萌達便盛勢便生火火既盛便剝落便生土土既剝落便堅硬便生金金既生依舊又能生水到春來即萌蘖發生到夏來都長茂秋冬都收藏而堅徑又至一陽來依舊又生水蓋非歸根則不能發達乃生生不窮之理也無極無之極乃有之極惟其無中有有故少刻方生得這隂陽五行若無許多有在裏面如何有許多發出來以手閉太極指無極言這箇只是無復以手閉無極指太極言這箇便是無極中有底復以手閉無極太極指五行言這箇便是無極太極其於男女太極萬物太極也太極所謂沖漠無朕此之謂也太極分隂陽圖上太極之左右各一重足矣何以三為這便是循環無端處反覆其手而言陽了隂隂了陽何曾窮已木鍾集卷十
