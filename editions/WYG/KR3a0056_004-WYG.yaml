body:
  text: 木鍾集卷四宋陳埴撰易易與太𤣥數有何不同易是加一倍法大𤣥加三倍去易卦六十四太𤣥卦八十一太𤣥模放周易只起數不同耳先儒謂將易變作十部太𤣥亦得但無用耳陽卦多隂隂卦多陽如何一耦一竒即竒為主是為陽卦震艮坎是二竒一耦即耦為主是為隂卦巽兑離是陽實隂虚故易陽爻以富言如小畜之九五是也富以其鄰隂爻不以富言如泰之六四是也不富以其鄰家人卦六四乃云富家大吉晦翁云陽主義隂主利不通其㫖陽善隂惡陽君子隂小人故義利皆以其類分此義見於坤彖有主利之文内卦曰貞外卦曰悔貞悔字如何或說貞悔字皆從卜貞悔二字先儒難之但自古占法用此貞言其事之正體悔言其事之變體吉㐫不可預定遇事方驗之矣元亨利貞何獨以利貞為性情四時之運何適無性情但天地性情常於收歛歸藏處見之為有性情故到此境界雖剥落隕穫元來不曾歇㓕吝字如何吝謂可羞耻心有歉而不足也何謂乾坤從而六子横此伏羲先天易八卦圖乾居上而坤居下縱也六子分左右横也參伍以變未審參伍是何數參伍猶言錯綜也三其三為參五其五為伍言縱横反覆以推其變卦反對如何伏羲易以出入為次文王易以反對為次乾坤純體坎離互體頥大過小過中孚雜體中之正者此八卦不可反為兩相對餘五十六卦為雜體兩相反以為對於雜然紛錯之中自有井然不紊之統紀所以為妙包羲氏畫八卦所謂經卦也至文王始重六十四卦所謂别卦也何周官大卜所載夏之連山商之歸藏已具六十四卦之名於文王未重之前耶連山歸藏之不著於後世豈以若此等處有不可攷㨿者歟才有八卦便有六十四卦所謂太極生兩儀兩儀生四象四象生八卦但以加一倍法生去即八卦生十六卦十六卦生三十二卦三十二卦生六十四卦此卦畫之所由起先天之學也以八卦重而為六十四卦者其法亦通但此乃後天之學在六十四卦旣成之後任人如何變通也只是一卦變而為六十四卦亦可非但重也卦有生法有重法有變法三易連山歸藏孔頴逹以為神農曰連山黄帝曰歸藏故其易各以代名如文王號周易也宋朝朱震以為商人作歸藏夏后氏作連山數皆用七八春秋所謂遇艮之八是也二說未知孰是連山歸藏世代不可攷但自古占法必用三人洪範三人占說者謂三易當時上古相傳之書其經卦皆八其别卦皆六十四但其卦名占法恐不類周易耳左傳所載占筮語其中非周易者疑出於此孔穎逹以為制器有取於十三卦則黄帝已前已有重卦矣至諸儒論重卦之人王輔嗣以為伏羲鄭𤣥以為神農孫盛以為夏商史遷以為文王宋朝鄭東卿以為重於夏商之際文王囚於羑里遂重定之然乎十三卦取象說上古雖未有易之書元自有易之理故所作事皆暗合易書邵康節所謂畫前之易是也若重卦則不待後聖才有八卦便有六十四卦故周禮曰三易經卦皆八别皆六十四八卦重為六十四傳習皆以為文王重之或云伏羲重之謂伏羲亦可謂文王亦可謂之生亦可謂之重亦可伏羲才生得文王亦生得伏羲才重得文王亦重得易何以為逆數易本逆數也有一便有二有三便有四有四便有十六以至於六十四皆由此可以知彼由今可以知來故自乾一以至於坤八皆循序而生一如横圖之次今欲以圓圖象渾天之形若一依此序則乾坤相並寒暑不分故伏羲取天地定位山澤通氣雷風相薄水火不相射之義以乾坤定上下之位坎離列左右之門艮兊震巽皆相對而立蓋乾兊震離皆屬陽巽坎艮坤皆屬隂悉以隂陽相配圖必從中起者蓋萬事從心出之義卦必從復起者蓋天開於子之義自一陽始生之復起冬至節歴離震之間為春分以至於乾為純陽是進而得其已生之卦如今日覆數昨日故曰數徃者順自一隂始生之姤起夏至節歴艮兊之間為秋分以至於坤為純隂是進而能推其未生之卦如今日逆計來日故曰知來者逆然本其易之所成只是自乾一而兊二離三而震四巽五而坎六艮七而坤八如横圖之序與横圖之右方而已故曰易逆數也易自乾坤已後自屯至比皆對坎成卦自比以後始對坤成卦不知諸卦何以首對坎而成卦而乾坤始繼坎之後周易六十四卦相因之序不可作如是觀只是兩兩相對否則相反但明反對之義乾坤對也屯䝉反也必以序論則說具序卦若原畫卦之初則乾一兊二離三震四巽五坎六艮七坤八因而重之則乾居一而坤居六十四此則先天之學易本然之序也可考啓䝉見得此叚令人心開目明方知先天之味無窮而周易特後天之學耳看人如何排定易之數本乎天地由一二而推之故竒耦相生而終於五十太𤣥之數本乎三才由三六而積之故十八相叅合十為五十四此其積所以不同也易正本以立其常太𤣥推測以窮其變非常無以成一嵗之功非變無以致歸餘之閏此其用所以異也未知然否加一倍法即兩儀生四象四象生八卦八生十六十六生三十二三十二生六十四以六十四自相乘為卦四千九十六來說乃大衍之數太𤣥未嘗學不敢臆說易所以為衰世之意者安在經云當文王與紂之事其辭危者謂專說吉㐫悔吝文王身遭大難又導民以趨吉避㐫豈非衰世之意邪乾坤成列而易立其中乾坤毁則無以見易本義云易之所有隂陽而已畫卦定位則二者成列而易之體立乾坤毁謂卦畫不立下面說乾坤又謂變化不行此變化莫是卦變之說否此據先天圖言謂落筆之初陽畫在右隂畫在左只此二畫分左右成行列而一部易書已在其中設若當時分此兩畫不成則易書無自而見便是乾坤毁無以見易設若當時作此易書不成則二畫幾於歇㓕無用便是易不可見則乾坤息此意雖主說易書然天地大化亦只如是易與天地凖知幽明之故原始要終知生死之說易固大無不周小無或遺不知幽明死生始終之理何處是實理易以道隂陽一竒一耦相摩相盪總不離乎一隂一陽之道故凡幽明始終死生之故皆隂陽之為耳知鬼神之情狀與天地相似故不違鬼神之道亦天地間之一物不知其何者與天地相似理耶氣耶以言其相似則鬼神之情狀大矣氣至而伸者為神氣反而歸者為鬼以二氣言神者陽之靈鬼者隂之靈鬼神即天地之功用二氣之良能乃是氣中含道理者也困之九五上下皆揜於隂有劓刖之象是困而又困也何以利用祭祀凢易言祭祀處爻多中實否則中虚中實則誠信之象中虚則誠信之理當困之時以九居五百事不利惟有中實利祭祀耳凢曰利祭祀則有亨通獲福之理焉雷風相與暫焉而已何以謂之恒雷而必風此理之常風自火出何以謂之家人猶言風化自内出也火文明之徳夫夫婦婦父父子子兄兄弟弟即内文明之象一家之風化由嚴明中來所以一卦多尚嚴明剥卦上九一爻變則為純隂故陽剥為坤陽來為復程子曰陽無可盡之理剥盡於上則復生於下無間可容息也若以卦配月剥當九月坤當十月復當十一月九月一陽留十月則純隂十一月而陽始生似乎有息時也然因程子之言而推之十月雖號為純隂之月然九月一陽至十月漸漸㣲故謂之有陽則不可只得謂之純隂到得一陽來復亦只是前日之陽到此漸漸長非謂一陽到十月都無直至十一月始生也故謂十月為陽月真箇十月有這陽在恐人疑其為純隂而不知陽未嘗息也故晦翁曰謂坤卦純隂而不為無陽則可而便以復之一陽已動為比則未可亦此言耳而程子所謂剥盡於上亦只得如此非謂陽果盡也此意如何剥復二卦雖皆以一畫當一月然一畫之生死首尾跨於前後兩月豈以一月之間遽分消長邪凢一畫之生生於前月之半一畫之消消於後月之半猶一日之晝夜論其氣之起止皆跨於三日如剥之消自九月半消起至十月半始盡如坤之生自九月半生起至十月半始成如坤之消自十月半消起至十一月半而始盡如復之生自十月半起至十一月半始成故坤雖號為純隂之月然上半月有剥卦消未盡之陽下半月有復卦生未成之陽所以無門可容息也無妄之九五乾剛中正以居尊而下應亦中正無妄之至者也何以有疾雖勿藥而有喜然所以致疾者何在此爻專發無妄之義五為無妄之主事事皆正本非有妄所慮者過用其心耳才過用其心便為有妄俗語所謂愛好得不好也大有之六五但言厥孚交如威如吉大有之義安在一卦以一隂為主所有已是大了但當交之以孚濟之以威則能有其大矣孚者其本有威者其不足睽九二遇主於巷主謂六五正相應也六五旣居中得正安得有巷之象當睽之時雖正應不能自合義當委曲相遇古人無不正之合獨於睽發此義者義當然耳乾一畫坤兩畫晦翁謂乾只是一箇物事充實徧滿皆天之氣坤便有開合乾氣上來時不知何謂開闔乾氣上來時坤畫中虚有開闔之氣天體渾淪包於地外地氣或開或闔能受天之氣故天之氣能從地下升騰出來恐是如此發蒙之初利用刑人童䝉之始未有識知未受得義理說話且當育飬其畏心但得畏心存在將來漸次開明直其正也方其義也繼之曰敬以直内義以方外何不言正以直内以正觧直則可以敬觧直則不可轉正為敬者蓋才敬則心必正敬則豎起精神不令放倒乃是正以直内處為下一轉語即喚起精神所以敬字有工夫易之復曰復其見天地之心大壯曰正大而天地之情可見心與情體段如何主宰者為心流行者為情乾易以知險坤簡以知阻於何處見得乾性快有作便成故易坤性隨順無作故簡陽自上臨下而不陷於險故云知險隂自下升上而不困於阻故云知阻蓋自上臨下危處為險自下升上危處為阻乾坤以易簡故不陷於險阻乾之九三獨主君子而言何哉上不在天下不在田中恰在人故發乾乾之義蓋處兩乾之間但當乾乾不息進徳脩業以盡人事耳謙卦上兩爻特發行師侵伐之義旣是謙退却反進退莫是用兵之法不欲輕敵躁進否寓至高於至下之中此兵法也何止二爻乾之四徳體仁為元合禮為亨和義為利於貞則言幹事何獨不言信與智先儒多以信說貞又何故掉智而言信於幹事有相關四徳不數信只有仁義禮智智者藏也貞固乃智之藏處四時至此歛藏花葉都彫落了只有根株固藏在下為將來發生之骨子所謂貞固足以幹事大智之藏用亦如此不言智者藏之也巽徳之制也横渠曰量宜接物故曰制此九卦又是一卦解消詳為處憂患時不可用剛宜以巽順柔伏之道裁制事宜常時當以義為制此時當以巽為制觀之卦九三之觀我生九五之觀我生上九之觀其生為觀於天下者五也旣欲為的於天下須當觀省我之所行上九雖無位乃是位高之人亦下之所觀瞻故亦當自觀其所行但避九五不得稱我猶若他人之辭耳九三去九五相逺又不為觀於人止是自觀其所行當進與不進故不嫌於同辭五位相得而各有合天一與地六合故謂之合一五為六故一與六相得不知其所以相得處如何相得謂一與二三與四之類天一地二天三地四有合謂一與六二與七之類風行天上似無蓄聚之理何以謂之小蓄風者披揚解散之意今為風矣而止行於天之上是猶有物止畜而未得解散所以成畜之小屯蹇二卦皆是處險難之義然二卦皆以九居五以六居二中正相應怎生濟不得險難二卦所以不成濟難之功者縁五陷于險中未能出險故雖有剛明之君中正之臣但可隨事經理不至水益深而火益熱此時義當然未必皆臣之過精氣為物遊䰟為變神氣聚則物生神氣散則物死又曰隂精陽氣聚而成物神之伸也䰟遊魄降散而為變鬼之歸也一陽復於下乃天地生物之心萬物榮生之時天地之心不待言而見惟枯悴剥落之時而生理孤單常在此方真見天地之心耳卦變之說程子主乾坤朱子主他卦互變未審以何為正程子之例可稱於三陽三隂之卦或三畫不等者即推之不通若曉通例即一卦可變為六十四卦卦卦皆然所謂易也若只乾坤二變則非變矣風行地上觀天下有風姤姤象如何風行地上周覧徧歴之象天下有風適與物遇之象易之有卦所以推明夫易卦之有爻所以發揮其義今也損之爻辭旣曰損而又曰益益之爻則不言損方謂損之中有益之理而益之中無損之理邪方謂聖人預先致戒於損之時必知有益何不預先致戒益之時必有損諸卦反對中惟否泰損益咸恒剥復其理勢迭為出入或雖不明言而其血脉自相連貫如損六五之得益乃有損而人益之益之上九乃欲益而人損之但不明言耳中實為孚中虚亦為孚中實為孚謂實理充乎其内而外邪不得入之此中孚之體中虚為孚謂外邪旣不得入故中惟有虚明道理此中孚之用當䝉昧之時正頼諄諄之誨如何初噬告再三瀆則不告欲開發䝉昧須是至誠求師瀆則非誠法當不告不告乃告之也夬者夬去小人之卦也彖言不利即戎利有攸徃是謂去小人之道固不當尚勇然勇旣不尚何又利於徃即所謂徃者果何事以其剛决太過故戒之以不宜專尚威武然本是决去小人之象能濟之以和說則不妨自有所徃明道曰敬以直内義以方外仁也若以敬直内則便不直矣敬義如何是仁以敬直内如何便不直持敬行義兩相夾持則私意自無所容無私意即惻隠之心流動矣皆心學也故謂之仁敬以直内則敬與心為一以敬直内則敬與心為二生熟之分耳大有上九一爻云自天祐之諸爻皆有恐懼之意此爻言天從何而來至繫辭推明其祐助之意又說尚賢又從何有尚賢之義大有之上九處大有之世而居無位之地是不有其有者自應獲天祐又居至上之位而比六五文明之賢有尚賢之義不有其有而以賢為有此爻最盛坤卦徳合無疆行地無疆應地無疆如何分别徳合無彊是坤配乾之徳行地無疆是坤之本徳應地無疆是人法坤之徳形而上者謂之道道何以言形一物必有一理道即器中之理器旣有形道即因而顯此是分開不得的事先聖欲悟後學不奈何指開示人所以俱言形者見得本是一物若除了此字止言上者謂之道下者謂之器却成二片矣繼之者善也成之者性也朱先生謂繼言其發成言其具舉孟子性善之說如何程先生曰今人說性只說得繼之者善也如孟子是人生以上不容說才說性時便已不是性繼之者善是屬太極動而生陽孟子正說此處以上即為太極矣十翼上彖下彖可以經而分上下則大象小象可以分上下乎經有上下故彖象大傳皆分上下兩儀生四象說者謂天一地二天三地四是也夫四五生数也而不及天五何耶或謂七八九六則老隂老陽少隂少陽此乃成數耳而不及生数又何耶四象不當以生成之數言此各是一法太陽之位一而其數九屬火與地二生火不同少隂之位二而其數則八屬金與地四生金不同少陽之位三而其數則七屬木與天三生木不同太隂之位四而其數則六屬水與天一生水不同一與九合而為十二與八合而為十三與七合而為十四與六合而為十四象雖不數五與十然十與五在其中有十則五在其中易主數故用其數而不用其位數主變故用其老而不用其少此六十四卦之所以獨用九六也伏羲易先天學文王易後天學先天之易謂未有文字之先伏羲神與天㑹等閒畫出一竒一耦兩兩相生故由乾一而至坤八由一畫而成六十四卦自復至乾前三十二卦皆陽也而有陽中之隂自姤至坤後三十二卦皆隂也而有隂中之陽隂陽中分而八卦交錯由是天地定位山澤通氣雷風相薄水火不相射畫中之理皆暗與天合不待仰觀俯察而自然之天文以著不待求端取法而自然之變化以行此伏羲之易所謂先天而天不違易之本也後天之易謂旣有文字之後文王觀象於天因羲畫而通變化由是八卦相乗而成六十四卦之體兩兩相對而成六十四卦之序自震而乾則象春夏之陽自巽而坤則象秋冬之隂由是乾坤處父母之位六卦成六子之功皆效法天時以明法天之用錯綜羲畫以通變化之宜此文王之易所謂後天而奉天時易之用也今人但執文字以言易而不悟畫前元有易此邵子所以高出一世之儒也無妄之六二曰不耕穫不菑畬所以發無妄之義也伊川謂不首造其事因其事之當然夫不耕而得穫不菑而得畬天下未嘗有此道理事不造其首而終求其成皆是妄也何以謂之無妄吾子可謂以辭害意矣不首造者謂作事之始不可萌計較課功意乃明道不計功之說也噬嗑一卦以九三爻隔其上下不其噬然此爻之吉反勝於諸爻何也易者易也不可死㸔卦自是卦爻自是爻不可死看此類甚多旣濟卦時旣濟矣何說亨小初吉謂柔得中指六二而言何如旣濟之尾乃未濟之首有儆戒無虞之意故只可言小亨有初無終而以柔居中者可以當之資生資始資始於父資生於母所謂父天而母地也夫乾其静也專其動也直夫坤其静也翕其動也闢專直翕闢如何此當以卦畫論卦畫始生惟乾之一竒未有他物此其體也其專也已而纔動則直遂而生生不已卦畫旣生乾之諸卦以次呈露獨坤居後包在乾諸卦之裏而猶未露此其體也其翕也至其動也則坤之諸卦始從乾諸卦裏開闢出來遂分了乾之一半元亨利貞程子以元為物之始亨為物之長文言曰元者善之長恐亨不可以言長此乃春生夏長之長非首善之長修辭立其誠若如是只是修飾言辭却是做僞立誠自修辭中來如何修辭謂字字必有體當一字不茍下遣辭出語所以如是之不茍者乃欲立自家之誠體當吾心之實理非是要人稱說好也要人稱說好是巧飾之辭是為自欺與此正相反要知此只是存誠之誠非是便說至誠屯卦獨六二六四上六說乗馬班如未曉其義若初九與九五陽爻固不必疑三亦隂爻也義何為而異豈三居震極有動而躁進之義二四與上皆以隂居隂位故難進以亨屯耶所有班如之象當屯之時陽剛可濟屯若隂柔則不能上進以故皆有乗馬班如之象乃處屯之道故皆無悔吝若三旣是隂柔不中不正又無正應處震體而居上有躁進之心故其象必陷於林中安得班如耶此卦六三爻最不好需卦六四出自宂上六入於宂所以為出入者何如二爻皆陷於險故有宂象四始雖䧟而終出宂者以柔順得正當需之時不好競進故雖需而不得其地而可拯以出不為害也上當出險而知入宂者以為當需之極暗弱不能少待故反入於宂然亦好進之禍乃是為諸陽所逼非意之來故復有不速客之象雖入於宂而未害也大抵需以不進為得好進為㐫比之六三比之匪人謂所比非人為可傷也而否卦則曰否之匪人上下不交而天下無邦則國非其國矣謂之匪人言不成人道也或疑三字衍文自比卦誤來蓋彖傳不正解故也此卦傅匪字為文比之九五凢言正中者其處正得中也比與隨是也言中正者得中與正也訟與需是也比隨二五皆處正而得中訟需二得中而不正五得中而且正故伊川發此繼善成性繼與成字如何凢物之生先有理而後有氣善當作理看此性謂氣質之性道即太極也太極才動首先撒出者便是理故以繼善言隨太極之後次漸成就者即為性成則有形質矣孟子說性善是第一義從他繼之者諸子說不善是第二義從他成之者數徃者順知來者逆今按圖而考自震而乾自巽而坤猶四時循環而分逆順何也卦圖始生只如横圖自乾一至坤八六十四卦皆用一倍法兩兩生去雖未生出數可逆知故曰易逆數也若交一轉過而交為圓圖却從中間數去不從乾一數而從震四數自震至乾皆是得其已生之卦卦本從乾生至震今却從震数至乾是数徃也旣交乾後自巽至坤這一半是元生次序仍是未生之卦故言知來者逆謂正合圖本生法可逆數而知也先生嘗日易有十義看卦象卦徳卦位卦時卦義卦變看爻比應承乗乾用九坤用六老陽數在九老隂數在六少陽數在七少隂數在八八卦本生於四象六七八九之數皆具但老者能變少者不能變故易用老而不用少主於變也六十四卦皆然以乾坤純隂純陽故以此發之履卦辭有履虎尾之象蓋指六三為履主而指九四為虎尾觀六三之爻可見至九四爻則又有履虎尾九四乾下固尾五乃乾中亦為虎尾可乎切謂尾固有躡而進之之義亦有正履之義恐亦是四為虎尾特所履有二義耳卦辭之虎尾主九四言其正體也爻辭之虎尾主九五言其變體也九四旣為虎尾豈可自言履使正履之言於九五可也伊川履分兩義多疑惑人晦翁所以一般看但卦為正體爻多變體所以為易不可執伊川謂艮之道當艮其背所見在前而背乃背之止於所不可見而無欲以亂其心是毋乃有近於絶外誘乎夫不見可欲使心不亂見可欲則此心如何愚意艮其背不獲其身是不迎物於將來所謂静亦定也竊詳伊川止於所不見之地止謂未與物接之初内欲不萌雖有耳目口鼻而有不見其身忘我之說非是欲絶外誘使之不見但其語有類老子不見可欲之說本義所以定背為止謂一身之間惟背常止而不動艮其背非謂止於所不見乃止於所止而止也行其庭不見其人則行而止也來說静亦定動亦定者得之無妄之六二曰不耕穫不菑畬無所覬於終則無所營於始爻之義也然事有當為不可無覬端之人以不望穫而不耕以不望畬而不菑則是反有以廢天下之事毋乃不可伊川大意只謂不為穫而耕不為畬而菑凢有所為而為者皆計利之私心即妄也但經文中不如此下語故易傳中頗費言語始謂不耕而穫不菑而畬謂不首造其事則似以耕菑為私意中謂耕則必有穫菑則必有畬非心造意作則以耕獲菑畬皆非私意終謂旣耕則必有穫既菑則必成畬非必以穫畬之富而為則又似穫畬為私意三說不免自相牴牾所以本義但據經文直說謂無耕穫菑畬之私心蓋農夫治田都無計利之私心當無妄之時皆不可有此意想如農夫之耕穫則於經文甚直無繚繞之礙六爻之動三極之道也上二畫為隂陽中二畫為仁義下二畫為剛柔其變動不居之體乃是太極之理晦翁嘗說知崇禮卑効天法地以為此之取類以清濁而言不知以清濁而言知禮如何知以虚明為用屬陽屬天皆言其輕清也禮以形氣為質屬隂屬地言其重濁也脩辭立其誠是脩辭了又著立誠還是脩辭立其誠一事茍則事事皆茍先聖說此話非是脩飾言辭要人說好只要欲體當自家之誠意辭語纔不精擇即心裏潦草可知坤之上六龍戰於野坤隂物也疑不得稱龍豈非隂盛則化為陽也古者人臣之盛各有敵其君者如王與馬共天下其是類歟來說得之大壯卦多說羊羊是兊之屬不知如何看說卦兊為羊之說如何兊為羊古人取象義不可知但其卦一隂在上類羊角然睽之初九云喪馬勿逐自復陽性上進有馬之象因何而喪後來因何勿逐自復陽欲上進而無應與欲進不可是喪馬也然當睽之時雖無正應而同舟遇風則二陽必同而相應是勿逐而自復也諸卦有孚之義皆主卦體中實中虚而言比之初六隂爻在下何以曰有孚盈缶此爻最難消詳當反轉看有缶之象焉四隂在上有中虚之象初反居上無􅇲口有盈滿之象大過何以取喻於棟二隂夾四陽在中中隆起而兩頭垂有屋之象其中二陽有棟之象水在木上何以謂之井謂木入水而上水汲水於井之象如釣桶之類天下有山何以為遯天上行而山下止有違去不相親近之意雷電何以謂之噬嗑電之閃鑠有人口開闔之象否之六二包承小人吉伊川謂承順乎上求濟其否為身之利小人之吉楊龜山則以夫子之見南子為聖人包承小人何也此爻只合作小人看當否之時居中用事乃卦之主但其質柔順而居中正乃小人之忠厚善承君子者故在小人分上不害為吉大人如是則可羞矣乾文言乾元者始而亨者也利貞者性情也敢問其㫖始言元亨情言利性言貞此猶以四時言四徳言旣有春為萬物之始則至夏必亨通條達秋則成熟而致利天地萬物之情見矣冬則歸根復命貞固歛藏則天地萬物之性正也旣有貞固之性遇春則發生矣賁之彖論人文則曰文明以止論天文而不言其所謂文王弼註曰剛柔交錯而成文不知其所謂剛柔者抑上文所謂剛柔耶愚意上文之所謂剛柔者以上下二體而言恐非所謂天之文也此作缺文看亦得只就上文認亦得柔來文剛剛上文柔剛柔相錯只此便是自然之天文剛柔交錯即日月代明非天文而何成之者性與天命之性同乎否乎成之者以氣質言也命之者以氣禀言也大畧相近無咎者善補過之辭也乾聖人之事九三九四皆以無咎言之豈聖人庸有過之可補乎爻義有不足處有當垂戒處故各係以無咎之辭豈拘聖人與凢人易之為易謂變易不拘聖人即作聖人用凢人即作凢人用若乾卦只㫁作聖人則六十四卦只㫁作六十四人却是死了何名為易知崇天也形而上也通晝夜而知崇矣知及之而不以禮性之非己有也故知禮成性而道義出如天地位而易行其義何如易言知崇即中庸尊徳性致廣大極高明底事易言禮卑即中庸道問學盡精㣲道中庸底事知雖崇而禮則卑方不流於清虚而有執守依慿之實地知崇天也形而上也止非已有也故知禮成性而道義出如天地位而易行何如智欲高明故崇如天禮欲執守故卑如地若一向務高明而不事著實則窮賾索幽有釋老𤣥虚之病須是約之以禮二者相合成性則道義之出無窮猶天地設位而易行乎其中也若有知而無禮是有天而無地易何自而行哉窮理盡性以至於命處如何語學明理之後方能擴充以盡其性到盡性田地方是了當為人之理方於本來賦予自家底無少虧欠乃聖人極至之事毫髪無遺憾必如是而後與天無間故曰以至於命蓋到此地位自已便做天命了更不須别說知命立命能説諸心能研諸慮晦菴先生解云說諸心者心内理㑹乾之事也研諸慮者理内慮審坤之事也未說乾坤之義如何乾陽明之用故見理快坤柔順之體故見理遲此章專說乾坤兩句分配當然木鍾集卷四
