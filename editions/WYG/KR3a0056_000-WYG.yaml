body:
  text: 木鍾集儒家類提要臣等謹案木鍾集十一卷宋陳埴撰埴字器之永嘉人嘗舉進士授通直郎致仕其學出於朱子永樂中修五經大全所稱潛室陳氏即埴也是編雖以集為名而實則所作語録凡論語一卷孟子一卷六經總論一卷周易一卷尚書一卷毛詩一卷周禮一卷禮記一卷春秋一卷近思雜問一卷史一卷其說大學中庸列禮記之中蓋其時四書章句集註雖成猶私家之書未懸於國學施之功令故仍從古本史論惟及漢唐則伊洛之傳不以史學為重偶然及之非専門也其體例皆先設問而答之故卷首自序謂取禮善問者如攻堅木善待問者如撞鍾義名木鍾刋板久佚明𢎞治十四年温州知府鄧淮始得舊本重刋自第五卷至十一卷皆題曰某卷下疑或各佚其上半卷而核其所列則書始二典詩始比興賦春秋始隠元年近思雜問始理氣史始漢皆不似尚有前文惟周禮不始天官而始府史禮記不始曲禮而始王制似有所佚然府史之名先見於序官而王制亦禮記第三篇即從此托始亦無不可宋本既不可見姑闕斯疑焉可矣乾隆四十四年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀木鍾集題詞志曰善問者如攻堅木善待問者如撞鍾朋友講習不可以無問也問則不可以無復今之不善問者徒先其所難後其所易取其節目之堅乃欲一斧而薪之不少徐徐以待其自解則匠石從旁而竊笑之矣至其待人之問者或小叩之而大鳴或大叩之而小鳴不待其再至而亟盡其餘聲或餘之未盡而恣其人之更端焉然則是鍾也其必州鳩氏之所棄者乎余非待問者顧諸友方持班氏之斧以運成風之巧乃欲以空中之物隨酢焉其不哆然肆黯然啞者幾希矣或曰空故能聲虚故能應壊木之竅穴而萬籟出焉物固有然者矣余有感於斯言也取二物因命之曰木鍾焉子幸有以問余余方以問子永嘉潛室陳埴題
