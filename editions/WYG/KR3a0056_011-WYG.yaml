body:
  text: 木鍾集卷十一宋陳埴撰史三代治天下曰井田曰封建曰肉刑後世變井田為阡陌變封建為郡縣變肉刑為鞭笞而末流愈不勝其弊今欲追復舊制於斯三者何先復古惟唐得之世業府兵六典建官分畫措置最有法度其不傳逺者非作法之不善自是家法不正無賢子孫耳先儒謂必有闗雎麟趾之化而後可以行周官之法度古人所以兢業寅畏左規右矩者正欲立箇人様以為守法之地耳考漢選舉法漢選舉法有孝廉有明經自為曹椽於郡國而太守察之則為孝廉自為博士弟子於太常而學校舉之則為明經今觀孝廉一科自漢初已有如家貧無行不得推擇為吏其鄉閭之公論如此至文帝時孝廉之科雖設而萬家之縣猶無應令葢有人則舉無人則止猶未有定法也自武帝初令郡國各薦一人則始有定法矣當時猶且闔郡不薦至勤詔書督責則士之自重難進如此而梅福亦議漢以三代之法取當世之士則薦孝廉之法猶有三代鄉里舉選之遺意漢之得人大抵如此明經一科自武帝立五經博士置弟子五十員令二千石謹擇可者常與計偕詣太常受業一嵗一課其通一藝以上補文學掌故及公孫𢎞變更之後勸之以官爵枝葉日蕃迄於始元之間增弟子員滿百人又增至三千人明經始濫於𢎞之變更矣至於賢良方正茂材號為特舉皆詔而親策之於庭今攷一時人物自董仲舒猶不免科舉之累况晁錯公孫𢎞杜欽谷永之徒依違附㑹殆無異於明經之科其不逮孝廉逺矣自東漢之末察廉之法壞覔舉之請行故左雄限年之請令諸生試家法文吏課箋奏覆諸端門課其虚實以觀其能異而孝廉覆試之法自此始矣大抵漢初任人不任法所以選舉皆實意惟賢是用而已漢末任法不任人所以選舉用私意兹其所以弊也南北軍辨先儒多以中尉為北軍以表有中壘校尉掌北軍壘門故也疑是内外相司察處以衛尉為南軍至郎中令不知其所領為何竊按郎中令所領皆郎從正是環宫宿衛之士與古國子同武帝以儒生不足仗又置一項親兵若羽林佽飛之屬正屬於郎中令審爾則環衛重兵無如南軍衛尉所領乃郡國畨上宿衛之數中尉非宿衛吕氏南北軍皆宿衛南北軍皆環宫宿衛之兵南軍屬於郎中令武帝改光祿勲所謂掌宫掖門户是也其衛士即諸郎為之表云掌守門户出充軍騎多或至千人多子弟及儒生武帝增置期門及羽林軍以六郡良家子為之多亦至千人始尚梟勇武力矣以上並見郎中令表北軍屬於衛尉所謂掌宫門屯衛兵是也其衛士乃郡國之民更畨為之嵗常轉至一萬人新故送迎率常二萬人在道武帝初年省其半見武帝紀衛尉屬官有候官司馬等葢寛饒嘗為之極能撫循衛士及一嵗盡當更衛士數千人願復留一年以報寛饒徳見本𫝊則衛尉所領為畨上之士可知南北軍雖領於二卿郎中令衛尉而列將軍實為主帥故吕后欲為難使吕祿以上將軍居北軍使吕産以相國居南軍文帝新即位夜拜宋昌為衛將軍兼領南北軍則知二軍領於列將軍者其正也其以相國分領者以吕祿才弱故爾大抵北軍重於南軍故平勃止得北軍足以定大難吕氏既失北軍雖有南軍無能為矣或者不察乃以衛尉為領南軍中尉為領北軍按周勃既得北軍便令衛尉無納吕産殿門則衛尉𨽻北軍可知中尉掌巡徼京師乃督察長安盜賊事王溫舒嘗為之所治皆長安豪猾全無一事闗於宿衛或者又以京城諸屯兵以校尉之屬為北軍按吕后既以祿産領二軍臨終戒之以據兵衛宫無送喪則二軍皆屯衛宫禁可知又周勃既入北軍便迤邐去殿門入未央宫則知為宫門衛兵無疑南北軍力心膂爪牙之寄一則以子弟郎從為之一則以郡國之民更畨為之用見國家一體兵民一致必如是而後可以肅環列壯帝居矣又漢舉選法漢史上而天文地理有志次而禮樂刑法有志又次而食貨溝洫有志選舉大事也而史獨無志焉意者科舉未立流品不分取士之路廣禁網疎闊故史無得而志焉今考之紀傳侯王將相有辟舉若給事舎人之類郡國有察舉即孝廉是也朝廷有特舉若賢良方正茂才異等之類而又有舉於太常受業者為博士弟子即明經是也其他任子雜流不與焉夫漢自文帝十三年始有選士之詔當是時或家貧無行不得推擇為吏或萬家之縣猶不能舉一人以應令是時鄉里之公議猶明士猶知自重難進朝廷選士猶未有成法也至武帝元光元年因董仲舒建議始令郡國舉孝廉嵗各一人於是立為定法限以人數然當時猶有闔郡不薦一人者至勤詔書督促元朔元年由是不舉孝有論不察廉有責可見士安於鄉閭無求舉覔舉之事大抵察舉一科惟施於郡縣吏漢以文吏立國故士皆從於郡縣小吏進才經部刺史二千石察舉則以次遷為令長又次遷為守相駸駸公卿顯官皆從此途出往往養廉逺恥之意多而偷合茍得之行少雖不通於儒術而亦不失為節義有守之士所以文景武宣之世人物皆有實用之才往往多從察舉出若夫太學明經之士其不逮察舉逺矣自武帝立五經博士於太學置弟子員五十人使士咸得詣太常受業一嵗一課通一藝者授文學掌故不能通藝者即行罷黜其後公孫𢎞起自儒生始為其徒開升進之路遂以為補文學掌故者厭薄流滯不足以興起士風於是大而九卿之卒史小而郡縣之卒史自明經選者皆得補而為之夫卒史文法小吏耳由明經入仕而反使為文吏若小貶矣然漢法賤經生而貴文吏故自文吏出者皆榮進之路是以終漢之世利祿之門開奔競之徒盛而公卿宰相彬彬多文學之士若張禹孔光之徒皆持祿保位患得患失之士要其蠱壞儒生之心術多矣吾故曰漢選舉之法雖無其志而得士為最多者莫盛於郡國察孝廉一路若太學明經之選則又其次也漢職官志皆襲秦舊如三公尚書皆秦官三公自立國之初已置而尚書特始於武帝之時爾三公號無不統事皆决於三公而三公之秩萬石也宣帝時張安世以車騎將軍霍光為大將軍領尚書事則知尚書乃典職樞機與三公等後漢和帝時鄧彪領尚書事位在三公上以此言之尚書當與三公同其貴而秩直二千石耳若曰職輕權重則是尚未能與二千石比秩而反在三公之上何耶尚書乃内庭之臣與尚衣尚方尚符璽等同流所職乃郡國㑹計圖籍等書或内外奏疏本是猥屑之職在人主左右供顧故屬於少府多是外戚及子弟濁流為之然以其親近至尊為人主私臣號為職典樞機故自武帝後其權寖重往往諸將軍領之故凡以大將軍大司馬領尚書事則權重於三公而丞相始為具官矣尚書如何敢比三公但以大司馬大將軍之名則始為重矣尚書在文景以前不多見是時内庭之權未重自武宣以來其權始重率以外戚霍光諸人及列侯子弟為之張安世士大夫鮮有出此者至元成以後始用儒生故博士選三科其髙第者為尚書始有正員由是張禹孔光皆以師儒入典樞機多者至十餘年養成王氏之禍其狼狽甚於雲山恭顯成帝建始四年罷中書宦官初置尚書員五人注云常侍尚書主丞相御史事二千石尚書主刺史二千石事户曹尚書主庶人上書事主客尚書主外官事此漢舊制是為四曹成帝增三公曹主斷獄事是為五人漢鬻爵之法漢初賣爵入粟不入錢賣爵不賣官在文景時可攷至武帝不賣舊爵别立武功爵此乃前術窮而更新一法到此時入緡錢矣爵與官俱賣矣此五大夫有為吏先除之法豈不是連官賣了一夫之爵直錢若干今不可攷其級爵止賣十一級千夫爵是第七級得除吏第九級則免徭役未知是否又云茂陵書只載十一級其餘不見十九級是闗内侯二十級是通侯考儒林傳公孫𢎞新學法初太常制法其制有四置博士弟子則擇民間議狀之端正者補之其郡國縣官有可取者取之受業亦如子弟至於一嵗攷課能通一藝者補文學掌故而髙者則為郎中且掌故之職不一有太常掌故有治禮掌故有太史掌故有文學掌故要之皆屬於太常也而又有州郡文學掌故之為官其職之留滯甚多其階之遷轉甚緩通經之士得由郎中而進者皆是右職得為掌故者皆是滯選葢漢世士大夫除軍功外多從刀筆吏出而儒生率鬱滯不得進於是公孫𢎞有優掌故之請焉太常中治禮文學掌故凡其秩之比二百石及吏百石之能通經者補左右内史大行卒史秩之比百石以下者補為太守之卒史太行卒史即九卿之官卒史猶今堂部令史也太守卒史猶今日孔目官是也至於人衆而額少不足以容之又就文學掌故中選其優者攢上一等補九卿郎中二千石待闕椽屬其次補郡椽屬卒史椽屬雖非清選却是仕途捷徑自是公卿大夫彬彬多文學之士矣而儒生之心術亦自此而壞班固以為利祿之塗開者蓋自公孫𢎞始漢武帝命唐都洛下閎推算星厯以為合於夏正改用太初厯按自黄帝以前調厯有上元太初等厯今以合夏正而用太初厯然則夏亦用太初厯乎否也前厯太初既在四千六百十七嵗之前是洪荒時節厯家推上元太初謂四千六百十七嵗已盡都無絲髪餘重新起厯是時定十一月甲子朔旦夜半冬至定日月如合璧五星如連珠乃新厯之第一日故謂之厯元漢元封七年適當其時故改秦厯用漢厯改秦正用夏正非謂夏亦然也雲臺二十八將凡有功佐漢者咸取焉馬援以椒房不與何謂也而來歙有平隗囂之功何獨不預麒麟功臣史謂以黄霸于定國夏侯勝諸名卿猶不與可以知其選矣此語有味安得人人而及之但馬援以椒房之親不得與此却有意於公未為適義理之正霍光不害為麒麟之首漢宣帝之麒麟閣明帝之雲臺二十八將及唐太宗之十八學士凌煙閣皆所以圖畫功臣也惟觀漢之人主務實不務名唐之太宗務名而無實以許敬宗之姦佞而與十八學士之選以侯君集之小人而與凌煙之數皆失實也不然漢唐之皆有得失否此未免以成敗論所可論處者亦多却不只在二子二子不足為輕重唐學士之選即淮南王安之招致賓客羽翼既多便有相軋之勢凌煙雖祖麒麟雲臺然漢時却有教化之意寓其間如以蘇武而預麒麟以馬援而不與雲臺此殆有深意唐則無之唐百官志宰相之名學士之職如何唐世宰相名甚不正漢有相國丞相之名唐不設宰相之名其意本以重宰相不輕授人遂以三省長官中書令侍中尚書令唐太宗甞為尚書令後改其名為僕射為之其後中書令侍中尚書令不除遂有他官假有參議參闕為宰相者如杜淹以吏部尚書參議朝政魏闕參預朝政於是宰相無一官不可為在太宗時闕宰相者其後以宰相名號不一遂有同三品同平章事之號夫既曰同矣依舊不曾有正相至明皇開元以後又欲重宰相之權而使兼領他使時方用兵則為節度使時方崇儒則為學士時急用財則為鹽鐵轉運使又其闕資庫使其意本欲重其權殊不知宰相無所不統今乃下行有司名為重而實輕之要之唐宰相之名其初本欲重之而不肯輕與而其後遂至於無宰相而他官皆得以為之又其後也至於無人不可為宰相又其終也宰相兼領他職無異於有司是以終唐之世竟無真宰相其弊皆起於宰相之名不正耳至於學士之職尤為非正大率制詔誥命合是中書舎人為之若夫學士名官本以備遊宴之選供翰墨之娯如漢朱買臣東方朔之輩正是相從於文墨宴遊之末不干預機務猶未為失自太宗時崇瀛洲之選猶止以備燕見又文書詔令自是中書掌之其後時召以草制猶未有名號自北門學士立於乾封以後則學士之名寖重至𤣥宗又置翰林待詔掌四方表疏批答應對則學士預政漸始於此既而又以中書務劇乃選文學之士號翰林供奉與集賢學士分掌詔敇至開元二十六年又改翰林供奉為學士别置學士院至與宫妃相與往來專掌内命為天子私人凡拜免將相號令征伐宣麻制敕皆由此出於是以學士為内制中書為外制凡大除拜皆出自内制百官告詞則出自外制彼學士既得以侵中書之事於是進退人才機務樞密人主往往與之較量始干預朝政事權日重而學士之權至號内相范唐鑑所謂中書門下出納王命之司也故詔敇行焉明皇始置翰林而其職始分既發號令預謀議則自宰相以下進退輕重係之矣豈特取其詞藝而已哉其説極是要知唐學士之職其初來本是供宴遊翰墨而終至於干預政事又其後也宰相進退亦出其手終唐之世委任失人而王伾王叔文李訓鄭注之徒皆得以竊國家之柄其弊皆自明皇始唐制十八道節度其後號九節度其後河朔三鎮及四凶二䜿之亂可攷大畧明皇天寶元年置十節度經略使以備邊曰安西曰北庭曰河西以備西邊曰朔方曰河東曰范陽以備北邊曰平廬以備東邊曰隴右曰劒南以備西邊曰嶺南五府經畧以備南蠻節度之立其初固止於㳂邊十道耳自安祿山之亂則内地始置九節度以討之曰朔方郭子儀淮西魯炅興平李奐滑濮許叔兾鎮西李嗣業鄭蔡李廣琛河東李光弼澤潞王思禮河南崔光逺内地之置節度其初猶止於九道耳自朱氏之倡亂中原也則自國門之外皆方鎮矣葢其先也欲以方鎮禦四夷而其後也則以方鎮禦方鎮十道既已兆亂則内地必置九道以除其亂九道又兆亂則闗外近郡又不得不置矣至代宗廣徳元年以田承嗣為魏博節度李懐仙為盧龍節度李寶臣為成徳節度是謂河北三鎮各有其地其風俗獷戻過於夷狄吾知其河北之地非復朝廷有矣至於大厯九年相推戴而謂之四王朱滔稱冀王田恱稱魏王王武俊稱趙王李納稱齊王李希烈又以淮西稱帝朱泚又以闗中稱帝裂土假王者四凶滔天僣帝者二孺紛紛藉藉不知其幾也蓋唐之亂非藩鎮無以平之而亦藩鎮有以亂之其初跋扈陸梁者必得藩鎮而後可以戡定其禍亂而其後戡定禍亂者亦足以稱禍而致亂故其所以去唐之亂者藩鎮也而其所以致唐之亂者亦藩鎮也試以其一二論之安史之亂懷恩平之也而留三鎮以遺患者亦一懷恩也將兵至京師冒雨寒而來姚令言之功也而所以迎朱泚而趨京師者亦一令言也擒子期破田悦者李寶臣之功而釋承嗣以為己資者亦寶臣也卒至於終唐之世莫敢誰何者由三鎮始也唐初邊防鎮守皆有使而道有大將曰大總管已而更曰大都督髙宗永徽以後都督帶使持節始謂之節度然猶未以名官至睿宗景雲元年以幽州鎮守薛訥為節度使而節度使自此始至明皇天寶元年置十節度經略以備邊如安西北庭河西朔方河東范陽平廬隴右劒南嶺南凡十道皆為備西北南三邊設皆使自治所領諸州練習士卒故士卒亦樂為用而唐之備邊有賴焉然唐初邊帥皆用忠厚名臣不乆任不遙領不兼統不以大臣為使以制之而節度有功則入相自開元中天子事征四夷始有邊將乆任十餘年不易者有皇子宰相遙領者又有以專制數道兼領者葢李林甫欲固相位遂謂文臣不任邊事欲用胡人習邊事者為節度以塞節度入相之路有功者皆得兼領如安祿山等皆是胡人為節度祿山亦有邊功遂得專制范陽平盧河東三道以致兵盛勢强遂成天寶之變祿山死史思明又輔其子安慶緒繼叛而其他節度大抵皆安氏黨與至肅宗乾元元年更置九節度朔方則郭子儀淮南則魯炅興平魯奐滑濮許叔冀鎮西李嗣業鄭蔡李廣琛河南崔光逺河東李光弼澤潞王思禮共九道之師討慶緒又不置元帥無所統一慶緒死史思明繼叛思明死子朝義繼叛至代宗時僕固懷恩以其女為公主妻回紇之故遂得回紇之師平史朝義僕固懷恩自以功成身危幸變為資於是請以安史手下許多降將分居安史故地田承嗣為魏博節度李懐仙為盧龍節度李寶成為成徳節度河北三鎮自此始其他以薛嵩領相衛大抵率用降將為之自此以後三鎮或世襲或易姓兵連禍結朝廷亦無如之何依舊賊還賊捉又自是三鎮中賊將自與朝廷平討往往亦時有功一有功又自叛據如田悦拒命朱滔討之滔一請深州不許便與成徳王武俊合從於田悦田悦得朱滔之救便與武陵奉滔為王於是又與平盧李納相扇而起滔稱冀王田悦稱魏王王武俊稱趙王李納稱齊王是謂四凶聞淮西李希烈軍盛又相與勸希烈稱帝當是時犯京之兵朱滔希烈為盛朝廷盡闗輔京城之兵以討之是以陸宣公恐兵皆在外患生蕭牆勸徳宗收兵歸闗以諸叛賊委之馬燧李抱真等而徳宗不聴先是朱泚來朝朝廷疑之遂留之京師及是時李希烈圍襄城涇原節度姚令言本以勤王之師至京師因犒賞菲薄兵衆自亂乃謀迎朱泚為主遂有奉天之幸果不逃宣公所料後來李懐光以盧杞不令入見天子遂與朱泚合謀而朱泚亦稱帝是與李希烈共為二孺自此以後盧龍魏博淮西雖在中土其世為叛逆與蠻夷無異不復知有朝廷矣是時自京師之外處處如邊陲相似處處是節度使於是節度滿天下而唐之亂甚矣至憲宗僅能一平河朔至文宗復失之大畧唐之節度本以備邊後來㳂邊人自為冦國自為邊朝廷所立節度反以備内而非備外矣漢武置十三州刺史與今監司同否漢刺史政今日監司但刺史秩卑而權重止六百石史秩卑則激昻却慮其權太重故止以六條問事今日秩崇而權分秩崇則養尊不事事權分則法不舉漢祿秩等數如何只二千石無數様漢秩自太常至執金吾秩皆中二千石太子太傅至右扶風秩皆真二千石西域都䕶至駙馬都尉皆比二千石此漢秩然也漢祿丞相大將軍號萬石俸三百五十斛至佐史俸月百八十斛二千石俸月百二十斛比二千石俸月百斛至後漢延平中中二千石俸錢九千米七十二斛真二千石錢六千五百米三十六斛比二千石錢五千米三十四斛此漢祿然也後漢俸祿半錢半榖二千石以下則有千石八百石及六百石又其下則有五百石至百石直郡縣之小吏耳若二百石以上則曰長吏如令丞是也至六百石始通爵於朝如今選人之改京秩是也中二千石乃九卿為之下三公一等非他二千石比也只以俸祿言之中二千石與真二千石倍爭尹翁歸以髙第入守右扶風滿嵗為真韓延壽入守左馮翊滿嵗為真真之制如何有真二千石有中二千石有比二千石均二千石也而有三等惟真者嵗俸方滿此數餘皆虚號耳髙帝入闗約法三章悉除秦苛法至於收孥相坐之律誹謗妖言之罪待文帝而後除何也刑法志云三章不足以禦姦於是蕭何攟摭秦法作律九章想諸將繼叛之後此等法仍用至文帝方盡除耳漢書髙帝元年冬十月五星聚于東井攷之厯云太白辰星去日率不能一兩次耳月令孟冬之月日在尾尾析木之次也析木去東井隔五次若然則金水二星安得復在東井五星活物盈縮見伏遲速至無常天文家謂之五緯言其往來無常所也然雖往來無常依然有法可候㑹當聚時即聚為軌度但所聚之次有休咎不同若聚于東井即為休證越徳嵗而吳伐之越是時何謂徳嵗晉太和五年秦滅燕黄泓趙秋以為福星在燕何謂福星徳嵗謂嵗星即木星古分野得名皆以侯國始封之日嵗星所次故因以為分野以此知自古天文家常以嵗星所在占吉祥今嵗星正次越分野足知吳之不能為也福徳恐亦嵗星之吉卜律厯志云非黄鍾而他律雖當其月自宫者則其和應之律有空忽積㣲不知所謂空積者如何律法唯黄鍾之宫五聲皆正聲皆全數如九寸六十四八寸六寸八十一七十二五十四四十八之類是謂無空忽積㣲若其他十一宫未必皆正聲或變或半皆全數故有空忽積㣲如大吕言八寸二百四十三分寸之一百四除八寸是實數也外言二百四十三分者皆空積也寸之一百四者忽㣲也蓋虚起此筭數其空積甚多而所得甚㣲細也髙祖大封同姓卒有尾大不掉之患髙祖明達何不慮此懲戒亡秦孤立之弊故大封同姓聖人謂百世損益可知此類是周以封建亡故秦必損之秦以不封建亡故漢必益之事勢相因必至於此兼漢初户口減少封諸王時計户而不計地故封三庶孽分天下半其後户口日蕃所以彊大劉濞之王吳髙祖知其必反而復遣之何耶此髙祖徳性規模所以大於唐太宗漢光武二君以䜟緯殺了多少人髙祖大度世率以為光武不可及至其誅韓彭英盧事反不若光武之全功臣何也髙帝是天然大度其弊至於任情光武法髙祖大度其終却能矯弊漢髙人謂其寛仁長者韓彭英盧曾未免於誅死何耶方事之殷能奪諸公死力是髙祖善將處及事之定置諸公於死即將將之餘習未忘寛仁本其天資殘忍是無學問髙帝不免韓彭之誅而光武乃能全功臣之世此大有説一則逐鹿之勢外相臣服事定難制一則祖宗之業名位素定事已相安一則草昧功臣豪傑難収一則中興功臣謹守規矩一則大度中有嫚罵之失人心素疑一則大度中能動如節度人心素定一則刼其死力封爵過度不計後患一則赤心在人監戒覆轍務在保全髙祖之斬丁公義矣而項伯之封非也然㣲項伯則天下非髙祖有又豈可不有以酬之二人事本相類但項伯初無稱功之意封之出於帝心丁公未免有望報故為帝所薄耳要之凡適相遇而能出人於險者皆不當以姓名聞以姓名聞則敗矣况有徳色乎漢文之仁至景帝而衰何以漢言文景武帝虚内事外漢祚幾亡何以列在七制景帝好處只是不改文帝恭儉武帝好處只是晩年一悔凡並稱者皆喜配之辭其實喜生於不足如言蕭曹曹本劣於蕭如言韓栁栁本劣於韓七制列武帝緣宣帝以匈奴來朝故大先帝之功而宗之王通亦因其帝制云耳晉文忘從亡之功漢文修代來之功其推恩與否有可言者晉文才入國便賞從亡者偶忘介子耳雖覺示人不廣然晉文間闗十九年所以能興國者盡諸公之力且又多賢人故得國之後可以共爵祿若漢文入繼皆平勃諸侯王之功而首修代來之功又張武等皆庸才而各親其親此却示人不廣漢文殺薄昭李徳裕以為殺之不當溫公以為殺之當未知孰是雖未免少恩然以文帝仁厚之資為之乃是借一人以行法於仁厚中有神武焉薄昭事無正史可考通鑑所載乃出漢紀注中漢文時吳王不朝賜以几杖此與唐之陵夷藩鎮邀節旄者何異不幾於姑息之政歟文帝是純任徳教權綱在上伸縮由己唐一向姑息權柄倒持於下予奪由人兩事不可同日語肉刑始於苖堯因之而不革更虞夏商周而又不革漢文以一女子之言而革之何唐虞三代不知出此文帝除之而刑亦措何耶先儒謂井田學校封建肉刑四者廢一不可不知秦變古法凡古人教民養民處掃地不存單獨留肉刑以濟其虐雖㣲文帝必有變之者此蓋損益盈虚理勢必至能通變宜民雖成康復起不能易也漢文平生所為大扺出於黄老至其得力處亦是黄老不聞有無情少恩之病文帝天資粹美却能轉得黄老不好處作好處景帝天資刻忍却將黄老好處轉作不好處惠帝減田租復十五税一夫漢之初興今年復田租明年復役事而又十五税一儉於周什一之税然當時太倉之粟陳陳相因未審何以致此文景減田租事尤多或三十而税一或減租之半或盡除之所以致富庶者人主恭儉寡慾無兵革之事故百姓亦皆富庶武帝虚内事外漢祚幾亡雖輪臺之悔亦晩矣安得預七制之列七制想自文中始文中本無大見識因取其制詔以續書故尊之但武帝征伐四夷之功雪祖宗之恥自宣帝時已定其廟為世宗其後議宗廟者比之武王係不祧之數則其子孫之意也光武之失正在攬權而史乃稱其總攬權綱舉無過事何耶光武再造於僵仆之後如何不總攬權綱但末流之弊至不任三公乃矯枉過正非謂全不是孝宣輕徳教而雜霸道用法吏而任刑名趙蓋韓楊之誅似近於虐也乃有務行寛大之稱何耶寛大之詔盛美生於不足孝宣綜名實而王成以偽増户口褒賞遂起天下俗吏之偽然綜覈者安在刑名術數之家各是執一實以御百虚老蘇所謂人服吾之識其一而不知吾之不識其九也宣帝殆用此術間有受人欺處不害他大體也宣帝時王吉言請除任子之法不知漢任子自何官可任何官不可任中間廢置增損如何漢法任子多是為郎或父任汲黯或兄任霍光或異姓任諸侯王得任異姓見汲黯傳尾次第必二千石以上方可保任故董仲舒謂今郡縣長吏多出於郎中中郎或二千石子弟蓋長吏多自郎選而為郎者率二千石子弟郎選不以父任則以家貲多出此二途史氏謂陳勝諸故人皆引去無親勝者與諸將不親附此其所以敗也此是勝之節目先儒乃謂勝之亡其大體不在是勝與吳廣同功一體田臧擅殺吳廣勝不能制則紀綱掃地唇亡及齒此勝之不能自存然否勝廣為救死無策故判命出此姑延一旦之喘息耳即不須以綱紀畫畧望他亦不須以興亡成敗論他但先史義其為豪傑首事故於其亡也再三致意焉猶曰是秦民之湯武耳髙祖曰項羽有一范增不能用所以亡夫項羽之失無數初未聞范增之有諌使項羽而終用范增又將如何係興亡處但看人物有無是第一節范增豈三傑比耶但就項羽人物言之猶有此人耳蕭何收秦圖籍文書説者謂相漢狹隘者以此然使當時不得此書髙帝必不知天下之户口阨塞漢之為漢史悉載而通鑑黜之至武帝之乞漿逆旅明皇之洗兒賜錢之事亦汚穢矣漢唐二史不錄而通鑑載之一去一取未知孰是良之謀以子刼父崇之策以臣要君皆不可以為訓故温公不取武帝㣲行自同匹夫明皇宣淫見愚降虜皆天奪魄可為後監故溫公備錄丙魏優劣如何以相業言之則魏優於丙以徳性言之則丙優於魏河南守吳公治平為天下第一班固何不錄之循吏傳又言吳公學李斯刑名安能為天下第一文帝恭黙躬行不好刑名故一時人物皆篤實務内所以史無可書之事其學果為刑名與否則不可知然漢人物皆屈頭擔重擔却不論他學術文帝本好刑名不害為仁東漢黄憲或謂其資稟似顔子使其得聖人為之依歸還如何東漢人物大率尚名髙崇氣節憲獨冲然退然所以見者服其深逺恐亦是天資如此所謂得聖門學問未知其如何賈誼請文帝興禮樂易服色以其無周之文也仲舒請武帝損周之文致用夏之忠二子之言孰切時務二子之言皆是欲時君反秦正朔建漢正朔其後當武帝太初元年始改用夏正建漢正用二子之言也昨觀後漢趙苞守遼西遣使迎母而鮮卑入冦苞母見刼載以擊郡當此之時忠孝兩難將追戰歟則疾視其母之死將就母歟則有虧事君之義如何艮其背不獲其身行其庭不見其人有時身在面前不曾見有時人在面前不曾見只為道理各有所止耳當趙苞之時見君而不見母誠秉此心有時邂逅可免葢致死則敵猶有所畏漢髙祖是但艮止之義不當如此計較耳巫蠱之禍雖江充之譛亦戾太子矯制有以滋後來之變否武帝求長生故猜疑太子太子通賓客故不受父命看史當尋脈理不可只據目下説張釋之為廷尉天下無寃民于定國為廷尉民自以為不寃若趙蓋韓楊之死謂之不寃可乎或者説宣帝時廷尉不獨一于定國雖不獨在定國而定國坐視四子之死亦不能效張釋之之守法如何漢公卿有罪未必悉下廷尉自有詔獄多丞相御史大夫治之或下中二千石雜議廷尉所謂平者非必皆寛縱之謂剛不吐柔不茹者平也趙蓋韓楊之死今作文人但浪説耳天下之患莫大於本小末大周之内輕外重宜若難乆而卒綿逺漢之内重外輕宜若足以相制而猶有七國之禍何耶周雖諸侯彊大猶能支吾數百年先史喻為百足蟲所以難死者扶之者多也漢七國之禍亦自外重自此以後日輕矣春秋之義不以家事廢王事以漢丁鴻之就封為是伯夷不受國為非伯夷處人倫之變當如此自處若無故之讓則伯夷之罪人丁鴻所以得正也漢髙祖為義帝發喪與曹操挾天子以令天下未審如何為義帝發喪因人之短而執之挾天子以令天下負己之有而挾之雖皆詭之為名但一則豪傑起事舉動光明一則奸雄不軌蹤跡暗昧為義帝發喪無君之罪在項羽挾天子以令諸侯無君之責在曹操義帝已立縱使羽不殺之下來漢髙將如何區處要之天運在漢所以項羽自殺了義帝小人枉了做小人漢髙因之為資縞素發喪君子贏得做君子阻三面而守之以一面東制諸侯此闗中之形勢然漢髙道南陽過酈析以叩武闗而闗中無擊柝之限既而從山東之師稍益以闗中之士固守謹闗而項羽圍入之及其領漢蜀之封地形少痿矣乃由故道以定三秦之壤夫以天險不可升之勢而楚漢分爭之始或自東南而入武闗或自西南而扺陳倉或自東方而越殽函何耶自古入闗有三道一自河北入為正道項羽漢光武安祿山一自河南入為間道漢髙祖􅁊溫檀道濟劉裕一自蜀入為險道漢髙祖闗中由中道入巴蜀為漢王已而又從此路出定闗中諸葛亮亦從此出師闗中雖號天險豈無可入之道苐不比他戰場可長驅而進耳巴蜀四塞非進取之地惟一江陵然諸葛亮不勸先主都之及闗公之危又不聞救之何也江陵屬荆州武侯首陳取荆州之策先主不能用其後爭之於吳而不得吳止分數郡以與之至闗公之敗并數郡而失之况得而都之邪况荆襄為南北咽喉在三國為必争之地乃戎馬之場非帝之都也蜀先主以國委孔明無言不聼伐吳之役先主誠失計也而孔明曽不以為非及其既敗乃曰灋孝直若在必能制主上東行何孔明不能諫於知己之主而猶有待於孝直也只緣孔明規模在據荆益方成伯業以荆州為必爭之地爭而不得後方悔耳諸葛亮在三國時蓋人才之巨擘也觀其治國行師屢以無糧退豈其糧儲賫備之不多耶豈其漕運之不繼耶蜀以失荆州欲出闗洛無路不免崎嶇子午谷大散諸闗阨中運糧最難卒以此困唐太宗規模不及漢髙祖何以見之漢髙事事不能只有一箇帝王器度本不擬到此地位自是天人推出來所以規模比三代太宗事事了得本是唐之第一君為其必欲做帝王不待天人自安排所以只做得魏晉規模只看建成元吉事唐太宗恭儉不若孝文而功烈過之范唐鑑三代而下英主無出文帝太宗止做得創業功臣君徳上可議處甚多不止恭儉文帝不是無功但當守文時故不以征伐顯耳太宗只是削平蕩定之功而徳在人心處少唐太宗誅髙徳儒之諂諛薄宇文士及之不忠豈不知姦邪讒諂之士不可厠文墨議論之臣而定十八學士之選而許敬宗之奸獨錄而不棄何耶知人甚難太宗不但失於許敬宗以李勣可任大事此失之尤者范唐鑑譏太宗曰陷父之罪脅以起兵古人行一不義而得天下弗為也太宗終守臣節可也愚厯觀唐史隋煬帝既遣江都之使唐髙祖不宜坐處夷滅况大業之末生民塗炭太宗茍不為此必無以濟蒼生之困范氏正大之説果可用否使聖賢處此當守臣節乎將權以濟事乎孤隋之暴何止桀紂若欲行湯武之事但當正名弔伐不當自陷於盜賊之地而脅以起兵以斯舉事是以亂易亂也大桀小桀也惜乎太宗有濟世之志傷於欲速迫切反以堂堂禮義之師自陷於亂臣賊子之倫乃是將官鹽作私鹽賣了世上有理明義直之事只為學術不正舉動不明便壞了事體唐明皇開元天寶之治何始之不克終耶開元之世乃無妄之時雖四夷時有不靖乃無妄之疾緣小人以邊功動之致令邊釁一開生出萬端病痛乃無病服藥之故晉殷浩謝安少有重名方其隠而未用也人皆以公輔期之或曰深源不起如蒼生何或曰謝安不起當如蒼生何及其既用也謝安却苻秦安晉室功業亦可無負而殷浩舉兵北伐師徒屢敗桓温因朝野之怨而廢之如棄草芥夫人之擬二子則同而二子事業何其相逺東晉諸賢大抵務養名節不務實用幸而成功則為謝安如其無成則為殷浩然安能矯情鎮物浩則遇事周章較是輸他一著也桓溫伐秦至灞上伐燕至枋頭父老皆有復見漢官威儀之歎而溫志在鴻鵠遂以失之其後劉裕既入秦亦有南顧心遂為赫連所奪其罪與溫一也雖然自古南北分爭若隋若我宋皆以北而并南未能以南而并北方者也豈亦事勢使然固不可盡罪二人乎邵康節云天下有道地氣自北而南天下無道地氣自南而北南方非不可用但多非文明之時耳商君初變法秦民不悦言不便者以千數令行之後秦道不拾遺鄉邑大治秦民後來言令便請問其故始言不便猶是三代直道之民終復言便則戰國刑戮之民矣不下毒手如何得他合口當看商鞅行法始末秦謫戍法先發吏有謫籍及贅壻賈人又父母有市籍者所以重困商賈何故秦自商君立法欲民務農力戰故重耕戰之賞以商賈務末不能耕戰故重為謫罰以抑之所以立致富强秦焚書坑儒如何却猶有三老以掌教化而二世猶召博士諸生問狀耶秦雖無道人心道理自不可泯雖縱作横作滅不得許多道理聖人所以言繼周之後百世可知漢史上自天文地理下至溝洫刑法皆為立志而選士之法最為近古何乃不為立志漢書缺處典兵無志選舉無志為太史公未作得此二書故孟堅因陋就簡太史公作史記上自唐虞而八書之作止言漢事班孟堅作漢史合紀漢一代事而乃作古今人表八書未必皆言漢事獨平準書專言武帝其贊却説古今漢志雖為一代作然皆自古初述起獨古今人表專説古而不説今自悖其名先輩嘗譏之中間科等分别人物又煞有可議此却班史之贊畫蛇添足太史公之號或以為武帝所置或以為東方朔尊美其書從而加之或以為遷尊其父其説孰是太史公是掌律厯之官本傳謂典天官而遷亦謂文史星厯近乎卜祝是太史掌漢律厯可知居史官之太史令遷嘗為之位在公卿之上雖未可知但自來厯官居卿以上底令雖非卿而位比於卿其他不足論公特其子尊之耳史記云孔子墮三都攷之經傳墮郈墮費固有之矣而圍成則不克成功未嘗墮也况成出於魯定自圍非孔子也兼左氏亦曰將墮三都未實其言史記果何所據而言耶嘗聞之晦翁云斯至是始覺遂不肯墮成使齊不歸女樂則成亦墮矣賈誼陳治安策論民俗奢侈盜賊乘時而發夫文帝躬修𤣥黙移風易俗以誼言觀之所謂移風易俗者安在誼煞有疎密太過處唯文帝能受盡言史臣謂誼之言亦畧施行文帝風俗好處誼不為無助良平漢之功臣也十八侯之次良平何以不與髙后四年差次功臣其位愈下何歟漢封功臣其盟誓之辭曰非軍功不侯於軍功中又三事最重一曰從起豐沛二曰從入闗中破秦三曰從定三秦十八侯位次全論此三事良平皆後附良雖從沛公但其時自有故君韓氏所以不在此數又良平皆帷幄謀議而不履行陣所以諸軍功者率在先黄老清淨無為之學也申韓之學出於黄老流入於刑名慘刻前輩謂無情之極至於無恩然否才無情便無恩意脈如此髙帝只因請苑事便疑蕭何欲置之辟光武於馮異或譛其威權太重百娾歸心而帝信之愈篤何髙帝之介介於其小而光武乃釋然於其大髙帝因諸將而疑元臣光武鑒往事而全功臣漢有中朝不知昉於何時孟康於劉輔注曰大司馬左右前後將軍侍中常侍散騎諸吏為中朝堂上推云皆加官於正官銜上帶此之謂加官然則輔繫獄中朝官上書論救而光祿勲太中大夫皆預及謹咸拜光祿大夫給事中翟方進奏咸云云不當䝉方正舉備内朝官則又孟所注有不同者中朝想古燕朝謂之内朝中間官職謂之中朝皆給事於中者也光祿大夫給事中皆加官出入内朝之燕私者也漢時猶以士夫為之至唐則全用宦官矣可看百官表蕭何未央之營前殿建北闕周匝二十重九十五步街道周迴七十里臺殿四十三所宫門闥凡九十五壯麗如此宜高帝之所以怒温公譏其非元城乃以為蕭何堅漢高都長安之深意當從何説為正高帝都闗中之意猶豫未決蓋嫌殘破故也何大建宫室以轉其機至其自夸壯麗今人皆知其無識不知何不欲以據形勢定根本正言於高帝恐費分疎姑假世俗之言以順適其意與買田宅自汚意同高帝為義帝發喪高帝之為義帝發喪也三軍縞素天下之士歸心焉雖然帝亦詭而用之耳夫帝之於懐王也君臣之分未定也生則未嘗以天下之義主而事之死則以為天下之義主而喪之此蓋項氏之短而大其辭以執之是三老董公之善謀豈出於帝之本情哉古今之名義有不本於夫人之本情而英雄豪傑或詭之以濟事者多矣齊威㑹王世子於首止情不出於世子也晉文朝天王於河陽情不在於天王也利在世子則尊世子利在天王則尊天王利在義帝則尊義帝其詭而用之則一耳高帝約法三章沛公之始入闗也與秦父老約法三章是時沛公猶未王闗中也而輒與其民私約如此殆類於兒曹嘔呴之為者雖雌雄未定之時務為寛大長者以媚悦斯民孰不能者及項氏既滅天下一家正高帝創法定令之時也而三章之法不移如山豈兒輩呴嘔之恩姑以媚悦於一時者哉使其仁心仁聞出于至誠憐恤之意雖草莽私約遂以為漢世不刋之典真主一言其利溥哉馬遷既漢武時人必能詳記武帝故實及觀武紀止言封禪禱祀神仙方士等事他全不及至八書中固有畧及武帝者然封禪書不過又述武紀所言平凖書又何獨詳述武帝生財法至律書言兵又止言文帝而不及武帝遷謂夫子春秋於定哀也則微亦須畧舉宏綱而或詳載或不載既自不同若武紀猶可疑者敢問史記不專為漢史乃厯代之史故其紀漢書畧於漢書而紀武帝事獨詳若封禪平凖二書雖謂之南史家風可也周勃霍光在漢均有擁立之功優劣如何霍光仗忠義舉動光明平勃任智術蹤跡踈昧漢七制景帝昭帝何為不與唐三宗宣宗武宗何為不錄景帝天資刻薄無人君之度但以不失文帝之恭儉故史人之辭稱曰文景昭帝雖聰明蚤成而享國不永所以不在七制之數唐三宗已不似漢更添宣武何為高祖既約法三章如何後來蕭何作律九章三章是草莽中一時要約如何盡得世變後世自合隨時損益蕭何九章猶未失高祖寛仁大意至武帝三百五十九章則浸失初意高祖之興計謀有人今光武之起既身為之謀又身為之戰遂復故物馬援乃以為光武不及髙帝意者用人者大自用者小邪光武太宗身經百戰真千古英雄之將所以不似漢高者蓋漢高不能為將而善將將此光武太宗所以見容於漢髙也漢立五經博士遺其一者何經周禮未立學官漢末劉歆方發明此書説與王莽壊了後人遂以為周禮為傅㑹之書後漢三鄭出來其學方明其書方行内政何名寓軍令自伯圖之興大抵兵不詭則不能謀人國政不詭則不能自謀其國故春秋善戰者兵有所不交善詭者城有所不守詭道相高求以得志乃於治民之中而黙寓治兵之法陽為治民以欺其人隂為治兵以壯其勢其言於威公曰君欲正卒伍修甲兵大國亦將修之而小國設備則難以速得志不若隱其事而寄其政於是作内政而寓軍令焉今觀自五家為軌軌有長積而至十連之鄉鄉有良人以為内政自伍人為伍軌長率之積而至於萬人為軍五鄉之帥帥之以為軍令名為内政實則軍令寓焉寓之云者猶旅之有寓非其所居而暫居之謂也夷吾志在强國内政之作豈在於民乎特假内政之名以行軍令耳是故外假王政之名内修强國之利夷吾巧於用詭固如是哉嗟乎有為為善雖善實利有意為公雖公實私成周自五家為比至五州為鄉居民之法也自五人為伍至五師為軍舍萬民之法也其事暴白於天下而無非王道之公夷吾之法能髣髴其一二矣獨奈何以詭道行之以欺其隣國則安得不為伯者之私哉秦自稱水德五德之運其誰為之乎自秦用方士之言以周為火德推五行相勝之法自謂之水德則是秦首倡其端耳漢人或竊其餘論反擯秦而主漢則張蒼謂漢為水德是也或祖則餘論遂舉漢以繼秦則賈誼公孫𢎞之流謂漢為土德是也或祖竊其餘論而兩皆不用更為相生之術上推包羲下至周漢而擯秦不數者則歆向父子遂謂周為木德漢為火德是也夫秦自稱水德則是始皇之妄自尊大耳後世設以始皇為是耶當祖而用之如賈誼公孫𢎞輩可也設以秦為非邪當汛掃其不經之談明先王之道以道之可也今張蒼歆向之徒既竊用其説又從而非議之反擯秦於不數則是衛輒自謂之嫡孫欲以竊據正統而反擯其父不納也夫輒之所以得謂之嫡孫者以其有父為世子也既不父其父則不得謂之嫡矣尚可據其位乎五運之所由倡以秦倡之耳既擯秦不數而漢獨何所承乎此皆漢儒欺天罔人之論而班固不察又真以漢為得天統也夫所謂天統者何也昔周公營洛之議曰有德者易以興無德者易以亡孟子定于一之論曰不嗜殺人者能一之又曰三代之得天下也以仁其失天下也以不仁此天統之説外是而謂之天統則如秦之自稱水德可也如張蒼之稱漢為水德亦可也如賈誼公孫𢎞之土德可也如歆向之火德亦可也尊秦可也擯秦亦可也自尊可也人尊之亦可也要之不得為天統則一耳趙長平之敗長平之敗豈不哀哉此不惟一趙括之兵端一開平原君實為之也蓋當是時秦嘗有事於魏韓而馮亭欲嫁禍於隣國故以上黨自歸於趙夫秦㧞野王而上黨路絶是上黨之在韓也有已亡之形而秦有垂得之勢今韓以空名歸趙實欲嫁秦兵於趙此蓋馮亭狙詐之術耳夫秦日夜勞心苦力以蠶食於韓今上黨有垂得之勢而趙乃欲安坐而利之則雖彊大不能得之弱小而弱小固能得之强大乎且無故之獲有道之所深憂也非望之福哲人之所甚禍也平原不見天下之大勢暗於狙詐之術棄龜鑑之名言而自速危亡之禍則長平之敗豈獨趙括為之哉趙括趙括虛張無實言大而才疎其父母知之趙廷之臣知之而敵國之人亦知之獨其君不知之者蓋當是時應侯行千金於趙以為反間是必左右近臣隂受秦賂相與䝉蔽主知故其君不悟至此人多以名用人失之趙括不知括之在趙未嘗以名聞也使括而以名聞於趙則秦當忌之矣而胡為利括之為將也是括虚張疎繆之實已久聞於隣國獨其主不知之耳毛遂毛遂上不數於其主下不齒於其徒而卒能奮身决起著名楚趙茍非見棄於人安能以有激乎吾觀戰國游士所以䇿名當時致身將相快平生之憤酬夙昔之願往往皆因所激而能致之蘇秦之相六國其家激之也張儀之相秦其友激之也范雎談笑而取秦柄其讎激之也故善用人者於其凌厲頓挫之時而乗其感慨奮激之氣則雖尋常之人皆能以自効於尺寸如其習安於豢養之餘而生平之意願已足則雖竒人節士亦或無以自見也魯仲連魯仲連亦戰國䇿士耳而竒氣疎節憤激陳義有非䇿士所能及者鷹隼高飛於雲漢虎豹長嘯於山林其頡頑飛騰之氣豈人之所能近哉一旦受人之覊縶而豢養於韝圏之中則與鷄犬無異何者惟其有所欲故也戰國游士大抵不勝其利欲之心擔簦而往鼓篋而遊夫孰非有富貴之心者故一受人之覊縻甘人之豢養則雖有竒氣疎節將無所用之而俛首帖尾碌碌人下者往往而是也尚何望其憤激陳義哉仲連惟不見其所欲故不受人之覊縻不甘人之豢養是以高飛長嘯而足以頡頏於一世雖未必為天下士而人固以天下士竒之矣夷門侯生教魏公子救趙圮上老人授子房兵法吾攷之戰國有隠君子二人曰夷門侯生圯上老人皆兵家之有道者也夫兵者授之以不仁之器而教之以殺人之事故古之有道者皆諱之而不樂言也其樂言之者必皆其尅忍恣睢之徒孫臏呉起之類是也夫兵不免於用智而竒謀詭計又用智之所不能已也故其法可以自用而不可以教人以智而教人必其有甚不得已而度其人誠可以受之也而後隱忍以授之何者吾固無樂於用智也吾觀侯生之授魏公子也試之以執轡以剉其鋒試之以過客以觀其忍至其有急而來赴也我則泊然應之以無情而使之憤以自悟如是而果足以受之也然後以其不可教人者不得已而教之以其諱言不樂者不得已而言之吾言出而吾術窮矣吾智施而吾謀不可復用矣何者教其臣以詐其君教其子以詐其父教其父以賣其友此兵家之隂謀而道家之深忌也一之為甚其可再乎此侯生所以忍死而言之也若夫圯上老人之遇子房也倨傲鮮腆以觀其禮命之以僕妾之役以伏其心與之一期再期以試其人之果可受也然後從而受之夫卒然相遇於草莽之間夜半授之以一編之書名字不通言語不同固不知其為何等人而亦不知其為何等書也已而觀之乃太公兵法也鳴呼古之有道者其諱言兵也如此其不輕授人也如此而後世明目掀髯以言兵事以道家之所忌者而為兵家之所喜以道家之所不敢再用者而為兵家之所常用然則人心之不仁乃至此也夫茅焦秦遷太后於離宫諫死者二十七人而後來之輸忠者猶未已夫秦無道之極矣而在廷何多直節臣也且其諫者非必皆社稷之臣皆貴戚之卿也非必皆析秦之圭皆儋秦之爵也又非必皆秦之所産皆直言之士也而為是奮死而不顧蓋生乎戰國之世無一而非口舌之士仕於危亡之朝無一而非口舌之功故常喜出於波濤洶湧之間游人之所不能泳與齊俱沒與汨俱出而幸不死焉是其所以為工耳若夫潢汙行潦弱翁稚子可褰裳而濟彼豈以是而動其心哉此所以積尸秦庭而後來者愈出而愈竒也雖然亦危矣逆驪龍之頷下而取其珠撩虎口而奪之食若茅焦者亦幸矣陳勝陳涉之王也其事至微淺然縉紳先生抱祭器而往歸之張耳陳餘房君之徒又皆以興王之業説之舊史按其行事謂其不幸如是而致敗設不如是其事當復如何耶至其再三致意也猶曰其所致王侯將相竟足以亡秦且涉所置王侯將相微矣而史誇之若曰夫涉起謫戍而首事志在免死而已其大要不過偷一時之欲其用軍行師未嘗有一日之規徒不勝其憤憤之心決一旦之死為天下首事蓋未知烏止誰屋也在天下後世正不當以興王之事責之舊史猶復云云至今尚論涉事者猶惜其孰得而孰失也吁亦悲矣天下苦秦之禍故家遺俗豪人俠士喪氣畧盡乃其所不慮之戍卒猶能為天下而首事雖其人物卑陋事至微淺而古今猶幸之蓋積萬年之憾而發憤於陳王猶曰此秦民之湯武耳楚懐王懐王之立也天將以興漢乎懐王之死也天將以亡楚乎夫懐王項氏所立此宜深德於項今觀懐王在楚曽無絲粟之助於楚而獨屬意於沛公方其議遣入闗也羽有父兄之怨於秦所遣宜莫如羽者顧不遣羽而遣沛公曰吾以其長者不殺也沛公之帝業蓋於是乎興矣至其與諸將約也曰先入闗者王之沛公先入闗而羽有不平之心使人致命於懐王蓋以為懐王為能右已也而懐王之報命但如約而已以草莽一時之言而重於山河丹書之誓羽雖欲背其約其如負天下之不直何是沛公之帝業又於此乎定矣夫項氏之興本假於亡楚之遺孽顧迫於亞父之言起民間牧羊子而王之蓋亦謂其易制無他而豈料其賢能若是邪始而為項氏之私人而今遂為天下之義主始以為有犬造於楚而今則視羽蔑如也則羽此心之鬱鬱悔退豈能久居人下者自我立之自我廢之或生或殺羽以為此吾家事而不知天下之英雄得執此以為辭也故自三軍縞素之義明沛公之師始堂堂於天下而羽始奄奄九泉下人矣懐王之立曽不足以重楚而懐王之死又適足以資漢然則范増之謀欲為楚也而秪以為漢也嗚呼此豈沛公智慮所能及哉其所得為者天也此豈范増項羽智慮之所不及哉其所不得為者亦天也高祖還定三秦沛公有三傑故雖遷漢中而卒定三秦項羽無三傑故雖王三將而終不能有三秦嗚呼羽非失險也失人也夫項羽遷沛公於巴蜀而王三降將以距漢漢勢若已屈矣吁彼豈知巴蜀果非死地也耶羽以巴蜀為死地而謀遷沛公沛公亦以死地視巴蜀而忿嫉項羽當是時也取捨屈伸之理惟蕭何知之故何勸王王漢中收用巴蜀還定三秦及其既就國也項羽肺肝之謀惟張良知之故良説王燒絶棧道以示項羽無東意此蕭何之所以强沛公之行也而張良所以安沛公之心也使巴蜀而果能為死地也則蕭何張良之謀是置沛公於死也蕭何張良可謂見之明計之熟矣至於韓信登壇之日畢陳平生之畫畧論楚之所以失及漢之所以得漢一日舉兵而東秦民其為沛公耶為三降將耶此三秦還定之謀所以卒定於韓信之手也噫三傑真人傑也向也蕭何張良有卓然之見而始勸沛公之入今也韓信乘罅漏之餘而徑勸沛公之出其入也所以養其出也其出也所以用其入也三子之見智謀畧同故蹙楚之效同孰謂闗中非沛公囊中物耶善乎史臣之論高祖曰從諌如轉圜也夫天下之勢成敗未易料也見近者昧其勢而慮逺者審其勢蓋勢者成敗之所係也一舉措之不謹則俄頃之間大事去矣方羽之王三降將於三秦而王高祖於漢中也高祖蓋不勝其忿而欲奮於一擊之間周勃等又從而慫惥之當是時高帝死固未可保而何以成敗為也及蕭相國進諫而高祖翻然改悟罷兵就國徐起而還定之如取諸寄此豈有他術也知成敗之勢在己而已己能屈之亦能伸之是以高帝之還定三秦也不在於引兵故道之時而在於不攻項羽之日不在於拜將之後而在於聽諫之初然則周勃諸公者特見近而昧其勢耳而蕭何者慮逺而審其勢者也蕭何沛公之入闗也諸將争走金帛財物之府庫蕭何獨先入收丞相府圖籍藏之以故沛公得知天下阨塞户口多少强弱之處世常以刀筆吏少何此特書生之論耳何非刀筆吏何以知丞相府之有圖籍邪然刀筆吏多矣而何獨知丞相府之有圖籍則自其為郡縣小吏時固已習於國家之體要若此此其器已不在人下矣况當草莽角逐之時見秦民府庫宫室之盛雖沛公不能不垂涎者而何之器度越人如此沛公之有愧多矣及項羽王沛公於漢中也沛公意大不滿自絳灌以下莫不勸攻項羽何獨陳曰能屈於一人之下而伸於萬乘之上者湯武是也願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也嗚呼何之器度若此其位當不在人下矣昔者晉重耳之亡也從亡三人者皆相國之器也夫以覊旅喪亡之餘而其從者皆可以相國君子曰用臣如三人公子何患於喪乎吁此固沛公所以興也漢法宰相必出於列侯武帝變而通之是耶非耶漢法非軍功不侯非列侯不相儒者既無軍功可論永無入相之路此高祖馬上之陋規非三代之宏規至武帝元朔中始下詔嘉先聖之道招四方之士遂以御史大夫公孫𢎞代薛澤為丞相封平津侯丞相封侯自𢎞始也其後遂為故事夫武帝崇儒之君子厭文吏武功之不學無識陋國初淺近之規以為儒道不能光顯遂革其故習不吝厚爵重封以激厲儒者則武帝之美意人亦孰得而非之也然公孫𢎞起自徒步之中以明春秋一經不四年而超取相位貴至封侯則論者不能不於是而有憾焉蓋武帝以利而用儒儒者見利而求用自𢎞以明經而為相後之為儒者孰不欲競章句之末習以僥倖於一遇利祿之間一開而士大夫之心術自兹蠱壊矣况漢家以軍功立國必以列侯為相雖漢之規陋然而非軍功不侯則漢之良法使儒者而不相則已使儒者而可相則自版築而遽登相位乎何慊而猶欲假封侯以為重此又武帝之不善變也故自𢎞之侯平津也而由相封侯者漢史目為恩澤侯自是以恩澤侯者相望於前後使恩澤而可侯則無復軍功之足競矣故自侯法之既壊至元成之間士大夫之氣習豢養於富貴之餘無復剛心鋭氣之可畏而委靡巽懦之風猶婦人女子生長於閨房之中求欲如周昌趙堯申屠嘉張蒼輩愈不可得矣夫相者既非真儒侯者又非軍功是武帝更張之善意不免一舉而兩失蓋自命相之法變而儒者之心術壊自封侯之法變而士大夫之氣習壊更張之善者猶若此更張而不善則奈何此變法之所以難也書武帝行事武帝之伐匈奴也不絶大漠不襲王庭則不足以泄其怒其通西域也不窮河源不厯懸度則不足以快其慾其事土木也不千門萬户則不息其聚歛也不告緍則不休其深刑也不根株則不已其崇儒也不辟雍則不樂其務農也不代田則不為至其老而悔過不下輪臺之詔則不足蓋天地之間凡可以力致者武帝皆能以力致之而有不容於力致者獨其終身用力於神仙曽不獲如其意蓋嘗凝神於蓬萊蜕形於海上魂交黄帝而夢接安期矣亦嘗臣事少君師事文成五利公孫卿而賔齊魯之士矣而卒莫能致也豈其力尚不足耶嗚呼武帝窮奢極慾以從富貴之樂使神仙道家之事為不無蓋非帝之所可冀矧其實無有哉今徒狃於力之所可為而謂神仙可以力致曾不察其理之有無也使天下而有是理則須帝之力而可致如其無是理也則雖帝之力何所用哉觀諸此世之言神仙者亦可以已矣書卜式傳漢方事匈奴而式願輸助邊方事南越而式願父子俱死天下方爭匿財而式尤欲就助公家之費凡式之所樂為者皆衆人之所難為而武帝之所欲為者式輒揣其意而逆為之故天下因式獲罪者十室而九而式之褒寵眷遇自以為有用於天下及武帝當封禪而式獨以不習文章見棄式乎式乎何不先衆人而為之乎書雋不疑吏暗於古誼觸事面墻一旦事出非意魂驚魄喪無復人形經生學士為之引經陳義援古證今則糟粕腐壊之餘皆能以起僵而植仆乃知世俗不涉書之弊一至於此而經生學士之取重於此亦固自有時哉書王莽傳莽拔出族屬繼四父而輔政時人未知信也於是刻心厲行以著其節禮賢下士以釣其名分布黨與以承其意諂事母后以市其權延見吏民以致其恩意上下之勢既成而人皆知有莽矣於是力為險異之行以焜耀當時封邑不受位號不居視天下爵祿若將凂焉天下之人見其苦心如此遂以其無他而謂伊周復出故其避丁傅也天下莫不稱其賢其罷歸也天下莫不訟其寃一辭采女而詣闕上書者千數辭益封而吏民上書者八千人辭新野田而前後上書者至四十八萬蓋當是時惟恐莽之一日去漢舉國以授之惟恐其不受夫莽斗筲之才賈孺之智兒曹之恩妾婦之行徒以驅委庸人籠絡小孺媚事婦人女子可也而乃掩竊大物豈非厄㑹然歟木鍾集卷十一
