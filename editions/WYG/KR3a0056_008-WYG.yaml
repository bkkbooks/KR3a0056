body:
  text: 木鍾集卷八宋陳埴撰禮記王制封國辨古者封國之法計田而不計地蓋自天子至扵五等諸侯無非計民田之實而食其租賦猶後世封邑計户口而食之故王制自天子之千里而至扵子男五十里皆言田而不言地此最為識古制者大率田可計而地不可計古者井九百畝為一里故凡謂之方一里者皆九百畝之田而八家之租賦也夫封國之里與分服之里二者為法不同封國之所謂里者乃田里之里分服之所謂里者乃道里之里田里之里其法以方而計即井方一里是也道里之里其法以袤而言如二十五家為一里之類是也此无丈數姑約此大端明之後儒攷之不詳往往混二者而無所分别至謂天下之地圖皆可以開方法計之如夏之五服則面方五千里而開方則為二十五千里如周之六服則面方七千里而開方則為四十二千里不知分服之法計道里之逺近而為朝貢之節猶今之路程封國之法計田里之多寡而為賦禄之制豈可同日語耶今併指為田里之里而以開方法乗之則九州之内江淮河漢山陵林麓城郭溝池宫室塗巷廣袤綿亘繽紛交錯何可以實計邪既不可以實計由是創為三分去一之說而封國之制皆然審如此則平原廣野與夫山澤險阻之地例以三分去一之說約之則必有不均之患且制禄食租無可計之實而姑為茫昧之約此豈經界既正均田制禄之道故後儒之失大抵失於以三分去一之說而論田以積實開方之法而論路如王制以田而定封是矣而復仍用三分去一之說言九州之地圖是矣而復仍用方三千里之說此攷之不精殆紙上之陳言故不得不辨王制建學法古者公卿大夫之子弟以至萬民之子生八嵗而入小學教之以㓜儀之事十有五嵗而入大學教之以成人之事此大小學之所由建也其謂之國學者則以教公卿大夫士之子弟即大小學之立於國中者其謂之鄉學者則以教萬民之子弟即大小學之立於鄉遂者其國學之制則小學在王宫南之左大學在郊是也准諸侯之制其郷學之制則所謂家有塾黨有庠者小學也遂有序者大學也其學官之職則國學掌於大樂正而大胥小胥以下其屬也郷學掌於郷大夫而州長黨正以下其屬也其教掌之法在國學則樂徳樂語樂舞其凡也在郷學則六徳六行六藝其目也其論選之法在國學則小胥大胥先簡不帥教者以告于大樂正大樂正乃論其秀者以告于王而官之司馬曰進士是也在郷學則郷大夫先簡不帥教者以告于司徒司徒興其賢者能者以禮賔之而獻其書于王曰選士是也其仕進之法則自國學出者往往為王朝之官所謂適士是也其自郷學出者大抵為郷遂之吏所謂庶士是也盖古者貴賤之分明世家與編氓不無貴賤之分故自少而别異之而其仕進亦不容無二途然則士之起扵編氓者其終不得仕於王朝乎盖編氓之仕進又固有二途也自郷學而升於司徒則謂之選士是已命為士矣然由是而仕者不過於郷遂之吏其位之卑則但曰庶士其禄之薄則但曰代耕其禮之優則僅免郷之徭役而司徒之征則不能免也故其願仕乎此者上之人不強也何者六郷六遂之吏自比長而至於閭胥鄰長而至於里宰不啻以萬計安能悉官於司馬而禄之亦不過就補其民之秀異者而均之以代耕之禄其大者稍出於部伍而為之長其小者還入於部伍而治其事正鄉大夫所謂使民興賢出使長之使民興能入使治之是也如其不願仕於此者則自司徒而復升之於國學曰俊士然後論選仕進之法一與國子弟等此其所以謂之二途也别子為祖繼别為宗繼禰者為小宗古立法之意如何宗法為諸子之庶子設恐其後流派寖多姓氏紛錯易至殽亂故於源頭有大宗以統之則人同知尊祖分派處有小宗以統之則人各知敬禰且如始封之君其適子襲封則庶子為大夫大夫不得以禰諸侯故自别為大夫之祖是謂别子為祖也别子之適子則為大宗使繼其祖之所自出從此直下適子世為大宗合族同宗之是謂繼别為宗也别子之庶子又不得以禰别子却待其子繼之而自别為禰繼禰者遂為小宗凡小宗之適子服屬未盡常為小宗凡小宗之庶子又别為禰而其適子又各為小宗兄弟同宗之謂繼禰為小宗是也大宗是始祖正派下雖其後支分派别皆同宗此祖則合族皆服齊衰九月初不以親屬近逺論是為百世不遷之宗小宗是禰正派下親盡則絶如繼禰者親兄弟宗之為之服期繼祖者則從兄弟宗之為之服大功繼曽祖者再從兄弟宗之為之服小功繼高祖者三從兄弟宗之為之服緦自此以後代常趲一代是為五世則遷之宗宗法之立嫡長之尊有君道焉大宗所以統其宗族凡合族中有大事當禀大宗而後行小宗所以統其兄弟如同禰者有大事則同禰之兄弟當禀繼禰之小宗而後行一族之中大宗只是一人小宗儘多故一人之身從下數至始祖大宗惟一數至高祖小宗則四此古者宗族人情相親人倫不亂豈非明嫡庶之分有君臣之義由大宗小宗之法而然歟三昭三穆與太祖之廟而七此天子七廟之制也然有虞氏祖顓帝而宗堯則有虞之時無以備七廟之數者何耶周人祖文王而宗武王世皆有是言矣而詩人又曰皇皇后帝皇祖后稷者何耶唐虞官天下必不能備七世之廟但當堯舜時亦湏上推其祖考盖皆出帝者之裔不似後世崛起必有可推者但今不得而詳耳始封之君為太祖稷契是也既以稷契為太祖萬世之下不可祧即成湯文王武王雖始興之王不可亦稱太祖故以宗稱之廟祖太祖不祧所謂祖有功而宗有徳嚴父莫大於配天必如周公郊祀后稷以配天宗祀文王於明堂以配上帝方可先賢疑孝經非古書此類是郊祀配天為嚴父非謂達孝周公居攝止為行禮不可言周公嚴父兼主成王而行則當以武王為配若武王時事則周公未嘗居攝不當稱周公日在北陸而藏氷西陸朝覿而出之按月令孟冬日在尾仲冬在斗季冬在女斗牛女虛危室壁正直亥子丑乃北陸也孟春在室仲春在奎季春在胃奎娄胃昴畢觜參正直申酉戌乃西陸也日月右行故自北而西夏則南秋則東此說已不可易然月令在尾在斗云者特其大約耳亦有先時者亦有後時者不必二月也今開氷必於四之日抑左傳之說亦姑以西陸而名仲春耶抑日至北陸即開氷或先時則於三月之首姑以四之日言耶當以詩與月令為按不當背詩而牽合於左氏北陸西陸之說於天文家恐未合自角至箕為東方之宿自斗至壁為北方之宿自奎至參為西方之宿自井至軫為南方之宿日之所在謂之宿可也而謂之陸有冬至日行南陸夏至日行北陸之嫌盖以日行而言則可謂之陸以日在而言則止謂之宿語不的確曰不指實故集注不取大明生扵東月生扵西是隂陽之分如此注曰日出東方而西行月出西方而東行不知月東行之說如何日月皆自東而西月生於西者乃是月落於西但人以所見新月自西故以月生於西言之月生既以西言則是初二三後漸自西而東直至望日則在東亦皆以人所見為言耳其實皆自東而西也三代忠質文之尚以經攷之止言虞夏之質不勝其文殷周之文不勝其質而已自董仲舒始有三代忠質文之說太史公又改質為敬當以何為據質者文之對以周為文則視殷為質矣然既謂之質則已是與文對待是猶有文了但視周則較質耳若夏則全然無文故質不足以名之而謂之忠則一向白直之稱此古今風氣之間大勢之趍相因之變如此非是定一代之尚漢儒所尚之說未然其易質為敬者亦謂其禮主乎敬而文不足記曰與其敬不足而禮有餘不若禮不足而敬有餘又曰至敬無文則敬者亦質之稱周制有升之鄉升之學以取天下之俊秀有升之司徒升之天子以取國子之俊秀然公卿大夫皆子弟繼世為之獨一太公以草莽致位公卿乃制度未定之時亦不知升之學者為何等任用耶郷學教萬民至升之司徒而止周禮獻賢能之書登之天府可攷其俊造之士不從司徒調官郷遂者則復升之國學大樂正即周禮大司樂教之其法視國子學成則獻之天子司馬官之竊意升於國學官扵司馬者皆入仕於王朝同國子之選不可以郷學萬民例論若夫伊傅太公之舉豈在學校選舉之數又有甚制度定否耶曲禮言父讐弗共戴天兄弟讎不反兵交遊讎不同國至調人則有導人使辟之言如何調人職在和難謂過誤殺人者與和之而使辟若不共戴天之讐非過誤殺傷之比王制所以紀三代王者之制而每兼以虞制何也周立四代之禮樂商人尚白湯誥中有敢用𤣥牡一句𤣥是黒色爾時猶是夏諸侯用夏禮也夏尚黒仲尼祖述堯舜憲章文武上律天時下襲水土晦翁謂兼内外該本末祖述者道法在其中憲章者法道在其内律天時者大則顕晦屈伸小則服食寢處襲水土者大則坎止流行小則採山釣水細底道理為本為内麄底道理為末為外王制以上大夫為卿即左傳惟卿為大夫之意至於序侯國卿大夫之次乃復有卿與上大夫之别何耶以大夫為卿只謂侯國耳若王朝則公之下有卿卿之下有大夫侯國降於王朝故以上大夫為卿至大夫之中又自分上下也哀公問政孔子曰為政在人取人以身脩身以道脩道以仁此一節是取人必先脩身也後又曰故君子不可以不脩身思脩身不可以不事親思事親不可以不知人此一節是脩身在知人之後也相反何故自取人而脩身由外而反内自脩身而知人由内而達外兩人字所主不同上主文武之人下主尊賢之人此章自仁者人也以下又别起義不可不事親以下乃旁通非分前後儒行果夫子之言否然其辭似有夸大其君之意豈夫子欲伸其道而猶不免於夸大耶才讀論語便自見得氣象大小滋味醇漓迥别還相為宫之法盖五音之中黄鍾為宫宫君也故黄鍾管最長聲最重濁其他聲皆不得過之至於太蔟以下林鍾大吕等律為宫則必有餘聲過於宫者豈免於奪倫之患元來杜佑通典中自有減半聲法則必無餘聲過宫之患此乃蔡季通能明之宋朝樂不用黄鍾為宫盖嫌黄鍾宫聲重濁而尚輕清故以下生不去正是絃急聲絶惟是黄鍾聲重濁所以次第生得許多聲去宫為黄鍾聲為律既皆八十一矣今林鍾六六三十六徴乃五十四太蔟八八六十四商又七十二何不相合此自是筭不著以九分之寸約之九寸為八十一分六寸為五十四分八寸為七十二分與五聲之數正相合必以九約之方可不可自相乗也知至而后意誠程子又謂格物窮理但立誠意以格之程門此類甚多如致知湏用敬亦是先侵了正心誠意地位不是於格物致知之先更有一級工夫在上只是欲立个主人翁耳但常得此心存在物可從此格知可從此致此程子所以言格物窮理但立誠意以格之大學或問曰致知窮理但立誠意以格之又曰入道莫如敬愚以為誠意工夫乃在格物致知之後今乃云先立誠意始去格物毋乃反經意歟若以為敬者聖學成始成終之事則誠意一節於八者當無不該則不當復次扵八者之中經中乃格物而后誠意不能無疑誠敬二字貫通動靜始末安有格物致知時誠意不存曰我且理㑹格物致知當此之時不知所格者何物所致者何知要之欲格物時且理㑹此二字為第一義自然欲住不得所格所致方有主人不然皆妄到得知至之後所知之理皆實則誠敬至此時節方始事事皆實氣候既至合下縝密工夫故誠意之章係知至之下雖是次第如此又湏知其為一書之闗隘衆條之樞紐方可大學之道自格物致知誠意做來則理已無不明善無不實以此泛應運用宜其曲當而無毫厘之失可論何縁於忿懥好樂遂有不得其正者至於親愛賤惡之僻此猶淺近似非所以論明理之學者借曰毫厘之差千里之繆然則何取於格物致知之功邪此時只是隨事警覺明善涵養工夫已見於格物致知時所謂知止定靜安是格物致知時貌象至正心脩身時湏用檢㸃省察然後中節乃是慮而後能得盖雖是定靜安不慮却不能得自昔聖賢檢身工夫何有已時自格物至於治國平天下固是有次第若說道做此一件工夫都盡了方可做那一件則心未正身未修時有家也都掉了從頭到尾幾時做得盡方格物時世間道理一時都在稱量中雖履其事亦是學習到工夫成熟後方逐一升堂入室正履其位是時方是止於至善知止而後有定工夫既在知止則能慮處莫是又著加思慮工夫否稱雖具在到秤時湏權輕重尺雖已定到量時湏度長短天命之謂性率性之謂道莫便是周子太極中二五之精妙合而凝至萬事出矣脩道之謂教莫便是聖人定之以中正仁義而主靜立人極處若就大化上看即無極而太極天命之性也動而陽靜而隂分而為五行化而為萬物率性之道也然只就天地五行上看則如來語道不可以湏臾離如何道只是當行底理天下事事物物與自家一身凡日用常行那件不各有當行底道理那曽一歇走離得才離得則物非物事非事吾身日用常行者皆非是矣故道即路之謂也之燕之越無非是路才無路便是荆棘草莽聖人之道只是眼前當然底一時走離不得後學求道只就此上看不用窈窈冥冥探索深逺如此為道皆日用而不知者也君子之道費而隱夫婦之愚不肖可以與知而能行及其至也雖聖人有所不能知不能行聖人既做不到頭則此道之全體豈終不可得而盡耶聖人盡性踐形於道理上已無虧欠但究極而言一物不理猶為有虧一事不知猶為有欠道理匼匝無盡聖人容有不到處深言隠處無窮也中庸費隠一章言聖人不能知不能行天下莫能載莫能破前輩多云此是至隠妙道著人力不得請併與鳶飛魚躍說來因甚著人力不得此章言道體流行於天地事物之間充塞太虛彌滿六合無一物而不有無一事而不周其用之廣如此故曰費然其所以然之故則隱于事事物物之間元不離乎事物而不可便指事物以為言此太極之理也故又謂之隠是以聖人言其費用之廣自其明白坦蕩者言之則雖夫婦之愚不肖皆可得而知可得而行自其纎悉極至者言之雖聖人有所不能盡知不能盡行如夫子之問禮問官名是不能盡知如堯舜以博濟安百姓為病是不能盡行然又豈特聖人耶天能覆而不能載地能載而不能覆或雨暘寒燠之失其時或崩竭震蕩之不得其正是天地之大亦有所不能盡故人猶有憾焉夫自愚不肖之能知能行極而至扵聖人天地之所不能盡而是道乃無乎不在其用可謂廣矣是以君子語其大而天下莫能載者是指天而言也盖至大而無外者天也天下果何物可以載之是言其大之極也語其小而天下莫能破者是指毫髪而言也盖至小而無内者毫髪也天下又孰得而析破之是言其小之極也大極於天小極於毫髪而道無不在焉是吾道中三大四至也凡此只是說道之費處其體之隠則在其中矣故不言隠非扵費之外别有所謂隠也使别有隠可見有隠可言則非體用一源顯微無間已不足為道矣子思猶懼人之不明也復舉鳶飛魚躍事以實之謂鳶飛戾天是道之見扵鳶也使魚戾于天則非道矣魚躍于淵是道之見扵魚也使鳶躍于淵則非道矣萬物之生各一其性上下之間如此昭著其用豈不甚廣邪今世儒不察却謂聖人不能知不能行天下大小之道莫能載莫能破是道之至者是道之隠者至𤣥至妙更著人力不得凡可知可行可載可破皆非道之極至此𤣥妙空寂之談非吾儒所謂道也夫有道必有物無物則無道鳶之飛即鳶之道魚之躍即魚之道物各具一太極物各具一性所謂信手拈來頭頭是道瓦礫有瓦礫之道稊稗有稊稗之道莫非太極之流行發見者又豈别有所謂至隠之道㢤凡捨物而言聖道之隠者便不是道也喜怒哀樂之未發謂之中則中在何處既發謂之和則和内有中否既是未發即渾然一理更有甚處才發便向落一邊去雖中也只唤作和此問甚有理是一件大事不可孟浪說既發之和莫便是時中否謂之時中亦可今且認取和字發時有中節不中節之分未發時還有分否既是未發更有何物可分但有渾然之理在中不曽倚著耳此為有學問人言若無學問人未發時昏昏底耳中亦何有未發之中則中在中已發之中則中在事物不知此只是一中還亦有二義否不倚不偏是說未發之中無過不及是中之在事物者所謂時中也中無二箇但有既發與未發耳明徳新民之為物知止能得之為事其義如何物猶人物之物事乃從事之事就大學之書以類求之如曰物曰知曰意曰心曰身曰家國天下皆物也如曰格曰誠曰正曰脩曰齊治平皆事也不睹不聞乃此心不動之境既是不動却又下戒謹恐懼工夫莫是太著力否太著力則恐反動其心何以謂之未發之中此處猛著力不得才著力便是動了雖不著力然必有事焉方可前輩謂敬貫動靜正謂此也戒謹恐懼却常惺惺法不爾便白地倒了否則空空死灰矣此處如道家爐火養丹法火冷則灰死火炎則藥死中庸十四章言素其位而無願乎其外晦翁以張子無天下國家皆非之理尤為切至意亦與天下無不是底父母相似雖處貧賤夷狄皆有當為底道理亦不可怨天尤人底意思未知然否張子此語為正己不求於人言之素其位而行雖同章而意别父母無不是天下國家不能皆是語正相反天下國家可均也謂管晏亦可做愚恐管晏人物當不得一箇均字去一匡天下紏合諸侯正是一切强力均天下國家事君子之道四丘未能一焉晦翁援此證聖人所不能之說夫四者乃聖人切身事如前所援堯舜病博施之類則聖人有不能處若此四者豈真有所不能耶只此四者才處得不恰好皆未能盡道前章說聖人不能即謂此類見成印證不待逺求如博施濟衆豈真不能耶或百中遺一或千中遺十亦聖人所病也豈是都做不得如是認則錯矣忠恕違道不逺至勿施於人一段是忠恕之事未到仁者地位横渠先生曰以愛己之心愛人則盡仁夫謂忠恕為近仁則可謂之盡仁可乎若曰以愛己之心愛人乃是人己合一不待推廣故可謂之盡仁然與此地頭又自别此因恕而言仁耳恕是求仁之事推愛己之心以愛人恕者之事也以愛己之心愛人仁者之事也忠恕違仁不逺轉一過即仁矣故横渠以仁言惟天下至聖言溥博如天淵泉如淵惟天下至誠言淵淵其淵浩浩其天何以異如天如淵猶是二物其天其淵即聖人便是天淵中庸說到此處至矣盡矣向上無去處了一節深一節不必分聖與誠君子居易俟命與大易樂天知命相似否居易俟命學者事樂天知命聖人事宫為君商為臣角為民徴為事羽為物此固是定清濁而叙尊卑然古人由是而觀政焉則其嘿相感通處必有其義若只以清濁尊卑相當則亦粗矣五聲含此象必爾方調得律吕不然即有臣陵君子過母而謂之奪倫矣此却不比漢儒附㑹効法之言實有此事毫髪不可差也設或樂聲奪倫即其國君臣民物必有不盡分事如州鳩師矌皆能以此知彼正是樂與政通宫為君商為臣角為民徴為事羽為物如何國語曰古之神瞽攷中聲而量之以制度律均鍾言以聲定律以律均鍾而五聲之本生於黄鍾之律黄鍾上生者三分益一下生者三分去一十二律黄鍾最尊管長九寸九九八十一分為宫下生去一得五十四為徴又三分徴數上生加一得七十二為商又三分商數下生去一得四十八為羽又三分羽數上生益一得六十四為角此五聲相生之次也五聲惟宫最尊宫属土絃最多用八十一絲有君之象故宫為君商属金以其濁次於宫絃用七十二絲如臣能次於君之象故商為臣角屬木以其清濁中絃用六十四絲半清半濁居宫羽之中有民之象故角為民徴屬火絃用五十四絲其聲清有事之象有民而後有事事劣於民故徴次角羽屬水絃用四十八絲其聲最清有物之象有事而後有物物劣於事故羽次徴此五聲大小之次也五聲大小之相次固本扵黄鍾為宫若五聲旋相為宫則十二律皆可為宫非特黄鍾為宫而已如應鍾為宫則大吕為商姑洗為角甤賔為徴南吕為羽無不皆然然當髙者或下當下者或高而有奪倫之患故立此五象以調之宫必為君而不可下扵臣商必為臣而不可上扵君若民若事若物皆當以次降殺所以律中有以半聲相應者盖以其臣或過君民或過臣事或過民物或過事故不用正聲而用半聲以應之此八者所以克諧而不相奪倫也角聲六十四下生變宫四十二餘九分之六又三分益一上生變徴五十六餘九分之八夫宫商角徴羽取象於君臣民事物者取其清濁高下以次降殺而得其倫也今變宫用四十二絲而變徴却用五十六絲清濁不倫徴反重於宫如何古來只用五聲在旋宫則為六十聲後世以古樂聲太濁不恱人聴遂添二變聲見囯語間在正聲之中變宫四十二絲有竒居羽之下變徴五十六絲有竒居角之下增二變聲在旋宫則為八十四調漢唐樂皆用之庶得兩清聲相間故樂可聴禮運言禮義以為紀繼於大道既隠之後不知大道之世於禮義如何禮家謂太上之世貴徳其次方務施報於人往來之說故言大道為公之時不規規於禮義禮義乃道徳之衰忠信之薄大約出於莊老之遺言非先聖之格言也祭義曰祭之日樂與哀半表記曰祭極敬不繼之以倦如何樂與哀半之樂乃樂其親之來享非在外之樂表記之樂則間其敬心矣春夏産萬物而假大之也而月令孟夏之月曰靡草死秋冬斂萬物而退藏之也而月令仲冬之月曰芸草生四時榮枯雖有大分然一物自為榮枯乃物性不齊在大化中亦使各正其性命所以謂之大化若物物而齊之則化工小矣地載神氣神氣風霆風霆流形庶物露生神氣即二氣之神靈不測者風霆是也風霆流形于太空之中所以鼓舞萬物者也故萬物自之而露生風霆即土地山川之氣為之故屬地王制謂衣服飲食不粥於市盖衣服飲食日用不可闕豈可不懋遷於市古人制市此物豈宜取之扵市市亦無粥之者考工記曰粤之無鎛也夫人而能為鎛也正此意律吕旋相為宫五聲分君臣民事物是如何自黄鍾至應鍾總謂十二律而半為陽律半為隂吕此律吕之分也宫為君商為臣角為民徴為事羽為物此五聲之序也初有五聲耳自十二律旋相為宫於是有六十聲矣初有五聲之正聲自宫之有増變宫徴之有増變徴於是有八十四調矣律吕隔八生子上生者三分益一如林鍾生太蔟自六寸上生為八寸也下生者三分去一如黄鍾生林鍾自九寸下生為六寸也古史謂陽必下生隂必上生若拘此法則十二月之律無比次降殺之序以之候氣則氣不應矣以之制樂則樂不和矣故鄭康成有重上生法自黄鍾生至蕤賔則陽反生上隂反生下六五而終矣其比次降殺之序可用以候氣可用以制樂乃天然之法非巧筭所能為者且五聲之本生於黄鍾絲最多而聲最濁則黄鍾固為宫矣若五聲旋相為宫則十二律皆可為宫也如大吕為宫則夾鍾為商仲吕為角夷則為徴無射為羽黄鍾為變徴矣十二律之囬旋固生生而不窮若徒以正法相生依正聲而用則五音奪倫君弱臣强矣民尊臣卑矣若事物一切奪倫而無統矣故杜佑旋宫法於是有正聲焉有子聲焉正聲用其全子聲用其半庶幾五聲協比無相奪倫也如黄鍾為宫下六律以正聲應凡五惟變徴用子聲耳以見黄鍾為諸律之母有大君之象若他律為宫則下六律各不用正聲應卒用子聲減半法相應以見不敢正敵黄鍾有隆殺之義焉然黄鍾至尊或反見役扵他律者盖諸律當權用事則黄鍾雖尊亦當降下以相從但不用正律耳盖正律非他律所可役使止可役使子律耳以見君有常尊也然旋宫之法正律亦用減半以應者盖宫常為君商常為臣角常為民徴常為事羽常為物子無過母之法臣無高君之理必用減半法以折之則清濁高下以次相比無奪倫之患所謂金聲玉振終始條理也先儒不知此法故律聲不諧古樂遂廢要之鄭康成之重上生杜佑之減半法真圓機之士非紙上之空言也十二律上下相生法何謂夫妻子母黄鍾太蔟姑洗蕤賓夷則無射此陽律也大吕夾鍾仲吕林鍾南呂應鍾此隂吕也律所生者常同位吕所生者常異位故曰律娶妻而吕生子也六律六吕十二時位焉乾坤之六爻位焉故子者陽數之始也黄鍾生焉是為乾之初九至於六陽盛扵無射則為上九矣未者隂數之始也林鍾生焉是為坤之初六至於六隂盛於仲吕則為上六矣且黄鍾之初九下生林鍾之初六同是初位是為夫婦林鍾之初六上生太蔟之九二初與二異位是為母子太簇之九二下生南吕之六二同是二位是為夫婦南吕之六二上生姑洗之九三二與三異位是為母子姑洗之九三下生應鍾之六三同是三位是為夫婦應鍾之六三上生蕤賓之九四三與四異位是為母子蕤賓之九四下生大吕之六四同是四位是為夫婦大吕之六四上生夷則之九五四與五異位是為母子夷則之九五下生夾鍾之六五同是五位是為夫婦夾鍾之六五上生無射之上九五與上異位是為母子無射之上九下生仲吕之上六同是上位是為夫婦大率同位娶妻隔八生子上生者三分益一下生者三分去一古史謂陽必下生隂必上生若拘此法則十二月之律無比次降殺之序以之候氣則不應以之制樂則不和故鄭康成有重上生法自黄鍾生至蕤賓陽反上生隂反下生五下六上以序降殺以之候氣則應以之制樂則和視古法為有用之律矣率性之謂道吕氏謂人受天地之衷以生梏扵形體又為私意小智所撓故與天地不相似而發不中節必不失其所受於天者然後為道晦翁云程子之論率性正是就私意人欲未萌之處指其自然而言若吕氏所云則所謂道者又在修為之後而反由教而得之竊意未率之初既有此性已具此道吾特因而率之則由性而之教者皆道也天命之謂性率性之謂道此兩句是懸空說未著人事在至修道之謂教方始謂人率性謂萬物之生各有一性如牛有牛之性馬有馬之性牛必穿鼻馬必絡首牛不可為馬馬不可為牛者各循其理之當然而不可易是謂率性之道先儒於此三句只就人性起頭或者不見天地大化故其說性說道説教皆不周普流通此晦翁所以不取率性之謂道莊老云串牛鼻絡馬首以為聖人皆遏其性而不出於人性之自然伊川曰這意思真見得率性道理牛鼻不可不串馬首不可不絡以牛之首而絡得乎以馬之鼻而串得乎亦因其性而率之斯謂之道隂有隂之性陽有陽之性五行二氣亦各有性至於魚之性則順乎水鳥之性則順乎山各有其性夫道若大路然又云人率循其人之性物率循其物之性萬有不同各一其性而不相假借此即人物各有當行道理故謂之道此只懸空說在不要作聖人安行順理說如牛必穿鼻馬必絡首各有所率之性各有當行之道豈只是聖人事未說到聖人在天命之謂性天命流行付與萬物人得之而為人之性物得之而為物之性此兼義理氣禀而說性不露芒角而夫子孟子諸子之言性盡在其中矣程子曰中所以狀性之體段猶天之圓地之方也故謂天圓地方則可謂方圓足以盡天地則不可晦翁謂喜怒哀樂未發則性也愚意亦謂性與中一物耳自天之所命則謂之性自四者之未發則謂之中若如程子所論豈謂性是虛物中是著實些箇其不同或在此四者未發當此境界即是人生而靜處故晦翁指此為性盖發則為情非以中為性也中只是狀其未發之時體段如此若便以中為性則是稱圓為天稱方為地而可乎不偏之謂中不易之謂庸中者天下之正道庸者天下之定理然惟中故可常常處便是中終非兩端物事理㑹得時萬理總是一理未理㑹得時萬理各是一理今日方理㑹未好滚合說混沌話中不可為不易庸不可為不偏界截條限逐一商量不覩不聞晦翁謂喜怒哀樂未發之初至靜之時也當至靜之時不知戒懼之心何處著落此問最精前輩於此境界最難下言語既是未發才著工夫便是發了所以只說戒謹恐懼盖雖是未發之初體已含具萬用在此不比禅家寂如空如所以惺惺主人常在冥漢中照管都不曽放下了盖雖是持守體段却不露㾗跡當不覩不聞而戒懼愚謂如鑑之照物當不照時光自常存不可欺以妍醜上蔡惺惺法者豈謂此乎若如此說則是他自常存了何用戒謹恐懼道理固自常在但人湏用提撕照管不可謂目無覩耳無聞一齊都放下也若釋氏之地則一齊都放下空空底没些事吾儒政不如此湏當此地常自惺惺地也此地又太著力不得著工夫自知不覩不聞若無恐懼則是槁木死灰全無知覺此心既無知覺到得發時却是外面更生一道理也中庸大意雖不在是然說持養話頭認此意如何便是此話頭執著不得才說知覺持養即成已發雖必有事而不可正其心此際如灰裏養火冷灰中煖火自在不宜撥著才撥著則見火矣君子之道費而隠且說道理費處己該一隠字意下面又添一箇隠字來還是再有隠道理否形而上者為道形而下者為器道即器器即道何用分上下程先生曰湏著如此說此語要人理㑹理㑹得時即是一物致中和一段章句云自戒懼而約之則極其中而天地位自謹獨而精之則極其和而萬物育愚意戒懼謹獨時中和未判混然一理未審戒懼何為致中工夫謹獨何為致和工夫動息有養此中庸精密工夫戒謹扵不聞不覩之時此即未發時工夫謹獨扵隠微之時此即既發時工夫若曰致中除戒懼一條何以見其致處若曰致和除謹獨一條又何以為致血脉相承如此此致之一字最是工處君子和而不流中立而不倚和與物同何疑於流中立無所依又何疑於倚中立者四邊虛剛立不住易得求倚惟强有力者不假倚自然中立鳶飛魚躍一章程子謂必有事焉而勿正心之意同鳶飛魚躍是道體流行顯見徧滿匼匝只是無人領㑹得要領㑹得時除是有孔子等氣象方參得透今世做工夫人心却不曽放去又多失扵迫切正在勿助長不做工夫人心裏自在又却都没一事無事而忘此皆不是水止鑑空之體所以參不得天地妙理君子以人治人改而止張子曰以衆人望人則易從其說顯然如何衆人之說即天生烝民凡厥庶民之謂亦是將他共有道理治他乃天理人倫之類若以蠢蠢昏昏為衆人非聖人意忠恕違道不逺程子所謂動以天言如何曽子言忠恕與子思不同者盖聖人事即維天之命扵穆不已乾道變化各正性命所謂動以天也子思正言學者事只是施諸己而不願亦勿施扵人是動以人耳此處當置局東西面說鳶飛戾天一章程子謂此一段是子思喫𦂳為人處是如何大要不要人去昏嘿窈冥中求道理處處平平㑹得時多少分明快活中庸言自誠必先學問而後力行大學言明徳必先格物致知而後正心誠意是則博學之功誠入徳之門至說修徳方說講學而遷善改過等事又反在修徳之後言之何歟脩徳講學遷善改過四者明如日星不用無端繳繞只合逐條自勘當從頭做去也得從尾做去也得中間起頭亦得二十二章以天道人道間見迭出是如何道理縱横說之無盡如何立定様範都要一般面目只合逐章體認如天道人道才不費力處便是天道才著力處便是人道晦翁謂生知安行者主於知而為智學知利行者主扵行而為仁夫生知固可以知言而安行何以主於知利行固可以行言而學知者何以主於行論語論進修之序皆先仁而後智中庸論氣禀之殊皆先智而後仁謂仁人為聖人者以進修言也謂上智為聖人者以資禀言也中庸既以智為聖人則生知安行皆聖人之事安行所以屬智既以仁為賢人則學知利行皆賢人事學知所以屬仁凡中庸人品之論各有所屬分配自有並行不悖處至聖以徳言也至誠以道言也徳非道莫能為故凡見於日用者皆道也即經綸天下之大經立天下之大本既歸之至誠至於溥博淵泉而時出之又歸之扵至聖何也聖者靈通變化之稱人道之極功誠者真實無妄之謂與天同徳也經中凡說天徳處必曰至誠凡論人倫之至處必曰至聖中庸追王之㫖晦翁以為推己及人而混䘮祭而言莫便是人各伸其情於父母否伸情扵父母處獨齊衰之䘮上同於天子其他各有限節等殺不可盡伸也文王追王者也何中庸言追王而不及文王據此却似文王生已稱王與詩中受命作周武成處語亦類此但先儒堅謂不然當以孔孟之言為㫁三分有二以服事殷取之而燕民不恱則勿取是時大勢已成只不伐商耳中庸言追王太王王季文王為周公而武成所稱太王王季文王或以為追王是武王果周公乎武王乎又如武成稱王皆後來史臣之文周禮之文皆周公所制追王是文武之意故中庸言周公成文武之徳以制此禮好學近乎智力行近乎仁知耻近乎勇此三近字體認未甚親切全此理者為達徳近此徳者為入徳其次致曲曲能有誠有誠處比誠者地位如何此語不要大看未是統體誠處乃是逐節逐曲推致各造誠實地位直到下面惟天下至誠為能化方說全體誠處程子解鳶飛魚躍一章曰此是子思喫𦂳為人處活潑潑地指何理言若是一物生見解人便指直是道理所以活潑潑智睿不生只是鳶魚所以死搭搭率性之謂道修道之謂教率性不要作工夫看物性自然各有所由行之路如牛是牛之性馬是馬之性飛潛動植各一其性而不可移換便是率處若牛作馬馬作牛飛者潛之動者植之即是違其性非物之所謂率性矣中庸六章言舜其大知也歟執其兩端用其中於民而不及庸又十三章言庸而不及中何也此書從頭至尾句句是中句句是庸不要摘字看才如此看自此至此說中自此至此說庸是尋行數墨之學自格物至治國平天下是有次第道在於謹獨抑不知戒謹恐懼還是毋自欺湏從上面起抑戒謹恐懼即是毋自欺境界戒謹恐懼與謹獨是兩項地頭戒謹恐懼是自家不覩不聞之時存誠養性氣象如此謹獨是衆人不聞不覩之際存誠工夫如此中庸兼已發未發說故動息皆有養大學只就意之所發說故只防他罅漏處誠意章所謂自欺與下文小人閒居為不善有分别否才萌欺心便落小人漩渦中可畏之甚或問曰敬若何而用力程子嘗以主一無適言之嘗以整齊嚴肅言之其門人謝氏則有所謂常惺惺法者尹氏則有所謂其心收斂不容一物者敬字本不用解注但操存此心常令存在便是主一無適惺惺法與整齊嚴肅之語共是扶起主人翁不令放倒耳不用他引證引證便死了只自驗看或問曰但為氣質所拘人欲所蔽則有時而昏然其本體之明則有未嘗息者故學者當因其所發而遂明之如何是明徳之所發良心善性時有隙光半㸃自發見處如見孺子而惻隠感霜露而怵惕雖未嘗學問人亦有但常人不能體認不能擴充俄頃又放過了所以終身昏昏底意實則心實矣然或但知誠意而不能密察此心之存否則又無以直内而修身也夫心意未嘗相離也意特心之所發耳以章句之㫖觀之母乃心自心意自意耶密察此心不知又將一箇心密察耶本是長匹無縫底物事聖賢欲人警悟處剪下逐段向人看理㑹得時仍是長匹無縫不曽剪㫁密察之間有味即密察處便是心更復何處外討一箇來前輩有以心使心語此喫𦂳示人處要人領㑹忿懥恐懼憂患親愛賤惡畏敬哀矜傲惰此數者皆由七情中出大學之七章以上四者釋正心八章以下釋修身何所區别總是七情之動一則心與事應一則身與人接但前章主事而言扵事上有所滯著則於心裏有病心裏有病則其脉過扵身身受病則其脉過扵家但正心一條說理細修身一條說理麄傲惰之說或問言傲惰凶徳也以其先有是心不度所施而有傲耳若因人之可傲而傲之則是常情之宜有事物之當然傲惰所疑極是本無兩種傲惰但人有此僻多不知覺既知覺則當消磨去之耳曲禮傲不可長是也必忠信以得之章句云循物無違謂信晦翁嘗謂以實之謂信此乃以循物無違言何耶古語言有物而行有常物即實事也據實事而言大者依他大小者依他小實有五分便依他五分實有十分便依他十分是謂循物無違是謂以實之謂信格物致知疑與記誦博識相近伊川說格物為誠意之本明道謂記博為玩物䘮志格物致知研窮義理心學也記誦博識口耳外馳䘮心之學二事正相反猶言温故知新可以為人師記問之學不可為人師是故欲明明徳於天下者先治其國數句皆以先言獨致知格物一句乃以在言恐上數條一節是一節部位分明如升堂了方入室下條如著衣便不寒喫飯便不飢是貫串工夫此節工夫貫串不比其他科等人之其所親愛而辟焉一章終未見身與物接意思接此五種人便有此五種僻豈不是身與物接晦翁謂悠乆即悠逺兼内外而言如何不息則久是誠積於内徴則悠逺是誠積扵外下却變文為悠久則是兼上文内外而言悠逺則博厚不知此博厚主内而言邪抑主外而言邪自徴則悠逺而下皆主效驗之積於外者言之木鍾集卷八
