body:
  text: 木鍾集卷六宋陳埴撰詩詩之比興賦大率興詩如關雎之詩是蓋二句托物二句言事辭實相對立而意不比是之謂興比詩不言事只取物之親切者詠之如螽斯之詩是賦詩或直言事或感物意非比興者是如卷耳之詩晦翁所解者也然比詩亦有言物而復言事者又不可以例觀也大約賦詩有兼比者興詩亦有兼比者如麟趾之詩前二句是興後一句于嗟麟兮之類乃是比他可類推若是後去詩有十二句上下成一章者只看起初辭意以别三體詩𫝊之例凡說興而比者謂上文是興體下文是比體若南有喬木之類是他一章中自分比興非謂比中含興興中含比若興中含比者乃興而有比義如關雎鵲巢之類雖則含比只可斷以興比中含興者乃比而不實如白華之類半比半興悉斷之比則前後有此例者更觀玩凱風前兩章皆以凱風自南起詞詩𫝊以首章為比而又以次章為興不知一物六義詩中曽有此體否三虛一實非興體兩語虛起兩句實應此興體也古人毛馬而用之故詩曰乘乘黃乘乘鴇然秦風之騏騮是中騧􅌐是驂則驂馬服馬一乘四色豈秦獨異於中國耶朝祭之車謂之毛馬馬則齊其色戎獵之車謂之物馬馬則齊其足與力戎馬齊其力田馬齊其足止齊謂檜亡為東周之始曹亡為春秋之終乃以為聖人係曹檜之詩於國風之末即其思周道思治之語為傷無王無伯之驗愚謂周之東遷豈専關於一檜之亡而春秋之終豈專係於一曹之亡止齊之言是歟非歟詩序出於漢儒不可憑據春秋傷無伯之說亦是說者之談聖人作春秋决不解主張伯道以詩序證春秋自是船上繫帆但止齊之言意謂當無王無伯之時唯小國滅亡最先故小國思患最切是以聖人繫詩作春秋每於小國觀世變非謂由此二國致禍也說詩比類多說物不見說事上兩句意未盡發下兩句正所謂一倡三嘆一人獨唱而三人備和之如麟之趾之類生民詩履帝武敏歆或以為帝嚳之行或以為蹈巨人之跡巨人跡據詩辭直是有如此天地間事有非耳目所常見聞者甚多不可信耳目而小天地關雎王化之基遷史乃謂周道衰詩人本之祍席而關雎作鹿鳴小雅之盛遷史亦謂仁義陵遲鹿鳴刺焉何謂也四始之詩不應以亂世之作冠於風雅之首今但玩其詩刺體邪美體邪古今說者皆說詩之辭不足憑據惟有詩文可據從甲說則詩文為近從乙說則詩文為逺從甲可也此說詩之法亦斷按之法木鍾集卷六
