body:
  text: 木鍾集卷二宋陳埴撰孟子孟子謂琴張曾晳牧皮為狂士曾㸃詠歸浴沂便有聖人氣象孟子謂夷考其行而不掩是以謂之狂此果何見狂者立志太髙故舞雩之事胸次灑落如光風霽月然其終不到聖人處為其志太髙而行不掩故終歸於狂然人品終是不同故聖人晚年常歎狂者不可得見栁下惠為士師三黜不去集注以不能枉道之意則有確乎不可拔者矣燔肉不至孔子行聖賢出處貴於見幾而作栁下惠三黜而不去何邪三黜不去所以謂下惠之和然不肯枉道事人至其三黜乃其介處和而不失其介所以為聖之和孔子稱威公之正管仲之仁初未始有少貶孟子於伯者之事絶口不談齊威晉文則以為仲尼之所不道何邪以威較文彼善於此要知挾天子以令諸侯心術不正皆三王之罪人其後魏晉正昉此故孔孟之門不齒管晏特孔子聖德寬洪時或不掩其善孟子衛道自任故絶口不言為後學法也孟子論不動心歸之持其志無暴其氣二者固當兩下工夫至公孫丑問孟子惡乎長復告之以我知言我善養浩然之氣而不及志何邪持其志處即義理之養孟子養氣全在集義乃持其志也孟子細密工夫只如此不肯下敬字先儒謂其才髙難當詩出於小夫賤𨽻之口而後之言詩如髙叟乃不免於固豈世儒反古者賤𨽻之不若詩人吟咏情性故意象寬平老儒執守訓詁故意象窄狹文王治岐關市不征澤梁無禁成周門關市廛皆有限守山林川澤悉有厲禁何也文王因民所利而利之乃王道之始成周經制大備乃王道之成滕文公行仁政孟子止許以善國而不以王道期之何邪滕介齊楚之間滅亡之不暇孟子所為謀者無非王道至無可奈何處亦以太王望之豈是不說君臣之大義天地之常經以其所待之厚薄而為之輕重世無是理孟子冦讎之論疑若與之背馳孟子此語是說大都報應如此若忠臣孝子不當以此自處當知天下無不是底君父先儒謂孟子語有㾗迹者此等是也若聖人則渾然不露只曰君使臣以禮臣事君以忠樂之實樂斯二者還是就樂上有得抑吾心有此二者而發越呈露見之樂也實字當玩且說其實未說其華如聲音歌舞樂之華也若言其實即事親從兄之時油然自得其樂此便是真樂不假絲竹笙簧也樂不能已到手舞足蹈時則五聲八音從此起矣戰國諸侯雖彊東周猶在孟子說時君諄諄以王政勉之似非尊天子存王室之意孔子時人心猶共戴周天子名分尚存故作春秋以尊王室孟子時人心已去周室獨夫之勢已見故說列國以行王政文王之事商武王之伐商時中而已矣取之而燕民不悅則勿取春秋是也取之而燕民悅則取之戰國是也周公思兼三王以施四事夫禹湯文武周公皆聖人也而周公獨思兼之何也斟酌三王之事而損益之猶孔子之集大成治地莫善於助莫不善於貢如是則夏后之貢毋乃猶未善乎法至後聖益密故周兼夏商之制都鄙用助法鄉遂用貢法非不善但比之於助猶未善耳孟子見梁惠王又見襄王公孫丑乃發不見諸侯之問何也按孟子嘗言古者不為臣不見段干木踰垣而避之泄栁閉門而不納是皆已甚迫斯可以見矣由是觀之君必以禮來見則自當見之所不見者其交不以道其接不以禮耳謂可聘而不召史記謂梁惠王曾聘孟子小辨之怨親親也按晉太子申生厄於驪姬之讒不辭而縊新城正與宜臼事相類後以申生為恭太子豈其不為小辨之怨乎詩可以怨當怨而怨不害於義理之正申生有見於禮無見於詩可以為恭未可以為盡孝然必有申生之心而後可以權聖人之禮孟子言舜處類小辨但小辨有怨而無慕故不若舜以大事小如何是仁以小事大如何是智仁者無計較之私忘其孰大而孰小智者有量度之明自知不能敵大孟子言將降大任於是人必先苦其心志舜大聖人猶有待於此何耶聖賢越要從這裏過百煉乃見真金君子以澤言小人亦以澤言不知小人更有甚澤又均為五世而斬邪澤謂波流浸潤清水是清浸潤濁水是濁浸潤凱風何以為親之過小太子事關天下七子事關一家孟子不見諸侯自謂不為臣不見何為而見梁惠齊宣借曰梁惠卑辭厚幣招之遂往齊宣亦豈招之而往邪孟子見齊宣事首尾具見此書中間孟子將朝王一段乃始見之禮看此一段陳義如此豈茍合易進者邪是時惟齊宣能知孟子禮之以賓師之位未幾便致為臣而歸可見於他國不合梁惠王事見史記必是如此方見孟子答梁惠王問利一章集注謂利生於物我之相形愚意謂以物我相比並有計較心所以為利此處正橫渠所謂世俗之習利心但當以義理勝之公孫衍張儀皆事鬼谷先生學縱橫之術自其一怒諸侯懼安居天下息觀之豈阿諛茍容者所能若是而孟子乃謂其妾婦之道何邪自愚夫言之則曰安居天下熄自聖賢言之乃妾婦之道博學而詳說之將以反說約也學不博說不詳而曰我知約固陋矣若博學詳說而志不在於求約者則是外馳其心非所以為學也不博則約無所施學到約後許多博處方有受用見人喫不濟事自喫方甘味耳目之官不思耳目如何樣思耳司聽目司視而不能思惟心官主思耳故心為將帥耳目口鼻四肢皆卒徒也將帥明則士卒聽但當責將帥耳君子有三樂而王天下不與存焉晦翁集注謂此三樂一係於天一係於人不知係於天係於人處如何父母俱存兄弟無故此非人之所能為若教育英材全在人事君子不亮惡乎執晦翁謂凡事茍且無所執持此可以言不敬而却謂之不亮不信實者必茍且自欺書之允執厥中與子莫執中之說二者分辨如何允執厥中乃時中之中觸處是道理活法也子莫乃執一以為中死法也霄壤之異詖淫邪遁之辭何以知其蔽陷離窮辭之偏詖者由其心之蔽於理辭之淫放者由其心之陷於欲辭之邪僻者由其心之離於道辭之逃遁者由其心之窮屈於義理也程子曰萬物皆備於我反身而誠樂莫大焉不誠則逆於物而不順也反諸身者既是萬理皆實即渾身是義理流行作用何處不順裕茍於實理無時即觸處滯礙無往而非逆境何樂之有强恕而行求仁莫近焉或疑强恕不可言忠出或問晦翁曰有心為恕則忠固在其中矣夫恕者推己及人之謂也所謂有心於為之者亦為欲推己及人之事爾未見所謂推己之意不知如何謂在其中所謂無忠做恕不出忠恕二事不容去一者何說以道之既曰推己之謂恕若自己心裏元自不實不盡元無忠赤惻怛骨子更將何物推以及人以此見凡說恕字必有忠字在源頭了所謂無忠做恕不出儘當玩味今人皆不忠之恕惟務茍且於一時不復有己可推亦無復近仁矣告子謂不得於言勿求於心孟子以為不可孟子又謂我知言此言還是誰言言者心之聲也言上有病便是他心上有病當反求諸心可也告子乃言不求於心此是他不知言處孟子法門與告子正相反故於詖淫邪遁之辭而知其所受病之處蓋詖淫邪遁言之病也蔽陷離窮心之病也因其言之病知其心之病孟子所以為知言堯舜與賢禹𫝊之子孟子以舜禹為相厯年多伯益為相厯年少使舜禹而施澤未久堯舜豈捨子而授之賢處占七分久處占三分不然何以不使舜禹便即帝位而使居攝邪此等大事若天命人心未到馴熟脫落處如何遽然踐履其上夫子賢於堯舜逺矣何以觀當時若無孔子今人連堯舜也不識湯事葛文王事昆夷正耶譎耶以言其正何詩書有葛伯不祀湯始征之昆夷駾矣維其喙矣等語事之者樂天之仁伐之者應天之義處處是道理豈有計較心執俗心以觀聖賢陋矣孟子曰伯夷隘栁下惠不恭隘與不恭君子不由也又曰聖人百世之師也伯夷栁下惠是也夷惠皆絶德而不合中庸故好處直是可學弊處却不當學孟子曰聖人百世之師也伯夷栁下惠是也夫伯夷聖之清者也栁下惠聖之和者也皆局於一偏之小成孟子前面既以智聖巧力諭諸子孔子偏全去處其可否已有定論今又以夷齊為百世之師且繼之以況於親炙一語茍二子有一節可取則褒之亦不宜如此之過幾般樣小成若吾子以清和名一偏之小成伯夷栁下惠皆入聖來故其清為聖人之清和為聖人之和作用處與常人萬萬不侔但比孔子猶為小成之聖耳夷清惠和雖未能集大成然已謂之聖孟子乃以隘與不恭目之何其甚邪只可言聖之清聖之和非便謂之聖隘與不恭乃末流之弊謂學夷惠者爾夷惠自身却無此夷惠其弊既隘與不恭亦不足以有為矣孟子稱其皆能朝諸侯有天下於何處見其制行偏處末流必有弊其存心公處堯舜無以異瑕瑜不相掩伊尹之任非夷惠比蓋夷惠一流於清一流於和伊尹未見其偏也並言何故有伊尹之志則可無伊尹之志則篡其弊與二子同孟子論夷惠二事皆言其風流而獨不言伊尹何故二子為聖人之不能為雖不合於中庸畢竟髙于世儒孟子欲破世俗之同流合汙所以再三致意亦國奢則示以儉之意聖智終始孰全孰備巧力中至孰難孰易學問統體只是始於致知終於力行知得透徹則謂之智行得透徹則謂之聖三子始焉之所知只見得一邊道理後來亦只於那一邊上做得透徹此三子知不及於全故行到處亦只是一偏之聖夫子知得天下道理四方八面周匝普遍故成就處兼總衆理該貫萬善不可以一節名如作樂之法始而宣之以金是作大樂起頭一部大樂之條理便於此而始終而收之以玉是大樂之條理合當如此結尾才作大樂起便作大樂結始才不如此起終便不如此結孔子起結處皆是大樂故可以條理言三子只是單聲起結皆無條理了又譬之射焉均至於百步之外而有中者不中者蓋巧者知得到則百發而百中力者行得到則至而未必中由是觀之學不難於行而難於知猶射不難於力而難於巧非禮之禮非義之義如何程門以為如婦人之仁宦寺之忠晦翁以為凡禮義不可泥陳迹如可行於昔而不可行於今可行於人而不可行於己與夫辭之為禮亦有不辭之為禮受之為義亦有不受之為義行之人則為禮行之我則非禮惟義亦然大人者義理周遍融通故不為非禮義之禮義仁人之安宅也義人之正路也以仁為宅宅之至安者千年萬年可居住此主心而言也以義為路路之至正者千人萬人可由行此主事而言也安宅正路曠之而不居舍之而不由却作㳂山摘酢梨豈非孟子所哀邪孟子曰夫道若大路然又曰義路也夫道為義體義為道用均謂之路何邪道以路言謂事事物物各有當行之路義亦言路者謂處事處物各就他當行路上行前輩謂在物為理處物為義是也道義皆人物所當行之路故各以路言然道若大路則取其明白易知義為人路則取其往來必由不知道之猶路無目者也不知義之由路無足者也此孟子言意别處子貢稱夫子曰學不厭智也教不倦仁也學所以成己教所以成物中庸曰成己仁也成物智也何其言之相反仁智互為體用義精仁熟之後道理縱看橫看皆可智為體則仁為用仁為體則智為用成己仁也成物智也與學不厭智也教不倦仁也如何相反莫是成己言仁之體教不倦是用處學不厭言智之體成物是用處否成己為體成物為用學不厭為體教不倦為用仁智互為體用若合兩章言之不妨如來意孟子曰親親仁也敬長義也無他達之天下也夫仁義不止於孝悌而孟子以為達之天下還是推孝悌之心以友愛天下即是仁義否此章無推此及彼之意所謂達乃達道達德之達言人心之所同然也親親仁之發敬長義之發仁義之道無他人心之所同然耳君子之於物也愛之而弗仁夫仁者心之德愛之理竊疑孟子之言莫是愛與仁有小大之分親親而仁民仁民而愛物所謂一理萬殊稱物平施此仁字是用援集注誤矣待禽獸只有愛心不可使失所若夫牛不穿鼻馬不絡首一以人理奉之則親民何别不幾於同人類於馬牛乎仁者人心也有人理存焉施於人者不可施於物乃理一分殊處墨翟以兼愛為仁孟子力詆之至韓愈作原道闢佛老乃指仁曰博愛之謂仁墨氏知仁而不知義專主一偏韓子言仁而必及義發明全體文字中形迹似者何限須是與他剖别開去韓子以博愛言仁亦自有病先儒言之詳矣義主於內公都子謂行吾敬故謂之內嘗見近思録中云敬義夾持如何禮敬之義在外如叔父如弟如鄉人皆指外而言故告子以義為外然敬之所施雖在外而所以行吾敬處却在內如當敬叔父時則敬叔父當敬弟時則敬弟當敬鄉人則敬鄉人所以權其事宜而為之差别者則此理之權度未嘗不在吾心故公都子以此折之其辭簡而理勝所謂辭不迫切而意已獨至也義主敬兄故此章說義處常著敬來乃是一串事敬義夾持之語是說敬以直內義以方外乃是兩頭事孟子曰仁人心也程子曰心如穀種仁其生之性同乎否乎心生物也而所以能生者以有仁也故心如穀種雖具此生理然有形有殼只一粒物耳不能以自生所以能生者性實為之仁之於心亦然人心是物穀種亦是物只是物之有生理者爾然便指心為仁則不可但人心中具此生理便以穀種為仁亦不可但穀種中亦含此生理穀不過是殼實結成而穀之所以才播種而便萌蘖者蓋以其有生之性心不過是血氣做成而心之所以有運動惻怛處亦以其有生之性人心之與穀種惟其有生之性故謂之仁而仁則非梏於二者之形也孟子只恐人懸空去討仁故即人心而言程子又恐人以人心為仁故即穀種而言以是知仁不止於二者則凡有生之性皆是也出入無時莫知其鄉愚恐孟子不識心范淳夫小女嘗有此語明道先生聞之曰此女雖不識孟子却識心養心莫善於寡欲欲固心之所不能無者但於其中識得真與妄耳周子謂養心不止於寡欲自寡而至於無則是必閉口枵腹然後可以得飲食之正絶滅種類然後可以全男女之别也而可乎寡欲是操存持養工夫乃學者事若德盛仁熟之後心不待養而存即欲不待寡而無當此境界欲即是理理即是欲從心所欲無非義理雖謂之無可也學問之道無他求其放心而已矣誠如是即不須千頭萬緒理會學問便一向求放心如何學問之道千緒萬端必事事物物上都去理會將過無非欲求其已放之心鞭辟入身上來在自家腔子裏從此尋向上去即下學上達工夫正如詩三百篇頭緒甚多一言以蔽之曰思無邪學詩之人每一章一篇並存無邪之思以觀之則百篇之義不在詩而在我矣此章特為學問務外不務內言之所謂學問之道無他就千條萬緒上皆一一是求放心必從心上下工夫則學問非詞章記問之比矣如云學問只是求放心即不須千條萬緒此却是禪家寂滅之說非孟子意向聞先生說盡心知性為知其理存心養性為履其事願詳其㫖為學只有兩字知與行耳知處是道問學行處是尊德性作博文約禮看亦得正心存心之分養性知性之辨不起妄念是正心不令外馳是存心存此天理是養性明此天理是知性盡心知性則知天存心養性以事天有何分别心體昭融其大無外包具許多衆理是之謂性性即理也理有未窮則心為有外故盡心必本於窮理蓋謂窮究許多衆理則能極心體之昭融而無不盡性與天只是一理程子曰自理而言謂之天自禀受而言謂之性語其分則不同耳既知得性便知得性所從出是謂知天到得知天地位已是造得此理了然聖賢學問却不道我已知得到這地位一齊了却又須知行夾持始得故必存此心而不舍養此性而無害存養工夫到此愈密愈嚴所謂敬以直內是乃吾之所以事天此時直是常在天理上行天不在天而在我矣知行二字不可缺一且如自家欲事天向使未知天為何物不知是箇甚麼到得知天却不下存養工夫則亦非實有諸已矣知言然後不動心此孟子意觀程子意疑其與孟子戾程子意只知言便是明理緣明理不惑故心不動盡其心者知其性知之有次第如此存其心養其性履之有次第如此又不知知天一節在盡心前在盡心後晦翁以知性為大學格物之謂盡心為大學知至之謂又不知知天在甚地位所以能盡心者為其知性天者性之所從出知性則必知天理實一源也知在先盡在後所謂物格而後知至也先存後養亦是次序集注難說非於此可盡故者以利為本故者已然之迹是兼指善惡而言也然人之性為善則順為惡則逆故以順為本不知下愚之人果可以本言否善惡皆已然之迹但順者為本則善者其初也惡者非其初也水無有不下者水之本也若夫搏之使過顙激之使在山豈其本哉孟子從源頭上說性是說得第一節程門却謂孟子說得繼之者善則又似第二節孟子本意是說性之源頭獨指純粹至善言之即太極之本體也但既以善定名善者惡之對有善即有惡所以諸子得乘罅而進故程子以為猶落第二義也程先生謂孟子說性善只說繼之者善昨聞先生云水無有不下處却是太極據此說則孟子似指流而至於海終無所汚者為太極了孟子說時本是直指一隂一陽之謂道來說但善者惡之對有善便有惡故程子以為不說得源流正派說得繼之者善蓋善猶水之清惡猶水之濁既以清為水之性則濁非水之性乎要知清濁可以為水之流不可為水之性繼之者善亦猶是也蓋繼之者是說太極流行之第一節則可謂是太極則不可孟子道性善蓋謂性無有不善也明道乃以為善固性也然惡亦不可不謂之性其義如何才識氣質之性即善惡方各有著落不然則惡從何處生以孟子說未備故程門發此義孟子專說義理之性專說義理則惡無所歸是論性不論氣孟子之說為未備專說氣稟則善為無别是論氣不論性諸子之論所以不明夫本也程子兼質論性孟子說性既以情言又以才言情固出於性不知才字何處著落才猶質也董子所謂質朴之謂性其說起於此程子以才為氣質之性孟子曰若夫為不善非才之罪則是人善惡又當以氣質論為孟子把諸路一齊截斷了故諸子不服須是尋他不善路頭從何處來公都子問性三節孔子性近習逺上智下愚之說相似否除第一問性無善無不善外第二問即性近習逺意第三問即上智下愚意程子釋自暴自棄謂之下愚不移不知因甚了自暴自棄是必其性之昏也是其性又有不善也豈專其才之罪哉程氏固欲以補性善之論然如此亦不通程子以才為氣質之性以天地之性言之則有善不善也踐形與率性如何盡性能踐形率性别是道理可看中庸孟子形色天性也惟聖人然後可以踐形聖人之踐形莫便是踐此形色之理否踐非踐履之謂乃踐言之踐聖人盡性地位方償得他本來形色真箇無虧缺處學未至於聖人則於性分道理未免虧缺才於性分有虧缺即是空具此形色不能充踐滿足也工夫在盡性不在踐形惟字然後字當玩天命之謂性則有生即有性孟子何以深詰告子生之謂性生之謂性孟子未便攻他只謂他認生處為性更不分别人物是將血氣知覺為性凡物有血氣知覺者皆與人性一見血氣而不見道理此則不可也告子謂食色性也食色固是性然此一句莫太無分别否使口不止於味而必求八珍九品目不止於色而必求錦繡文彩亦可謂之性乎或謂必皆中節方謂之性中節之言是否告子不就道理上看性去血氣上看必至於滅天理須於血氣中察見其道理流行處方是聖賢言語君子不謂性命世人以上五者為性則見血氣而不見道理以下五者為命則見氣數而不見道理於是人心愈危道心愈微孟子於常人說性處却以命言則人之於嗜欲雖所同有却有品節限制不可必得而人心安矣於常人說命處却以性言則人之於義理其氣禀雖有清濁不齊須是著力自做工夫不可一委之天而道心顯矣大要上是人心人皆知循其在人而君子則斷之以天下是道心人皆知委其在天而君子則斷之以人此君子言知命盡性之學所以異乎常人之道也歟正命知命立命之所以殊凡死雖均是命但盡道而無憾者為正比干雖殺身正也盜跖雖永年非正也知謂知此道理立謂盡此道理不惑於死生夀夭一成是天理排定是謂知命既知得了不成一向委付於命須是了盡自家身分上道理無少虧缺方是立命盡是道理了恁時死方無憾是謂正命平旦之氣大凡人皆有良心終日汨汨不能加持養之功事事物物常為所惑私意情欲滿於胸次所謂良心斫喪無餘脈矣然秉彛亦未遽泯也至於夜則氣靜而思慮息神定而心緒不亂於平旦始興之時未與物接未萌他慮氣之清明猶有良心存焉自此持守保護不為旦晝之所梏亡則平旦之氣日漸充拓積纍之久將見湛然虛明生生之體不息矣聖人者清明在躬志氣如神萬象森列紛至錯來而吾心淡然凡旦晝之間皆虛明之體何間於平旦之氣哉孟子有平旦之說其亦哀乎戰國之人而指其迷塗也夫清明在躬志氣如神聖賢存心養性其氣未嘗不清明也故方未與物接之時氣之清明常存逮夫既與物接之後其氣之清明猶故周流運用隨處隨在不聞有間斷時節此上智之事自蚤至莫自生至死其清明常如平旦之時又豈可以平旦言邪若夫下愚之人良心既喪外物交攻而正氣始不存矣所幸者有平旦之氣猶可以持養蓋夜氣之所息發為平旦之氣當其未應物之初喜怒不作忿懥不形良心猶有發見至微若能於是保守之而勿失培養之而不替則亦可漸復其本然之良心特人自不能思耳是以旦晝之所為而梏亡之晝之所為有以害其夜之所息夜之所息不能勝其晝之所為所以前日平旦之所僅存者今已索然無有名雖為人其實無異於禽獸孟子論平旦之氣專為人之放其良心者而言其開悟一世之聾瞶至切也此段境界乃指示喪失良心者欲其認取此時體段從此養去也蓋平旦之氣乃夜氣之所生又關乎旦晝之所為惟旦晝之所為者能不與物俱往則夜氣方和平既和平則平旦之氣亦清明那時有隙光半㸃萌蘖便是良心發見處人於此時能持循涵養使其萌蘖漸漸光明則雖當旦晝也如平旦矣今人但晨興略略見得微眇轉步便去利欲血氣上走終日昏昏所以索然無有平旦之氣形雖具而心則亡於禽獸奚擇焉浩然之氣養氣以集義為主勿忘勿助長勿忘是工夫不可緩勿助長是工夫不可急譬如人有田一頃不知耘苗令其自長此忘之謂工夫之緩也亦有憫苗之不長拔其欲長此助之謂工夫之緊也且如今有人煉丹有文武火丹豈無火火猛則丹便走惟慢火常在爐中可使二三十年伏火之久然後養成得丹孟子養心之說即養氣之喻必有事如心中有主人翁相似而勿正正即意也不可著意之謂浩然之氣恐即是血氣而義理附在其中此煉丹法未經煉時是朱砂已經煉後全是一粒火浩然之氣是將義理煉成血氣純是一團義理何言附邪必有事焉而勿正心勿忘勿助長也孟子為養氣設程門作養心法不知是何等工夫孟子之所以不動心者以其善養氣也所謂善養者以直養之而無害也直養者即集義之謂無害之者即必有事焉而勿正之謂蓋集義工夫緩則類於舍苗而不耘急則類於揠苗而助長若夫必有事焉則其心常自惺惺不少放下而勿正則又不當猛著力勿忘勿助長則既不失之緩亦不失之急惟孟子下工夫處有節度如此所以養成浩然之氣而能以不動心要知集義乃養氣之藥料必有事焉四句乃固製之方法但孟子養氣以養心其所成者止於集義工夫故話頭稍粗程門轉此話頭為養心法養心以養氣故其所事者乃持敬工夫而其說為細然其下工夫處亦不過如孟子之節度耳昔聞先生說養氣一段以配義勿正分𨽻以直養併勿害兩段莫識其詳浩然之氣工夫綱領只在以直養之無害所謂以直養者下文集義一段是所謂無害者下文必有事焉一段是養氣猶煉丹集義處是丹之藥料必有事焉四句是固製此藥料者有好藥料或固製不好反能害人此四句者猶文武火持志還是敬否持處便是敬孟子言四端不言信程子云既有誠心為四端而信在其中五行無土位位在四象之中五常無信位位在四端之中信者實有此者也實有此仁實有此義實有此禮智處即信也然四端不得信則不成四端所謂鼓無當於五聲五聲不得不和水無當於五色五色不得不彰四端說性是太極渾然之全體本不可以名字言但其中含具萬理而綱領之大者有四故命之曰仁義禮智孔門未嘗備言至孟子始備言之蓋孔子之時性善之理素明雖不詳著其說而其說自具至孟子時異端蜂起往往以性為不善孟子懼是理之不明而思有以明之茍但曰渾然本體則恐為無星之稱無寸之尺而終不足以曉天下於是别而言之界為四破而四端之說於是乎立蓋四端之未發也性雖寂然不動而其中自有條理自有間架不是籠統都是一物所以外邊才動中邊便應如赤子之事感則仁之理便應而惻隱之心形如蹴爾呼爾之事感則義之理便應而羞惡之心形如過朝廷過宗廟之事感則禮之理便應而恭敬之心形如妍醜美惡之事感而智之理便應而是非之心形蓋由其中間衆理渾然各各分明故外邊所遇隨感隨應所以四端之發各似面貌不同是以析而四之以示學者使知渾然全體之中燦然有條如此則性之善可知矣然四端之未發也渾然全體之理無聲臭之可言無形象之可見何以知其燦然有條如此蓋是理之可驗乃依然就他發處驗得凡物必有本根而後有枝葉見其枝葉則知有本根性之理雖無形而端緒之發則可驗故由其惻𨼆所以知其有是仁由其羞惡所以知其有是義由其恭敬是非所以知其有是禮智使其無是理於內何以有是端於外由其有是端於外所以知其有是理於內而不可誣也故孟子言乃若其情則可以為善矣乃所謂善也是則孟子之言亦遡其情而逆知之耳仁義禮智既見得他界分分明又須知四者之中仁義是一箇對立底關鍵蓋仁仁也而禮者則仁之著義義也而智者則義之藏猶春夏秋冬雖為四時然春夏皆陽之屬也秋冬皆隂之屬也故曰立天之道曰隂與陽立人之道曰仁與義是知天地之道不兩則不能以立故端有四而立之兩耳仁義雖對立而成兩然仁實通乎四者之中蓋偏言則一事專言則包四者故仁者仁之本禮者仁之節文義者仁之節制智者仁之分别猶春夏秋冬雖不同而同出於春春則春之生夏則春之長秋則春之收冬則春之藏也自四而兩自兩而一則統之有宗會之有元矣故曰五行一隂陽隂陽一太極是天地之理固然也仁包四端而智居四端之末者蓋冬者藏也所以終萬物而始萬物者也智有藏之義焉有終始之義焉是惻𨼆羞惡恭敬三者皆有可為之事而智則無事可為但分别其為是為非耳是以謂之藏也又惻隱羞惡恭敬皆是一面底道理而是非則有兩面既别其所是又别其所非終始萬物之象也故仁為四端之首而智則或終而或始猶元為四德之長然元不生於元而生於貞蓋天地之化不翕聚則不能發散理固然也仁智交際之間乃萬化之機軸循環不窮吻合無間程子所謂隂陽無端動靜無始者此也君子深造之以道此道字非道德之道晦翁所謂深造之方門也方門方法也如孟子所謂必有事焉而勿正勿忘勿助長之意不疾不徐之謂也以法度而深造之優而游之使自得之饜而飫之使自趣之欲其自得之也自得以下皆為學之效驗耳左右逢原意最好左右有近意有不一處意學至於自得則理只在左右之近觸處見本原此豈我帶來道理亦只事事物物元有道理森然已具吾人自得之餘取之而逢見之耳過化存神如何過化謂所經厯處便風聞而化存神謂所存主處便神妙不測如不言而信不怒而威之類本㫖只為王者本根盛大與伯者小補迥别不要作性理說孟子一書何不言易以運使而能問易於主簿以主簿而敢言運使不知易此皆知易之大者此程門公案孟子雖不言易觀其變通知時處無處不是易公孫丑問孟子加齊卿相由此伯王不異如此則動心否乎孟子曰不動心前輩作不動於卿相說程門說道公孫丑恐孟子當此事不去有所疑懼此何見而云耳當將後面孟子答公孫丑語並公孫丑問之言詳之則程子之說真有所據若公孫丑問孟子動心於卿相孟子自將伯夷叔齊等人答之必不說及養勇道理布縷粟米力役以周禮一書觀之是用其一緩其二否周禮三者之征俱有但用之先後無可考便當以孟子之言為周禮程子謂孟子有些英氣又云英氣甚害事不知孟子英氣見於甚處又不知英氣如何害事說大人則藐之之類為英氣英氣是有芒角到聖人地位則渾無芒角今尋常柔善的人却須要些英氣不是即奄奄泉下人矣程子云論性不論氣不備論氣不論性不明願詳其㫖孟子性善從源頭上說及論情論才只是說善不論氣質清濁厚薄是不備也諸子紛紛之說各自把氣質分别便作天性看了其不明之失為害滋甚孔門性相近習相逺却說氣質之性上論清濁至說上智下愚乃論得氣清之十分厚者為上智氣濁之十分薄者為下愚其間相近者乃是中人清濁在四六之間總起是三等氣質此說乃是與孟子之說互相發明要知孔子只說氣質之性孟子是說源頭本然之性諸子只是把氣質便作本然之性看錯了孟子全不論氣質之性只論正性是其說猶未備若諸子渾不說得正性只論得氣質之性則是不明大本矣所以程門必合而論之其說既備其理又明何謂孔子集大成成者樂之一終書所謂簫韶九成是也樂有八音金石絲竹匏土革木若獨奏一音則其一音自為始終此樂之小成也若八音並奏始以大樂起終便以大樂終所謂合衆小成而為一大成者此樂之大成也樂之小成大成若此孟子舉此正欲喻三子之各極其偏而孔子之獨備其全也且學問體要惟始之致知終之力行而已知之明則為智行之至則為性始之知止於一理而終止成於一理此三子也始之知兼夫衆理而終之卒成於衆理此夫子也吾觀伯夷之清伊尹之任栁下惠之和其始之知止於一理上見得透徹故其終之聖也止各成於一德而已夫其止於一德者彼各自以一德為大矣以清為大者則以任為小以任為大者則以清為小以和為大者並以清與任為小矣於是各以一德自為始終亦由樂之一音自為起結所以為小成也孔子之大成豈外三子之聖而為聖耶亦曰集衆小以成其大集衆卑以成其髙集三子之清任和時出而用之所以備道全美而度越諸子亦猶八音並奏集諸小成而為大成也三子自樂於為大而不屑於小故卒成於小也孔子不恃其大而棄其小故能成其大也仁義禮智之端與仁義禮智之實如何端者端倪也物之緒也人受天地之中以生具太極渾全之體凡天地間千條萬件精粗小大道理無不悉備其中綱目之大者有四故名之曰仁義禮智然其未發也則渾然而已寂然而已無聲臭可聞無形迹可見果何從而知有四者之體亦就其端緒之發見者驗之因其惻隱之情發見而知其中之有仁因其羞惡之情發見而知其中之有義因其辭讓之情發見而知其中之有禮因其是非之情發見而知其中之有智使其無是理於內則何以發是端於外由其有是端於外所以知其有是理於內譬之繭絲外有一條緒便知得內有一團絲若其無絲在內則緒何由而見於外孟子所謂乃若其情則可以為善矣乃所謂善也亦由其情之發見者善所以驗其性之善也此惻隱羞惡辭讓是非之情所以為仁義禮智之端也實者真實也對華而言也仁義禮智其用廣大而切近真實之處則莫大於孝悌之道故仁民愛物皆仁也然此特仁之華耳仁主於愛愛莫大於愛親則愛親乃仁之實也事君敬長皆義也然此特義之華耳義主於敬敬莫大於從兄則從兄乃義之實也吉凶軍賓威儀品節皆禮也然此特禮之華耳節文此孝悌之道而行之則禮之實也辨白是非決擇真僞皆智也然此特智之華耳知極此孝悌之道而不失則智之實也仁義禮智之用至大非孝悌便能盡得然其真實切近者則不過於孝悌之間譬之木焉有華有實實在所重華在所輕有子謂孝悌也者其為仁之本與君子務本本立而道生者此實之謂也自古說性未嘗備言至孟子方始備言蓋其時異端並起性分之理不明往往以性為不善而莫之率故孟子於人不知不覺處提出惻隱羞惡是非辭讓之情使人驗而知為仁義禮智之端於人日用常行處提出孝悌之事使人由而行而知為仁義禮智之實此皆前聖所未發而孟子發之其有功於後學者多矣明道言舜發於畎畝之中至孫叔敖舉於海若要熟也須從這裏過熟處如何更嘗變故多則閲義理之會熟熟謂義理與自家相便習如履吾室中成德達材之分如何成德如顔閔達材如由賜此指教者言成德謂成其德達材謂達其材隨其淺深令各有所就窮理盡性以至於命如何講學明理之後方能擴充以盡其性到盡性田地方是了當為人之理方於本來賦豫自家底無少虧缺乃聖人極至之事毫髮無遺憾處必如是而後與天無間故以至於命蓋到此地位自家便做天命了更不須别說知命立命人性本善氣有清濁了然可見但未識才字頭面如何程子謂才稟於氣朱子謂才材質人之能也人有是性則有是才意者才即材能人生出來便會做得堯舜初無上智下愚之分故愚於程子之說粗曉朱子則謂程子此說與孟子不同如何才猶材質所以能為善能為惡者即此材質為之既是材質即帶氣禀上行故又言氣質氣質有清濁厚薄所以說善固是性惡亦不可不謂之性孟子把諸路頭一齊截了謂性善才又善情又善惡從何處來諸家必欲究見惡之根柢則孟子之說容有未備故程子論性必兼氣質言之謂論性不論氣不備論氣不論性不明所以晦翁謂有異同持其志無暴其氣當兩下工夫繼此乃只言知言養氣而不言持志者莫是養氣即是持志舉一隅可見持志知言無暴其氣本都是不動心工夫告子不動心法只是曰持其志更不理會養氣亦不理會知言故孟子既言告子之失而自謂我之不動心却有此兩節也夫學問之道既曰收放心矣而有所謂正心養心存心盡心不知如何頭緒恁地多存養專一即是收放心存養既熟則心得其正而全體昭融方可言盡心春秋天子之事也夫子還有此意否此謂聖人以王法繩諸侯所褒所貶皆是奉行王法即空言以寓行事與天子無異此聖人大用非孟子不能知胡氏傳發明備矣治人不治反其智然智所以辨是非也治人者豈止於辨是非乎治謂人主臨民必有明照之智方能服得人臨民而民不服是自家明照不足也孟子曰形色天性也告子曰食色性也二者之分如何形色為性是引形氣入道理中來食色為性是逐道理出形氣外去霄壤之分孟子曰久於齊非我志也三宿出晝猶以為速何哉孟子之志不欲久居齊者知齊王之不足有為也孟子之心不忍速去齊者覬齊王之猶可有為也王者之迹熄而詩亡蓋謂黍離降為國風而雅亡不知是經聖人刪詩後降為國風耶抑黍離諸詩氣象卑下有類於國風邪雅詩多是王者朝會燕饗樂章或是公卿大臣規諫獻納之所作東遷以後朝廷既無制作公卿又無獻納故雅詩遂亡獨有民俗歌謠其體制聲節與列國之風同故止可謂之王風非聖人能降之也君子所過者化所存者神橫渠先生云性性為能存神物物為能過化性本清靈能性其性則本體之清靈具在而一塵不染故所存者神心本無物當應物只是因物於物使物各當物物去而心不與之俱往故所過者化讀孔子登泰山小魯一章晦翁解難為水難為言以為猶人不可為衆之意仁不可為衆言仁者難為衆看有幾多人衆來到仁者面前皆使不得猶泰山之前難為山大海之前難為水布縷粟米力役之征國家缺一不可況周禮之制亦皆取之於民而孟子曰用其一而緩其二晦翁乃有夏秋之辨夫秋夏之說始出於唐不知何所據而云緩非廢其征但不作一時併征之耳月令孟夏蠶畢而獻繭稅孟秋農乃登穀始收穀布縷征之夏粟米征之秋乃古法若唐分兩稅非止布縷粟米之征乃是取大厯十四年應該賦斂之數併而為兩稅名同實異失孟子之意矣堯舜性之也湯武反之也有輕重否二字雖不同然皆與性字相拗性之是生來自然如此身之是踐履做得如此性之是不學自能反之是必學而後能孟子說不當見諸侯又却不逺千里自來見梁惠齊宣陳代問之公孫丑問之萬章問之只爭往見不往見召與不召所以見梁惠王史記以幣聘則見齊宣未曉其義持其志無暴其氣當兩下工夫繼此只說知言與養氣乃不兼言持志何也孟子養氣以集義為主所謂集義者以直養而無害耳是即持志之謂孟子答彭更之問其於食志食功之說皆所不取然食功食志皆非待士之禮處子何以其志為哉其有功於子則食之然則子非食志也食功也此是一章歸宿處孟子所以傳食諸侯不以為泰者以其有明道之功耳夫仁亦在乎熟之而已矣集注謂不熟反不如他道之有成不知他道指何物而言他道如百工衆技百家諸子皆是深言仁之不可不熟耳盡心知性存心養性上是知工夫下是行工夫然上一節知性在先盡心在後下一節存心在先養性在後何也知性即窮理格物之學是工夫最先者盡心即大學知至境界存心即誠意正心之謂養性在中矣非存心外别有所謂養性工夫故養性在存心下必有事焉而勿正孟子本為養氣設程門乃轉作養心法孟子一書持敬工夫少如此二句最為細密然其用處亦只施於養氣其所謂事者只指義直而言大槩工夫較粗些所謂孟子有英氣謂此程門愛此二句故借轉作敬用聖人不思而中謂明睿所照萬物森然而無所逃初不待考索而得然周公仰而思之夜以繼日何耶據聖人地位可以不思可以不勉可以不學然聖如堯舜愈兢兢業業何曾謂我自聖來此人心所以不死天理所以常行聖人為人立極處為有此心立命正命知命之辨立命謂不惑於短長之數但當修身以俟正命謂盡其道而死不死於非命如殺身成仁亦是盡道知命謂知許多道理孟子道性善先儒又謂善固是性惡亦謂之性何如孟子專說義理之性諸子專說氣禀之性專說義理則惡無所歸是論性不論氣孟子之說為未備專說氣禀則善無所别是論氣不論性諸子之論為不明程子兼質論性夫子賢於堯舜逺矣何處見衣於斯食於斯寢且處於斯終身由而不自知夫子之功所以與天長地久雖堯舜不能與也孟子通五經又不知所遺者何經孟子亦不見周禮故說班爵祿處與周禮别何以夏后氏五十而貢夏商若同是井田則皆八家同為一井但田有多寡耳夏之井則為五十畝者九其中五十畝為公田商之井則為七十畝者九其中七十畝為公田此以周井田法約之但孟子言唯助為有公田貢則什取其一即是夏之貢不井但於五十畝之中抽十之一以供貢商之助則井却於七十畝之外别取公田之什一以輸官周之徹既是井田則亦於百畝之外以公田之入供官餘說甚長非可以立談盡既是持其志無暴其氣當兩下工夫繼此說知言養氣而不說持志何邪集義便是持志孟子細密工夫如此不肯下一敬字所以先儒謂孟子才髙難學學之無依據不得如顔子親切者此也庾公之斯一段集注云雖存私恩猶害公義君子於此時何以處之若論王事則見君而不見師所以去金發矢猶是一夫之小德比於一飰之恩耳齊景公說晏子之對是以自責省民興發補不足齊景公始知此意而為之未足為至也而遂有君臣相悅之樂若晏子者既告其觀游之事於始至此乃不復有警戒之言未知是否須看他相悅者是何等事作樂者是何等語臣規諫而君聽從異乎人之相悅矣其樂詩曰畜君何尤尤異乎人之樂非禮之禮非義之義大人弗為如何大人則道全識周貫萬變而不膠於其迹故無此蔽學未到大人變通處則必膠於陳迹孟子稱鄉黨莫如齒周家黨正飲酒之禮三命而不齒則有時乎不用齒矣古人行禮毫釐必計惟一命之士卑例與鄉黨序齒再命稍崇只與父族序齒已不行於鄉黨矣三命為大夫加尊矣雖父族不可以齒論也於是有庶子尊東之禮則别為拐位庶可不使貴者雜處亂齒乃是尊齒處且兩不相妨也為政不難不得罪於巨室得罪謂非理致怨所謂不得罪者謂合正理而不致怨於人非曲法以奉之也大家人心所係義理服得大家則人心歸之矣士無世官如周之太史如何却世守其官久而為氏其業如百工然世守其業何也如宗祝卜史古人率是世官至有子孫為姓氏者蓋此等事非人所通習不嫌於世守春秋明尊王之法孟子乃專以王道與列國言曾無一語及於周室毋乃周至此時決不可以有為邪然君子表微天下大分要不可一日泯也有他說否此是孔孟灼見天心以天自處周有一日天命便當為周文王孔子是也一日天命去周便當為周武王孟子是也請詳集注木鍾集卷二
